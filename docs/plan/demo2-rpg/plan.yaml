    description: |
      创建 `fsm/CharacterFsmStates.ts`。
      4 个状态类继承 FsmState<ICharacterBlackboard>：

      1. **CharIdleState**：等待行动。onEnter 检查 HP ≤ 0 → 如果是则 changeState(Dead)
      2. **CharActingState**：执行行动中。onEnter 设置 acting 标记。完成后 changeState(Idle)
      3. **CharStunnedState**：被眩晕。onEnter 记录剩余回合。回合结束时递减 → 为 0 时 changeState(Idle)
      4. **CharDeadState**：已阵亡。onEnter emit CHARACTER_DEAD 事件。终态，不可切换。

