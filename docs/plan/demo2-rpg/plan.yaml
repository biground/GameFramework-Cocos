  - id: T07
    title: "实现 BuffSystem BUFF 管理系统"
    description: |
      创建 `systems/BuffSystem.ts`。
      管理所有角色的 BUFF/DEBUFF 状态：
      - `applyBuff(targetId, buffType, duration, value): void` — 应用 BUFF（同类型刷新持续时间）
      - `tickBuffs(targetId): BuffState[]` — 回合递减，返回过期的 BUFF 列表
