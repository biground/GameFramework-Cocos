plan_id: demo2-rpg
objective: "实现 Demo 2 Turn-based RPG 回合制 RPG 演示，深度验证 FSM/Procedure/Entity/Event/DataTable/Audio/UI/ObjectPool 等框架模块在真实战斗场景下的协作"
created_at: "2026-04-22"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 5
  total_dependencies: 30
  risk_score: medium

tldr: |
  Demo 2 Turn-based RPG 共 24 个任务、6 个 Wave。
  Wave 1：基础数据层（事件键 + 4 张 DataTable 行定义 + 游戏状态 + ProcedureContext）— 5 个并行任务
  Wave 2：核心系统层（伤害计算器 + BUFF 系统 + 敌方 AI + 战斗系统）— 4 个并行任务
  Wave 3：FSM 层（战斗 FSM 6 状态 + 角色 FSM 4 状态）— 2 个并行任务
  Wave 4：流程层（6 个 Procedure 实现）— 4 个并行任务
  Wave 5：展示层（3 个 UI 面板 + 主入口类 + index.ts）— 4 个并行任务
  Wave 6：集成测试 + 验收（端到端测试 + 最终验证）— 5 个任务
  严格 TDD：先写测试 → 红灯 → 实现 → 绿灯 → 提交。

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "BattleFsm 状态切换逻辑复杂，SelectAction ↔ ExecuteAction 循环可能出现死循环"
      likelihood: medium
      impact: high
      mitigation: "为 BattleFsm 添加最大迭代守卫（如单回合 actionIndex 不超过队伍总人数），单测覆盖循环边界"
    - scenario: "伤害计算公式 ATK × damageRate - DEF 可能产生负值"
      likelihood: medium
      impact: medium
      mitigation: "DamageCalculator 中 Math.max(1, result) 保底最小伤害为 1"
    - scenario: "CharacterFsm 多实例（每个角色一个）与 BattleFsm 生命周期管理冲突"
      likelihood: low
      impact: high
      mitigation: "BattlePrepProcedure 创建、SettleProcedure 统一销毁，用 entityId 后缀命名保证唯一"
    - scenario: "BUFF 效果堆叠和回合递减逻辑与 Timer 交叉导致时序问题"
      likelihood: medium
      impact: medium
      mitigation: "BUFF 用回合计数器而非 TimerManager 秒计时，在 RoundEnd 统一递减和清理"
  assumptions:
    - "Demo 0 共享基础设施（DemoBase + HtmlRenderer + 12 Mock）已完全就绪"
    - "框架模块 API（FSM/Procedure/Entity/Event/DataTable/Audio/UI/ObjectPool/Timer）已稳定"
    - "遵循 Demo 1 已建立的目录结构和编码模式"
    - "所有网络通信通过 MockNetworkSocket 模拟"

implementation_specification:
  code_structure: |
    Demo 2 采用与 Demo 1 一致的分层架构：
    - data/: 4 张 DataTable 行类型定义 + 静态数据 + RpgGameData 运行时状态
    - events/: EventKey<T> 类型安全事件键，'rpg:' 前缀
    - fsm/: BattleFsm（6 状态）+ CharacterFsm（4 状态），黑板模式共享数据
    - procedures/: 6 个 Procedure + IProcedureContext
    - systems/: BattleSystem（战斗引擎）+ DamageCalculator + BuffSystem + EnemyAI
    - ui/: LobbyPanel + BattlePanel + SettlePanel
    - TurnBasedRpgDemo.ts 主入口 + index.ts 导出

  affected_areas:
    - assets/scripts/game/demo2-rpg/ （全部新建）
    - tests/integration/demo2-rpg.integration.test.ts （新建）

  component_details:
    - component: RpgGameData
      responsibility: "游戏运行时状态：玩家金币、经验、角色等级、当前关卡、战斗回合数等"
      interfaces:
        - "gold: number"
        - "exp: number"
        - "selectedStageId: number"
        - "playerCharacters: CharacterState[]"
        - "currentRound: number"

    - component: DamageCalculator
      responsibility: "纯函数伤害计算：ATK × damageRate - DEF，保底最小 1"
      interfaces:
        - "calculateDamage(attacker, skill, defender): number"
        - "calculateHeal(caster, skill): number"

    - component: BuffSystem
      responsibility: "BUFF/DEBUFF 管理：应用、堆叠、回合递减、清理"
      interfaces:
        - "applyBuff(targetId, buffType, duration, value): void"
        - "tickBuffs(targetId): void"
        - "getActiveBuffs(targetId): Buff[]"
        - "clearBuffs(targetId): void"

    - component: EnemyAI
      responsibility: "敌方 AI 决策：优先攻击 HP 最低的玩家角色"
      interfaces:
        - "decideAction(enemy, playerCharacters): ActionDecision"

    - component: BattleSystem
      responsibility: "回合制战斗引擎：SPD 排序、回合执行、胜负判定"
      interfaces:
        - "calculateTurnOrder(characters): CharacterState[]"
        - "executeAction(action): ActionResult"
        - "checkBattleEnd(players, enemies): BattleEndResult"

    - component: BattleFsm（6 状态）
      responsibility: "战斗流程驱动：RoundStart → SelectAction → ExecuteAction → RoundEnd → Victory/Defeat"
      interfaces:
        - "IBattleBlackboard: { battleSystem, buffSystem, ... }"
        - "各 State 实现 onEnter/onUpdate/onLeave"

    - component: CharacterFsm（4 状态）
      responsibility: "角色状态：Idle → Acting → Stunned / Dead"
      interfaces:
        - "ICharacterBlackboard: { characterId, characterState }"

    - component: TurnBasedRpgDemo
      responsibility: "主入口类，继承 DemoBase，串联所有系统和流程"
      interfaces:
        - "start(): Promise<void>"
        - "setupProcedures(): void"
        - "setupDataTables(): void"

  dependencies:
    - component: BattleSystem
      relationship: "调用 DamageCalculator 计算伤害，调用 BuffSystem 查询 BUFF 效果"
    - component: BattleFsm states
      relationship: "调用 BattleSystem 执行战斗逻辑，通过 EventManager 发布事件"
    - component: Procedures
      relationship: "通过 IProcedureContext 访问所有系统和框架模块"
    - component: UI panels
      relationship: "监听 EventManager 事件更新显示，通过 HtmlRenderer 渲染"

  integration_points:
    - "DemoBase.bootstrap() 注册 15 个框架模块 + Mock 注入"
    - "ProcedureManager.initialize() 注册 6 个 Procedure"
    - "DataTableManager.createTableFromRawData() 注册 4 张配置表"
    - "FsmManager.createFsm() 创建 BattleFsm + CharacterFsm"
    - "EntityManager.showEntity/hideEntity 管理角色实体"
    - "EventManager 事件流连接战斗逻辑 ↔ UI ↔ 音效"

