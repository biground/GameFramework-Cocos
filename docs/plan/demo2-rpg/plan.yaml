  - id: T10
    title: "实现 BattleFsm 6 个战斗状态"
    description: |
      创建 `fsm/BattleFsmStates.ts`。
      6 个状态类继承 FsmState<IBattleBlackboard>：

      1. **RoundStartState**：
         - onEnter: 回合数+1 → calculateTurnOrder → 重置 currentActorIndex=0 → emit ROUND_START → changeState(SelectAction)

      2. **SelectActionState**：
         - onEnter: 获取当前行动角色 → 检查 STUN → 如果是敌人调用 EnemyAI → 如果是玩家等待 UI 输入
         - receiveAction(decision): 设置 actionDecision → changeState(ExecuteAction)

      3. **ExecuteActionState**：
         - onEnter: 从黑板取 actionDecision → battleSystem.executeAction → emit 事件（ATTACK/HURT/DEAD等）
           → 播放音效 → currentActorIndex++ → 检查是否还有角色未行动
           → 有则 changeState(SelectAction)，无则 changeState(RoundEnd)

      4. **RoundEndState**：
         - onEnter: buffSystem.tickBuffs 所有角色 → emit 过期 BUFF 事件 → checkBattleEnd
           → 胜利 changeState(Victory) / 失败 changeState(Defeat) / 继续 changeState(RoundStart)

      5. **VictoryState**：
         - onEnter: emit BATTLE_VICTORY → 播放胜利音效

      6. **DefeatState**：
         - onEnter: emit BATTLE_DEFEAT → 播放失败音效

      TDD 重点：状态间转换序列、STUN 跳过行动、全回合完整流程。
