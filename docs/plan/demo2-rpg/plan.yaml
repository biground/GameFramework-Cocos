      纯函数/静态方法类，无状态：
      - `calculateDamage(attackerAtk: number, skillDamageRate: number, defenderDef: number): number`
        公式：Math.max(1, Math.floor(attackerAtk * skillDamageRate - defenderDef))
      - `calculateHeal(casterAtk: number, skillDamageRate: number): number`
        公式：Math.floor(casterAtk * skillDamageRate)
      - 考虑 BUFF 加成参数：`calculateDamageWithBuff(baseAtk, buffAtkBonus, rate, def): number`

      TDD 重点：边界值测试（0 防御、高防御、负值保底、BUFF 加成）。
