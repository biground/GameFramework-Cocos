  - id: "task-4"
    title: "ProcedureBase 添加 getContext<T>() 便捷方法 + 测试"
    description: |
      修改 ProcedureBase.ts，添加 `getContext` 便捷方法：

      ```typescript
      protected getContext<T>(fsm: IFsm<unknown>, key: string): T {
          const ctx = fsm.getData<T>(key);
          if (ctx == null) {
              Logger.error('ProcedureBase', `流程上下文缺失，key="${key}"，FSM="${fsm.name}"`);
              throw new Error(`[ProcedureBase] 流程上下文缺失，key="${key}"，FSM="${fsm.name}"`);
          }
          return ctx;
      }
      ```

      **不改变 ProcedureBase 的继承关系**：仍然 `extends FsmState<unknown>`。
      **不改变 ProcedureManager 的任何代码**。

      **TDD 流程**：
      - Red：在 tests/procedure/procedure-manager.test.ts 中添加测试：
        1. getContext 正常返回：setData + getContext 能拿到值
        2. getContext 缺失抛异常：不 setData 时 getContext 抛出包含 key 名的 Error
      - Green：在 ProcedureBase 中实现 getContext
      - Refactor：确保现有 Procedure 测试全绿
