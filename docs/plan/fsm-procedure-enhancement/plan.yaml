plan_id: fsm-procedure-enhancement
objective: |
  补强 FSM 和 Procedure 两个框架模块：
  1. FSM 黑板泛型：为 IFsm/Fsm/IFsmState/FsmState 添加第二个泛型参数 TBlackboard，
     提供 `get blackboard()` 类型安全访问器，消除 Demo 中 16+ 处 getBlackboard() 样板
  2. Procedure 上下文便捷方法：为 ProcedureBase 添加 `getContext<T>(fsm, key)` 方法，
     封装 getData + null 检查 + Logger.error + throw，消除 18+ 处 4 行样板
created_at: "2026-04-24"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 10
  risk_score: medium

tldr: |
  Wave 1（框架层）：修改 FSM 泛型签名 + 添加 blackboard 属性 + ProcedureBase.getContext()，配套测试
  Wave 2（Demo 重构）：三个 Demo 并行移除 getBlackboard() 样板 + Procedure 上下文样板，更新 Demo 测试
  Wave 3（验证与文档）：集成测试验证 + 模块文档更新

  关键风险：泛型签名变更需确保 TBlackboard 默认值 `Record<string, unknown>` 保证向后兼容，
  现有不传第二个类型参数的代码必须零改动编译通过。

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "TBlackboard 默认类型导致现有 FsmState<T> 子类编译失败"
      likelihood: medium
      impact: critical
      mitigation: |
        Wave 1 task 1 完成后立即运行 `npx tsc --noEmit` 全量类型检查，
        确保所有现有代码在不传第二个类型参数时零编译错误。
        默认值使用 `Record<string, unknown>` 而非 `{}`，避免 `{}` 的隐式兼容问题。
    - scenario: "ProcedureManager 内部 as unknown as 强转链路因泛型变更断裂"
      likelihood: medium
      impact: high
      mitigation: |
        ProcedureBase 保持 `extends FsmState<unknown>`，不引入 TBlackboard 泛型。
        ProcedureManager 内部的强转逻辑不变。getContext() 仅是一个便捷 wrapper，
        不改变 Procedure FSM 的类型签名。
    - scenario: "blackboard getter 返回 TBlackboard 但实际 _dataMap 仍是 Map<string, unknown>，运行时类型不安全"
      likelihood: low
      impact: medium
      mitigation: |
        blackboard getter 内部通过代理或直接返回 _dataMap 的类型断言。
        文档明确说明 blackboard 是编译期类型约束，运行时仍依赖 getData/setData。
        或者 blackboard 直接作为一个独立的 typed 属性存储，与 _dataMap 分离。
  assumptions:
    - "现有 Demo 中 FsmState<T> 的 T 参数与黑板接口的对应关系已在研究报告中完全列出"
    - "所有 getBlackboard() 辅助函数的模式完全一致（getData + null check + throw）"
    - "ProcedureBase 不需要泛型化，仅需添加 getContext 便捷方法"
    - "Demo 中的建筑 FSM owner 类型是 IBuildingBlackboard（owner 即黑板），其他 Demo 的 owner 与黑板分离"

implementation_specification:
  code_structure: |
    框架层改动集中在 3 个核心文件（FsmDefs.ts, Fsm.ts, FsmState.ts）+ 1 个文件（ProcedureBase.ts）。
    通过添加带默认值的泛型参数实现向后兼容。
    blackboard 属性在 Fsm 类中作为独立的 typed 存储引入，与 _dataMap 共存。
    Procedure 的 getContext 是纯 wrapper 方法，不改变类继承关系。
  affected_areas:
    - assets/scripts/framework/fsm/ — 核心泛型签名变更
    - assets/scripts/framework/procedure/ProcedureBase.ts — 添加 getContext 方法
    - assets/scripts/framework/interfaces/IFsmManager.ts — createFsm 签名微调
    - tests/fsm/ — 框架层测试更新
    - tests/procedure/ — 框架层测试更新
  component_details:
    - component: "IFsm<T, TBlackboard>"
      responsibility: "状态机公共契约，新增 blackboard 只读属性和 setBlackboard 方法"
      interfaces:
        - "readonly blackboard: TBlackboard — 类型安全的黑板访问器"
        - "setBlackboard(data: TBlackboard): void — 设置完整黑板对象"
    - component: "Fsm<T, TBlackboard>"
      responsibility: "状态机实现类，新增 _blackboard 私有字段和对应的 getter/setter"
      interfaces:
        - "get blackboard(): TBlackboard"
        - "setBlackboard(data: TBlackboard): void"
    - component: "IFsmState<T, TBlackboard>"
      responsibility: "状态接口，生命周期方法的 fsm 参数类型随泛型同步变化"
      interfaces:
        - "onInit/onEnter/onUpdate/onLeave/onDestroy(fsm: IFsm<T, TBlackboard>): void"
    - component: "FsmState<T, TBlackboard>"
      responsibility: "状态基类，同步 IFsmState 的泛型变更"
      interfaces:
        - "changeState<TState>(fsm: IFsm<T, TBlackboard>, stateType: Constructor<TState>): void"
    - component: "ProcedureBase.getContext<T>"
      responsibility: "封装 Procedure 上下文获取的 4 行样板为 1 行调用"
      interfaces:
        - "protected getContext<T>(fsm: IFsm<unknown>, key: string): T"
  dependencies:
    - component: "Fsm"
      relationship: "implements IFsm<T, TBlackboard>"
    - component: "FsmState"
      relationship: "implements IFsmState<T, TBlackboard>"
    - component: "ProcedureBase"
      relationship: "extends FsmState<unknown>（不变），新增 getContext 方法"
    - component: "FsmManager"
      relationship: "createFsm 签名同步添加 TBlackboard 默认泛型"
  integration_points:
    - "Demo 主入口调用 fsm.setBlackboard(data) 替代 fsm.setData(KEY, data)"
    - "FsmState 子类通过 fsm.blackboard.xxx 替代 getBlackboard(fsm).xxx"
    - "Procedure 子类通过 this.getContext<ICtx>(fsm, KEY) 替代 4 行样板"

