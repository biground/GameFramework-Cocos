plan_id: logger-integration
objective: 调研框架所有模块中适合添加 Logger 运行时调试日志的位置
focus_area: assets/scripts/framework/
created_at: "2026-04-14"
created_by: gem-researcher
status: completed

tldr: |
  - 框架共 23 个实现文件（排除 debug/、interfaces/、*Defs.ts、I*.ts 后），仅 SceneManager 已集成 Logger（4 处 Logger.warn）
  - 12 个 ModuleBase 子类 + 11 个核心辅助类均需添加 Logger 日志
  - 建议日志点总计约 120+ 处，覆盖生命周期、状态变化、错误分支、关键操作
  - 日志级别分配：onInit/onShutdown → info, 关键操作（创建/销毁/状态切换）→ debug, 异常分支 → warn/error
  - 每个类应定义 private static TAG 常量，格式与错误消息前缀统一（如 'GameModule'、'Fsm' 等）

research_metadata:
  methodology: "hybrid retrieval: file_search + grep_search(Logger 使用情况) + read_file(全量阅读每个实现文件)"
  scope: "assets/scripts/framework/ 下全部 .ts 文件，排除 debug/、interfaces/、*Defs.ts、I*.ts"
  confidence: high
  coverage: 100
  decision_blockers: 0
  research_blockers: 0

