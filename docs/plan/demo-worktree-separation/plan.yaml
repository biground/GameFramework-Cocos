  # ============== Wave 4: 创建 worktree 并清理（3 个可并行）==============
  - id: "task-4a-worktree-demo1"
    title: "创建 demo1 worktree 并清理非 demo1 代码"
    description: |
      创建 demo1 的 worktree，保留 shared/ + demo1-idle/，删除 demo2/demo3 相关代码。

      **步骤：**

      1. 在主仓库根目录创建 worktree：
         ```bash
         cd "/Volumes/Extreme SSD/WorkSpace/GameFramework-Cocos"
         git worktree add .worktrees/demo1 feature/demo1-idle
         ```

      2. 进入 worktree 并设置 git config：
         ```bash
         cd .worktrees/demo1
         git config core.fileMode false
         ```

      3. 删除 demo2 源码和测试：
         ```bash
         git rm -r assets/scripts/game/demo2-rpg/
         git rm -r tests/game/demo2-rpg/
         ```

      4. 删除 demo3 源码和测试：
         ```bash
         git rm -r assets/scripts/game/demo3-autochess/
         git rm -r tests/game/demo3-autochess/
         ```

      5. 删除 E2E 测试（属于 demo2）：
         ```bash
         git rm -r tests/e2e/
         ```

      6. 删除 demo2/demo3 的 dist 产物：
         ```bash
         git rm -r dist/demo2/
         git rm -r dist/demo3/
         ```

      7. 删除 playwright.config.ts（E2E 属于 demo2）：
         ```bash
         git rm playwright.config.ts
         ```

      8. 编辑 package.json，移除 demo2/demo3 相关 scripts：
         需要移除的 scripts key：
         - `demo2:build`
         - `demo2:serve`
         - `demo2:dev`
         - `demo3:build`
         - `demo3:serve`
         - `demo3:dev`
         - `test:e2e`

         保留的 scripts：
         - `lint`, `lint:fix`, `format`, `test`, `test:watch`, `test:coverage`, `prepare`
         - `demo1:build`, `demo1:serve`

      9. 提交：
         ```bash
         git add -A
         git commit -m "refactor(demo1): 清理非 demo1 代码，保留 shared + demo1-idle

         从 feature/demo1-idle 分支移除：
         - demo2-rpg 源码和测试
         - demo3-autochess 源码和测试
         - E2E 测试和 playwright.config.ts
         - demo2/demo3 的 dist 产物和 npm scripts"
         ```

      10. 回到主仓库：
          ```bash
          cd "/Volumes/Extreme SSD/WorkSpace/GameFramework-Cocos"
          ```
