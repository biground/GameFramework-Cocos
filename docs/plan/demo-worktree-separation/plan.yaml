plan_id: demo-worktree-separation
objective: |
  将 demo game 代码从 main 分支分离到独立 worktree，main 只保留纯框架代码。
  每个 demo 在独立分支（feature/demo1-idle, feature/demo2-rpg, feature/demo3-autochess），
  各含 shared/ + 自己的 demo 代码。
created_at: "2026-04-24"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 12
  risk_score: medium

tldr: |
  5 波执行计划，共 10 个任务：
  - Wave 1: 清理旧 worktree（demo0 + demo1）和旧分支
  - Wave 2: 从 main 创建 3 个新分支
  - Wave 3: 在 main 上 soft 删除所有 demo 代码
  - Wave 4: 创建 3 个 worktree 并清理各自不需要的 demo（可并行）
  - Wave 5: 验证 main 框架测试 + 各 worktree demo 测试

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "worktree remove 失败（锁文件残留或进程占用）"
      likelihood: medium
      impact: medium
      mitigation: "先关闭所有打开该 worktree 的编辑器/终端；失败时手动删除 .worktrees/demoN 目录再 git worktree prune"
    - scenario: "main 上删除 game/ 后框架测试因隐式依赖而失败"
      likelihood: low
      impact: high
      mitigation: "Wave 3 完成后立即运行 npm test 验证；若失败则 git revert 该 commit 并排查依赖"
    - scenario: "路径含空格导致 shell 命令失败"
      likelihood: medium
      impact: low
      mitigation: "所有路径必须双引号包裹；使用 cd 进目录后用相对路径操作"
    - scenario: "exFAT fileMode 变化产生大量脏文件干扰 diff"
      likelihood: medium
      impact: low
      mitigation: "每个 worktree 创建后立即执行 git config core.fileMode false"
  assumptions:
    - "main 分支当前无未提交的更改"
    - "旧 worktree（demo0、demo1）无需保留的未提交工作"
    - "框架测试（tests/ 下非 game/ 非 e2e/）不依赖 game/ 或 shared/ 中的任何代码"
    - "不需要 push 任何新分支到远程"

implementation_specification:
  code_structure: |
    分离后的结构：
    - main 分支：assets/scripts/framework/ + runtime/ + utils/，tests/ 下仅框架测试
    - feature/demo1-idle：main + assets/scripts/game/shared/ + game/demo1-idle/，tests/game/shared/ + demo1-idle/
    - feature/demo2-rpg：main + assets/scripts/game/shared/ + game/demo2-rpg/，tests/game/shared/ + demo2-rpg/ + e2e/
    - feature/demo3-autochess：main + assets/scripts/game/shared/ + game/demo3-autochess/，tests/game/shared/ + demo3-autochess/
  affected_areas:
    - "assets/scripts/game/ — 从 main 移除，各 worktree 保留子集"
    - "tests/game/ — 从 main 移除，各 worktree 保留子集"
    - "tests/e2e/ — 从 main 移除，仅 demo2 worktree 保留"
    - "dist/ — 从 main 移除全部 demo HTML/JS"
    - "package.json — main 移除 demo scripts；各 worktree 移除非本 demo 的 scripts"
    - "playwright.config.ts — 从 main 移除，仅 demo2 worktree 保留"
    - ".worktrees/ — 删除旧的 demo0、demo1；创建新的 demo1、demo2、demo3"
  component_details:
    - component: "main 分支（纯框架）"
      responsibility: "仅保留框架层、运行时适配层、工具层代码和对应测试"
      interfaces:
        - "npm test — 运行全部框架测试"
        - "npm run lint — ESLint 检查"
    - component: "feature/demo1-idle worktree"
      responsibility: "Idle Clicker Demo，包含 shared/ 基础设施 + demo1-idle/ 业务代码"
      interfaces:
        - "npm run demo1:build / demo1:serve"
        - "npm test — 框架 + shared + demo1 测试"
    - component: "feature/demo2-rpg worktree"
      responsibility: "Turn-based RPG Demo，包含 shared/ + demo2-rpg/ + E2E 测试"
      interfaces:
        - "npm run demo2:build / demo2:serve / demo2:dev"
        - "npm test — 框架 + shared + demo2 测试"
        - "npm run test:e2e — Playwright E2E"
    - component: "feature/demo3-autochess worktree"
      responsibility: "Auto Chess Demo，包含 shared/ + demo3-autochess/"
      interfaces:
        - "npm run demo3:build / demo3:serve / demo3:dev"
        - "npm test — 框架 + shared + demo3 测试"
  dependencies:
    - component: "各 worktree"
      relationship: "从 main 分支 fork，包含 main 的全部框架代码 + 本 demo 子集"
  integration_points:
    - "各 worktree 可通过 git merge main 获取框架更新"

contracts:
  - from_task: "task-1-cleanup-worktrees"
    to_task: "task-2-create-branches"
    interface: "旧 worktree 和旧分支已清理，分支名 feature/demo0-infrastructure 和 feature/demo1-idle-clicker 可用"
    format: "git worktree list 不再包含 demo0/demo1 条目；git branch 不再包含旧分支"
  - from_task: "task-2-create-branches"
    to_task: "task-3-cleanup-main"
    interface: "3 个新分支已从 main HEAD 创建，包含 main 的完整代码快照"
    format: "git branch 包含 feature/demo1-idle, feature/demo2-rpg, feature/demo3-autochess"
  - from_task: "task-3-cleanup-main"
    to_task: "task-4a-worktree-demo1"
    interface: "main 已清除 demo 代码并 commit；新分支尚未受影响（在 commit 前已 fork）"
    format: "main 不含 assets/scripts/game/、tests/game/、tests/e2e/、dist/"
  - from_task: "task-3-cleanup-main"
    to_task: "task-4b-worktree-demo2"
    interface: "同上"
    format: "同上"
  - from_task: "task-3-cleanup-main"
    to_task: "task-4c-worktree-demo3"
    interface: "同上"
    format: "同上"

tasks:
  # ============== Wave 1: 清理旧 worktree ==============
  - id: "task-1-cleanup-worktrees"
    title: "清理旧 worktree 和旧分支"
    description: |
      删除落后的旧 worktree（demo0、demo1）和对应的本地分支。

      **步骤：**

      1. 确认当前工作目录是主仓库根目录：
         ```bash
         cd "/Volumes/Extreme SSD/WorkSpace/GameFramework-Cocos"
         ```

      2. 删除 demo0 worktree：
         ```bash
         git worktree remove .worktrees/demo0 --force
         ```

      3. 删除 demo1 worktree：
         ```bash
         git worktree remove .worktrees/demo1 --force
         ```

      4. 清理 worktree 引用：
         ```bash
         git worktree prune
         ```

      5. 删除旧的本地分支：
         ```bash
         git branch -D feature/demo0-infrastructure
         git branch -D feature/demo1-idle-clicker
         ```

      6. 验证清理结果：
         ```bash
         git worktree list
         # 应只显示主仓库一条记录
         git branch | grep feature
         # 应无输出
         ```
    wave: 1
    agent: gem-implementer
    prototype: false
    priority: high
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
      - path: ".worktrees/demo0"
        description: "旧的 demo0 worktree 目录（feature/demo0-infrastructure 分支，落后 45 commits）"
      - path: ".worktrees/demo1"
        description: "旧的 demo1 worktree 目录（feature/demo1-idle-clicker 分支，落后 33 commits）"
    planning_pass: 1
    planning_history:
      - pass: 1
        reason: "初始计划"
        timestamp: "2026-04-24"
