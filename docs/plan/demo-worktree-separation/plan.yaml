  # ============== Wave 2: 创建新分支 ==============
  - id: "task-2-create-branches"
    title: "从 main HEAD 创建 3 个 demo 分支"
    description: |
      从 main 当前 HEAD 创建 3 个新的 feature 分支，确保每个分支包含完整的代码快照。

      **步骤：**

      1. 确认在 main 分支：
         ```bash
         cd "/Volumes/Extreme SSD/WorkSpace/GameFramework-Cocos"
         git checkout main
         ```

      2. 创建 3 个分支：
         ```bash
         git branch feature/demo1-idle
         git branch feature/demo2-rpg
         git branch feature/demo3-autochess
         ```

      3. 验证分支创建成功：
         ```bash
         git branch | grep feature
         # 应显示：
         #   feature/demo1-idle
         #   feature/demo2-rpg
         #   feature/demo3-autochess
         ```

      4. 确认所有分支指向同一 commit：
         ```bash
         git log --oneline -1 feature/demo1-idle
         git log --oneline -1 feature/demo2-rpg
         git log --oneline -1 feature/demo3-autochess
         git log --oneline -1 main
         # 四个输出应完全相同
         ```
    wave: 2
    agent: gem-implementer
    prototype: false
    priority: high
    status: pending
    dependencies:
      - "task-1-cleanup-worktrees"
      - "task-1b-verify-main-clean"
    conflicts_with: []
    context_files: []
