  # ============== Wave 3: main 上清理 demo 代码 ==============
  - id: "task-3-cleanup-main"
    title: "在 main 分支上 soft 删除所有 demo 相关代码"
    description: |
      从 main 分支删除所有 demo 相关文件和配置，使 main 成为纯框架仓库。
      使用 soft 删除（git rm + commit），历史保留。

      **步骤：**

      1. 确认在 main 分支：
         ```bash
         cd "/Volumes/Extreme SSD/WorkSpace/GameFramework-Cocos"
         git checkout main
         ```

      2. 删除 game 源码目录：
         ```bash
         git rm -r assets/scripts/game/
         ```

      3. 删除 game 测试目录：
         ```bash
         git rm -r tests/game/
         ```

      4. 删除 e2e 测试目录：
         ```bash
         git rm -r tests/e2e/
         ```

      5. 删除 dist 目录下的 demo 产物：
         ```bash
         git rm -r dist/
         ```

      6. 删除 playwright.config.ts（E2E 仅在 demo worktree 使用）：
         ```bash
         git rm playwright.config.ts
         ```

      7. 编辑 package.json，移除 demo 相关 scripts：
         需要移除的 scripts key：
         - `demo1:build`
         - `demo1:serve`
         - `demo2:build`
         - `demo2:serve`
         - `demo2:dev`
         - `demo3:build`
         - `demo3:serve`
         - `demo3:dev`
         - `test:e2e`

         保留的 scripts：
         - `lint`, `lint:fix`, `format`, `test`, `test:watch`, `test:coverage`, `prepare`

      8. 提交更改：
         ```bash
         git add -A
         git commit -m "refactor: 从 main 分支移除所有 demo 代码，仅保留纯框架

         - 删除 assets/scripts/game/ 整个目录（shared + demo1/2/3）
         - 删除 tests/game/ 和 tests/e2e/ 测试目录
         - 删除 dist/ 目录下的 demo 产物
         - 删除 playwright.config.ts（E2E 仅在 demo worktree 使用）
         - 移除 package.json 中 demo 相关 scripts

         Demo 代码已分离到独立 worktree 分支：
         - feature/demo1-idle
         - feature/demo2-rpg
         - feature/demo3-autochess"
         ```

      9. 验证框架测试通过：
         ```bash
         npm test
         ```
