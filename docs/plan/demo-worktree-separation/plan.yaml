        tech_stack:
          - "git worktree"
        test_coverage: null

  # ============== Wave 1: 确认 main 状态（与清理并行）==============
  - id: "task-1b-verify-main-clean"
    title: "确认 main 分支无未提交更改"
    description: |
      在执行任何操作前，确认 main 分支是干净状态。

      **步骤：**

      1. 切换到主仓库并确认在 main 分支：
         ```bash
         cd "/Volumes/Extreme SSD/WorkSpace/GameFramework-Cocos"
         git checkout main
         git status --short
         ```

      2. 若有未提交更改，先 stash 或 commit：
         ```bash
         # 如果有更改
         git stash -m "pre-worktree-separation"
         ```

      3. 确认 core.fileMode 设置：
         ```bash
         git config core.fileMode false
         ```

      4. 记录当前 HEAD（用于后续验证）：
         ```bash
         git log --oneline -1
         ```
    wave: 1
