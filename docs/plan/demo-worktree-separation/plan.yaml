          - "3 个分支和 main 指向同一 commit hash"
        acceptance_criteria:
          - "feature/demo1-idle 分支已创建，指向 main HEAD"
          - "feature/demo2-rpg 分支已创建，指向 main HEAD"
          - "feature/demo3-autochess 分支已创建，指向 main HEAD"
