# ============================================================
# 5. 构建配置
# ============================================================
build_config:
  tool: esbuild
  version: "^0.28.0"
  platform: browser
  format: iife
  tsconfig: tsconfig.json
  aliases:
    "@framework": "./assets/scripts/framework"
    "@game": "./assets/scripts/game"
    "@utils": "./assets/scripts/utils"
    "@runtime": "./assets/scripts/runtime"
  no_separate_esbuild_config_file: true  # 全部内联在 package.json scripts 中
  serve_tool: "npx serve"

  dist_tracking:
    tracked_html:
      - dist/demo1/index.html
      - dist/demo2/index.html
    untracked:
      - dist/demo3/index.html  # .gitignore 中无 !dist/demo3/index.html 例外

  gitignore_rules: |
    dist/
    !dist/demo1/index.html
    !dist/demo2/index.html

# ============================================================
# 6. E2E 测试配置
# ============================================================
e2e_config:
  tool: "@playwright/test ^1.59.1"
  config_file: playwright.config.ts
  test_dir: "./tests/e2e"
  timeout: 60000
  workers: 1
  base_url: "http://localhost:3002"
  headless: true
  web_server:
    command: "npm run demo2:serve"
    port: 3002
    reuse_existing_server: true
  test_files:
    - tests/e2e/demo2-rpg.e2e.test.ts
  notes: |
    当前 E2E 仅覆盖 demo2-rpg。
    Playwright 配置硬编码了 demo2 的端口和 webServer 命令。
    demo1 和 demo3 无 E2E 测试。
    worktree demo0/demo1 均无 playwright.config.ts。

