plan_id: demo-worktree-separation
objective: "将 demo 代码从 main 分离到独立 worktree，main 仅保留框架层代码"
focus_area: git-worktree-demo-isolation
created_at: "2026-04-24T16:30:00+08:00"
created_by: gem-researcher
status: completed

tldr: |
  - main 分支包含全部 3 个 demo（demo1-idle, demo2-rpg, demo3-autochess）的源码、测试、E2E、构建脚本
  - 已有 2 个 worktree（demo0 基础设施、demo1 idle-clicker），但分支均落后 main 33-45 个提交，且无领先 main 的提交
  - Demo 间无交叉依赖，均单向依赖 shared/ 基础设施（DemoBase, HtmlRenderer, 12 个 Mock 策略）和 framework/
  - Framework 层无任何对 game/ 层的反向依赖，分离是安全的
  - 关键决策：shared/ 放 main 还是仅放 worktree、dist/HTML 跟踪策略、E2E 归属

research_metadata:
  methodology: "hybrid retrieval: git worktree list + git branch -a + git diff --name-only + find + grep + read_file"
  scope: "完整覆盖：git 状态、文件分布、import 依赖、构建脚本、测试分布、E2E 配置、dist 跟踪"
  confidence: high
  coverage: 98
  decision_blockers: 3
  research_blockers: 0

