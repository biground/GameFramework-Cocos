    options:
      - "A: shared/ 留 main — 各 worktree 通过 rebase/merge 获取"
      - "B: shared/ 移到 demo0 专用分支 — 其他 demo 分支 merge demo0 获取"
      - "C: shared/ 移除 main，各 worktree 独立维护 — 最大隔离但有维护成本"

  - question: "分离策略：main 移除 demo 文件后，现有 worktree 如何同步？"
    context: "demo0 和 demo1 分支已落后 main 45/33 个提交。需要先 rebase 到最新 main 再操作。"
    type: decision_blocker
    affects: [demo0, demo1, demo2, demo3]
    options:
      - "A: 先 rebase 已有 worktree 到 main → main 删除 demo 文件 → 新建 demo2/demo3 分支从删除前的 main 切出"
      - "B: main 先删除 demo → 各 worktree 分支从删除前的 commit 切出 → cherry-pick 框架更新"

  - question: "dist/demoN/index.html 跟踪策略？"
    context: "demo1/demo2 HTML 被 .gitignore 例外跟踪。demo3 未被跟踪。分离后 main 应移除这些例外。"
    type: decision_blocker
    affects: [gitignore, dist]

