      game_relevance: '多语言游戏支持。Demo 中验证运行时语言切换'
      test_depth: '489 行（manager 371 + defs 118），覆盖翻译/占位符/切换/事件'

    - module: Logger
      priority: 0
      capability_summary: '静态 API + ModuleBase 混合方案，ILogOutput 策略注入，Tag 过滤，时间戳，错误自动堆栈，Ring Buffer 历史，颜色编码，time/timeEnd 性能计时'
      key_apis:
