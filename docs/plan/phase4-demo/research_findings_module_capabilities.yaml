      game_relevance: '运行时调试信息采集。Demo 中展示模块状态、事件统计等调试数据'
      test_depth: '216 行（manager 122 + datasources 94），覆盖注册/采集/快照/容错'

    - module: HotUpdateManager
      priority: 350
      capability_summary: '两阶段版本检查（轻量版本号 + 完整清单），差量下载，MD5 校验，回退机制，Push+Pull 混合通知'
      key_apis:
          - 'setAdapter() / setComparator() / setConfig()'
