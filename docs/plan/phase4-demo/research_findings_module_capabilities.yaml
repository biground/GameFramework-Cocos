      game_relevance: '版本更新流程。Demo 中模拟完整的版本检查→下载→校验→应用流程'
      test_depth: '467 行，覆盖两阶段检查/差量计算/MD5/回退/事件'

# ═══════════════════════════════════════════════════════
# 模块协作模式分析
# ═══════════════════════════════════════════════════════

module_collaboration_patterns:
    - pattern: 'Procedure 流程驱动'
      description: 'ProcedureManager 通过 FSM 驱动游戏主流程，每个 Procedure 内部协调其他模块'
      modules: [ProcedureManager, FSM]
      example: 'Launch→Preload(ResourceManager)→Menu(UIManager)→Game(EntityManager+Timer)→GameOver'

    - pattern: '事件总线解耦'
      description: '所有模块间通信走 EventManager，EventKey<T> 保证类型安全'
      modules: [EventManager, '*']
      example: 'Network 收到消息 → emit(PACKET_RECEIVED) → 业务层 handler 处理'

    - pattern: '策略注入（Framework→Runtime 解耦）'
      description: 'Framework 层定义 I*接口，Runtime/Demo 层注入具体实现'
      modules:
          [
              ResourceManager,
              AudioManager,
              SceneManager,
              UIManager,
              EntityManager,
              NetworkManager,
              DataTableManager,
              LocalizationManager,
          ]
      example: 'ResourceManager.setResourceLoader(mockLoader) — 纯逻辑层可完全 Mock'

    - pattern: '对象池复用链'
      description: 'ObjectPool 为 Entity/UI/Resource 提供底层对象复用'
      modules: [ObjectPool, EntityManager, UIManager, ResourceManager]
      example: 'EntityManager 的 EntityGroup 双池 = ObjectPool 思想的业务层体现'

    - pattern: 'Resource 资源联动'
      description: '多个上层模块通过 ResourceManager 加载资产，引用计数管理生命周期'
      modules:
          [
              ResourceManager,
              AudioManager,
              UIManager,
              EntityManager,
              SceneManager,
              DataTableManager,
              LocalizationManager,
          ]
      example: 'UIManager.openForm → ResourceManager.loadAsset → 创建 UI → 关闭时 releaseAsset'

    - pattern: 'Timer + 游戏逻辑'
      description: 'TimerManager 驱动各种时间相关的游戏逻辑'
      modules: [TimerManager, EntityManager, FSM]
      example: '技能冷却 Timer → 到期 → FSM changeState → 实体行为变化'

    - pattern: 'DebugPanel 数据采集'
      description: 'DebugManager 通过 DataSource 插件采集各模块运行时数据'
      modules: [DebugManager, ModuleDataSource, EventDataSource, '*']
      example: 'ModuleDataSource 采集所有注册模块状态，EventDataSource 采集事件统计'

