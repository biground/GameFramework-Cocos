      game_relevance: '怪物属性表、装备表、关卡配置表、技能表。配置驱动的游戏逻辑核心'
      test_depth: '393 行，覆盖双存储模式/indexMap/解析器注入/增删查'

    - module: LocalizationManager (i18n)
      priority: 320
      capability_summary: '多语言管理，ILocalizationLoader 策略注入，动态语言切换 + 占位符替换 + 事件广播'
      key_apis:
          - 'setLanguage() / getLanguage() / t(key, params?) — 翻译键值'
