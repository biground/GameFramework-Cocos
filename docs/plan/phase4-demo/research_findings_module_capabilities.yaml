plan_id: phase4-demo
objective: '分析 Framework Blaze Ignite 全部已完成模块的能力边界，为 Phase 4 综合 Demo 设计提供模块-游戏类型匹配矩阵'
focus_area: module_capabilities
created_at: '2026-04-20'
created_by: gem-researcher
status: completed

tldr: |
    - 框架共 17 个已完成模块（含 2 个 Timer 插件），覆盖核心基础设施、资源管理、UI、实体、网络、音频、场景、定时器、数据表、多语言、热更新、调试全链路
    - 模块间通过 EventManager 解耦通信，所有策略接口（IResourceLoader、IAudioPlayer、ISceneLoader、IEntityFactory、IUIFormFactory、INetworkSocket、IPacketHandler、IDataTableParser）支持 Mock 注入，适合纯逻辑 Demo
    - Procedure（流程管理）+ FSM（状态机）组合是游戏流程驱动的核心骨架，几乎所有 Demo 都会依赖
    - Entity 模块虽标记"待开发"于 architecture.md，但实际已完成（31 个测试），具备 EntityGroup 双池 + IEntityFactory 策略注入
    - 薄弱验证区域：模块间协作的集成场景（如 Resource→Entity→ObjectPool 联动）、Procedure 流程驱动完整游戏循环、DataTable 驱动游戏配置、i18n 运行时切换、HotUpdate 完整流程、DebugPanel 实战采集

research_metadata:
    methodology: 'hybrid retrieval: semantic_search + grep_search + file_search + read_file，逐模块分析 Defs/Interface/Manager/Test'
    scope: '全部 17 个已完成模块 + 2 个 Timer 插件，覆盖接口定义、核心实现、测试文件'
    confidence: high
    coverage: 95
    decision_blockers: 0
    research_blockers: 0

# ═══════════════════════════════════════════════════════
# 模块能力详细分析
# ═══════════════════════════════════════════════════════

module_capabilities:
    - module: Core (GameEntry / ModuleBase / GameModule)
      priority: 0
      capability_summary: '框架入口，模块注册/获取/生命周期管理，priority 排序，脏标记优化'
      key_apis:
          - 'GameEntry.registerModule() / getModule<T>() / update() / shutdown()'
          - 'GameModule.register() — 支持 allowReplace 插件替换'
      game_relevance: '所有 Demo 的基础骨架，负责初始化和主循环驱动'
      test_depth: '143 行，覆盖注册/获取/生命周期/priority 排序'

    - module: EventManager
      priority: 10
      capability_summary: '强类型事件系统，EventKey<T> phantom type，on/once/off/offAll/offByCaller/emit，快照遍历安全'
      key_apis:
          - 'EventKey<T> — 编译期类型安全'
          - 'on() / once() / off() / offByCaller() / emit()'
          - 'emit 采用 emitDepth + _removed 延迟清理（已优化无 slice 拷贝）'
      game_relevance: '所有模块间通信的中枢，事件驱动架构的基石。适用于：游戏事件广播、UI 通知、网络消息分发'
      test_depth: '144 行，覆盖基础订阅/取消/once/批量/遍历安全'

    - module: ObjectPool
      priority: 20
      capability_summary: '泛型对象池，IPoolable 接口，acquire/release，Set O(1) 防重复入池，池统计'
      key_apis:
          - 'acquire<T>() / release() / clearPool() / clearAll() / getStats() / setMaxSize()'
          - 'IPoolable: onSpawn() / onRecycle()'
      game_relevance: '子弹、特效、敌人等频繁创建销毁对象的性能优化。几乎所有游戏类型都需要'
      test_depth: '181 行，覆盖创建/回收/防重复/统计/最大容量'

    - module: DI/IoC Container
      priority: N/A (工具模块)
      capability_summary: '装饰器依赖注入，@Injectable/@Inject，Container.resolve()，ServiceKey<T> phantom type，循环依赖检测'
      key_apis:
          - '@Injectable / @Inject / Container.resolve()'
          - '支持 singleton / transient 生命周期'
      game_relevance: '游戏服务层解耦，如战斗计算器、AI 决策器的依赖注入'
      test_depth: '436 行（container 292 + decorators 144），覆盖深度最高的模块之一'

    - module: FSM (有限状态机)
      priority: 100
      capability_summary: '泛型状态机，IFsmState<T> 生命周期（onInit/onEnter/onUpdate/onLeave/onDestroy），Blackboard 数据共享，Constructor 类型映射'
      key_apis:
          - 'createFsm<T>() / destroyFsm() / getFsm() / hasFsm()'
          - 'IFsm.changeState<TState>() / getData<V>() / setData()'
          - 'IFsm.start() — 启动状态机'
      game_relevance: '角色状态（Idle/Run/Attack/Die）、AI 行为、游戏流程。核心游戏逻辑模块'
      test_depth: '593 行（fsm 328 + fsm-manager 265），测试最充分的模块'

    - module: ProcedureManager (流程管理器)
      priority: 300
      capability_summary: '基于 FSM 的游戏流程驱动，ProcedureBase 继承 FsmState，changeProcedure() 流程切换'
      key_apis:
          - 'initialize() / startProcedure() / hasProcedure() / currentProcedure'
          - 'ProcedureBase.changeProcedure(fsm, TargetProcedure)'
      game_relevance: '游戏主流程骨架：Launch→CheckVersion→Preload→Menu→Game→GameOver→Settlement'
      test_depth: '134 行，覆盖基础流程切换，但未验证复杂多流程场景'

    - module: ResourceManager
      priority: 110
      capability_summary: '资源加载/释放/引用计数，owner 粒度去重，加载去重，IResourceLoader 策略注入，预加载'
      key_apis:
          - 'setResourceLoader() / loadAsset() / releaseAsset() / releaseByOwner()'
          - 'preload() / hasAsset() / getAssetRefCount() / getAssetInfo()'
      game_relevance: '所有需要加载资源的场景：预制体、音频、数据表、场景。Demo 中通过 Mock IResourceLoader 模拟'
      test_depth: '394 行，覆盖加载/释放/引用计数/去重/预加载'

    - module: UIManager
      priority: 200
      capability_summary: 'UI 分层管理（5 层），表单栈 + Cover/Reveal 生命周期，allowMultiple 多实例，IUIFormFactory 策略注入'
      key_apis:
          - 'registerForm() / openForm() / closeForm() / closeAllForms()'
          - 'UILayer: Background/Normal/Fixed/Popup/Toast'
          - 'UIFormBase 生命周期: onOpen/onClose/onCover/onReveal/onUpdate'
      game_relevance: '菜单系统、背包、设置面板、弹窗。HTML Demo 中可简化为 div 层级模拟'
      test_depth: '425 行，覆盖分层/栈管理/Cover-Reveal/多实例'

    - module: EntityManager
      priority: 220
      capability_summary: '实体管理 + EntityGroup 双池（活跃池/等待池），_entityGroupMap O(1) 反查，IEntityFactory 策略注入'
      key_apis:
          - 'showEntity() / hideEntity() / getEntity()'
          - 'EntityGroup: 按分组管理实体生命周期'
          - 'EntityBase: onInit/onShow/onHide/onUpdate'
      game_relevance: '游戏实体（玩家、敌人、子弹、道具、NPC）的生命周期管理。核心游戏逻辑模块'
      test_depth: '252 行，覆盖显示/隐藏/分组/双池/反查'

    - module: NetworkManager
      priority: 120
      capability_summary: '多通道 WebSocket 管理，双策略注入（INetworkSocket + IPacketHandler），心跳检测，指数退避重连'
      key_apis:
          - 'createChannel() / destroyChannel() / getChannel()'
          - 'Channel: connect() / send() / close()'
          - 'setHeartbeatHandler() / setEventManager()'
          - '自动重连：baseDelay * 2^(n-1)'
      game_relevance: '多人在线游戏、实时对战、聊天系统、排行榜同步'
      test_depth: '895 行，测试最多的模块，覆盖连接/断开/重连/心跳/编解码'

    - module: AudioManager
      priority: 210
      capability_summary: 'Music 单实例 + Sound 多实例叠加，三级音量乘法链（Master×Music/Sound×Individual），静音不改属性，IAudioPlayer 策略注入'
      key_apis:
          - 'playMusic() / stopMusic() / pauseMusic() / resumeMusic()'
          - 'playSound() / stopSound() / stopAllSounds()'
          - 'setMasterVolume() / setMusicVolume() / setSoundVolume() / setMuted()'
      game_relevance: '所有游戏的音频管理。Demo 中通过 Mock IAudioPlayer 输出日志模拟'
      test_depth: '445 行，覆盖播放/停止/暂停/音量链/静音'

    - module: SceneManager
      priority: 230
      capability_summary: '场景加载/卸载，三层加载去重，ISceneLoader 策略注入，异步回调 + 事件预留'
      key_apis:
          - 'setSceneLoader() / loadScene() / currentScene / isLoading'
          - 'LoadSceneCallbacks: onProgress / onSuccess / onFailure'
      game_relevance: '场景切换：主菜单→游戏场景→结算场景。Demo 中模拟场景切换逻辑'
      test_depth: '216 行，覆盖加载/去重/回调/错误处理'

    - module: TimerManager
      priority: 30
      capability_summary: '定时器管理，mark-delete 遍历安全，repeat/initialDelay/useTimeScale/tag，timeScale 时间缩放'
      key_apis:
          - 'addTimer() / removeTimer() / removeAllTimers() / removeTimersByTag()'
          - 'pauseTimer() / resumeTimer() / pauseTimersByTag() / resumeTimersByTag()'
          - 'timeScale — 全局时间缩放（子弹时间效果）'
          - "tag 分组 — 如 'combat' / 'ui-anim' / 'buff'"
      game_relevance: '技能冷却、Buff 持续时间、波次生成、倒计时、自动保存。几乎所有游戏类型核心'
      test_depth: '428 行，覆盖添加/删除/暂停/tag/timeScale/溢出精度'

    - module: fbi-timer-heap (最小堆定时器插件)
      priority: 30 (替换 TimerManager)
      capability_summary: 'MinHeap 数据结构实现 ITimerManager，绝对到期时间 expireTime，触发 O(k log n)'
      game_relevance: '大量定时器场景（如 MMO 千级 Buff）的性能优化替代'
      test_depth: '47 个测试（独立包）'

    - module: fbi-timer-wheel (时间轮定时器插件)
      priority: 30 (替换 TimerManager)
      capability_summary: '时间轮实现 ITimerManager，slot 数组 + 整数 tick + 多圈 remainingRounds，添加/触发 O(1)'
      game_relevance: '海量定时器场景的性能优化替代，与 heap 互为备选'
      test_depth: '39 个测试（独立包）'

    - module: DataTableManager
      priority: 310
      capability_summary: '泛型数据表容器，双存储模式（Map O(1) 随机查询 / Array 顺序遍历），indexMap 空间换时间，IDataTableParser 策略注入'
      key_apis:
          - 'createTable<T>() / destroyTable() / getTable() / hasTable()'
          - 'DataTable<T>: getRow() / getAllRows() / getRowCount()'
