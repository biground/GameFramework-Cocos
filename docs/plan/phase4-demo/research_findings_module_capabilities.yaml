      game_relevance: '所有 Demo 的日志输出中枢。HTML Demo 中通过 ILogOutput 将日志渲染到页面'
      test_depth: '512 行，覆盖级别/Tag/Output/Ring Buffer/time'

    - module: DebugManager (调试面板)
      priority: 400
      capability_summary: 'DataSource 插件化采集，分层采集频率，容错隔离，快照缓存'
      key_apis:
          - 'registerDataSource() / unregisterDataSource() / collectAll()'
