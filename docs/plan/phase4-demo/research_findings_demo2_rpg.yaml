      responsibility: "分层栈式 UI 表单管理"
      location: assets/scripts/framework/ui/UIManager.ts
      relationship_to_domain: "Demo 2 需多个面板：角色信息、技能选择、战斗日志、结算"

  interfaces_used_by_domain:
    - interface: IEntityFactory
      location: assets/scripts/framework/entity/EntityDefs.ts
      usage_pattern: "MockEntityFactory 已实现，DemoBase 自动注入"
    - interface: IFsmState<T>
      location: assets/scripts/framework/fsm/FsmDefs.ts
      usage_pattern: "战斗 FSM 的 6 个状态和角色 FSM 的 4 个状态需实现此接口（或继承 FsmState）"
    - interface: IFsm<T>
      location: assets/scripts/framework/fsm/FsmDefs.ts
      usage_pattern: "各状态通过 IFsm 访问 getData/setData/changeState"

  data_flow_involving_domain: |
    DemoBase.bootstrap() → 15 模块注册 → setupProcedures 创建战斗系统 + 注册 7 个 Procedure →
    setupDataTables 注册 4 张配置表 → startProcedure(Launch) →
    Launch → Preload（加载配置表数据注入系统）→ Lobby（展示编队 UI + 选关）→
    BattlePrep（创建玩家/敌人 Entity）→ Battle（BattleFsm 驱动回合制战斗）→
    Settle（结算经验/金币）→ Lobby（循环）

  key_relationships_to_domain:
    - from: TurnBasedRpgDemo
      to: DemoBase
      relationship: inherits
    - from: BattleProcedure
      to: FsmManager
      relationship: "calls createFsm 创建 BattleFsm"
    - from: BattleFsm states
      to: EntityManager
      relationship: "calls showEntity/hideEntity/getEntitiesByGroup"
    - from: Procedures
      to: DataTableManager
      relationship: "calls getRow/getAllRows 查询配置"
    - from: BattleFsm states
      to: EventManager
      relationship: "emits 战斗事件（攻击/受伤/死亡/回合切换）"
    - from: Battle states
      to: AudioManager
      relationship: "calls playSound/playMusic"

# ═══════════════════════════════════════════════════════
# 4. 设计文档摘要（Demo 2 专属）
# ═══════════════════════════════════════════════════════

related_conventions:
  naming_patterns_in_domain: |
    - Demo 类：TurnBasedRpgDemo（PascalCase）
    - 事件键前缀：'rpg:' + event_name（如 'rpg:attack', 'rpg:character_dead'）
    - FSM 名：'battle_fsm'（BattleFsm）、'character_fsm_{entityId}'（CharacterFsm）
    - Entity 分组：'player'、'enemy'
    - DataTable 名：'character_config'、'skill_config'、'monster_config'、'stage_config'
    - Procedure：Launch/Preload/Lobby/BattlePrep/Battle/Settle（6+1 = Lobby 循环）
  structure_of_domain: |
    assets/scripts/game/demo2-rpg/
    ├── TurnBasedRpgDemo.ts       # 主入口
    ├── index.ts                   # 导出入口
    ├── data/                      # DataTable 行类型 + 静态数据 + 游戏状态
    │   ├── RpgGameData.ts         # 游戏运行时状态
    │   ├── CharacterConfigRow.ts
    │   ├── SkillConfigRow.ts
    │   ├── MonsterConfigRow.ts
    │   └── StageConfigRow.ts
    ├── events/                    # 事件键定义
    │   └── RpgEvents.ts
    ├── fsm/                       # FSM 定义和状态
    │   ├── BattleFsmDefs.ts       # 战斗 FSM 黑板 + 状态名常量
    │   ├── BattleFsmStates.ts     # 6 个战斗状态
    │   ├── CharacterFsmDefs.ts    # 角色 FSM 黑板
    │   └── CharacterFsmStates.ts  # 4 个角色状态
    ├── procedures/                # Procedure 实现
    │   ├── ProcedureContext.ts     # RPG 专用上下文接口
    │   ├── LaunchProcedure.ts
    │   ├── PreloadProcedure.ts
    │   ├── LobbyProcedure.ts
    │   ├── BattlePrepProcedure.ts
    │   ├── BattleProcedure.ts
    │   └── SettleProcedure.ts
    ├── systems/                   # 游戏系统
    │   ├── BattleSystem.ts        # 回合制战斗引擎
    │   ├── DamageCalculator.ts    # 伤害计算（ATK × rate - DEF）
    │   ├── BuffSystem.ts          # BUFF/DEBUFF 管理
    │   └── EnemyAI.ts             # 敌方 AI 决策
    └── ui/                        # UI 面板
        ├── LobbyPanel.ts          # 大厅：编队 + 选关
        ├── BattlePanel.ts         # 战斗：角色状态 + 技能按钮 + 目标选择
        └── SettlePanel.ts         # 结算：经验/金币/升级
  error_handling_in_domain: "错误消息格式：[模块名] 描述性消息"
  testing_in_domain: |
    tests/integration/demo2-rpg.integration.test.ts
    覆盖要点：完整战斗流程、SPD 回合顺序、伤害公式、技能效果、Entity 生命周期、FSM 状态切换、死亡判定
  documentation_in_domain: "中文 JSDoc，所有 public API"

# ═══════════════════════════════════════════════════════
# 5. 依赖关系
# ═══════════════════════════════════════════════════════

related_dependencies:
  internal:
    - component: DemoBase + HtmlRenderer + MockXxx
      relationship_to_domain: "Demo 2 直接继承和使用"
      direction: outbound
    - component: FsmManager
      relationship_to_domain: "创建 BattleFsm + 多个 CharacterFsm"
      direction: outbound
    - component: ProcedureManager
      relationship_to_domain: "7 个 Procedure 注册和驱动"
      direction: outbound
    - component: EntityManager
      relationship_to_domain: "'player'/'enemy' 分组，showEntity/hideEntity"
      direction: outbound
    - component: EventManager
      relationship_to_domain: "战斗事件流（攻击/受伤/死亡/回合切换/技能释放/BUFF）"
      direction: outbound
    - component: ObjectPool
      relationship_to_domain: "伤害飘字池、战斗特效池、BUFF 图标池"
      direction: outbound
    - component: DataTableManager
      relationship_to_domain: "4 张配置表查询"
      direction: outbound
    - component: AudioManager
      relationship_to_domain: "BGM + 攻击/技能/胜利/失败音效"
      direction: outbound
    - component: UIManager
      relationship_to_domain: "角色信息/技能选择/战斗日志/结算面板"
      direction: outbound
    - component: TimerManager
      relationship_to_domain: "BUFF 持续时间、技能冷却"
      direction: outbound
  external: []

# ═══════════════════════════════════════════════════════
# 6. 测试模式
# ═══════════════════════════════════════════════════════

testing_patterns:
  framework: jest
  coverage_areas:
    - "完整战斗流程（编队→战斗→结算）端到端"
    - "SPD 回合顺序排序"
    - "伤害公式：ATK × damageRate - DEF"
    - "技能效果：眩晕/治疗/BUFF 应用和持续时间"
    - "Entity 生命周期：战前创建 + 战后回收"
    - "FSM 状态切换：BattleFsm 6 状态 + CharacterFsm 4 状态"
    - "死亡判定：HP ≤ 0 触发死亡，全灭判定"
    - "Procedure 切换：Lobby ↔ BattlePrep → Battle → Settle → Lobby"
  test_organization: "tests/integration/demo2-rpg.integration.test.ts"
  mock_patterns:
    - "jest.mock('@framework/debug/Logger') — 静态方法 + 实例化"
    - "jest.useFakeTimers() — 控制 BUFF 计时和技能冷却"
    - "DemoBase 子类 + bootstrap() — 全模块 Mock 环境"

