# 2. 模式发现
# ═══════════════════════════════════════════════════════

patterns_found:
  - category: architecture
    pattern: "DemoBase 子类模式"
    description: |
      每个 Demo 继承 DemoBase，实现两个抽象方法（setupProcedures + setupDataTables），
      然后在 start() 中依次：bootstrap → 预加载配置 → startProcedure → 创建 UI → 注册事件 → startMainLoop。
    examples:
      - file: IdleClickerDemo.ts
        location: "IdleClickerDemo.ts:44-155"
        snippet: |
          export class IdleClickerDemo extends DemoBase {
              constructor() { super('Idle Clicker Demo'); }
              setupProcedures(): void { ... }
              setupDataTables(): void { ... }
              start(): void { this.bootstrap(); ... this.startMainLoop(30); }
          }
    prevalence: common

  - category: architecture
    pattern: "Procedure 上下文共享"
    description: |
      定义 IProcedureContext 接口聚合所有系统引用 →
      procMgr.setData(PROCEDURE_CONTEXT_KEY, ctx) 写入 FSM 共享数据 →
      各 Procedure 在 onEnter 中 fsm.getData 获取上下文。
    examples:
      - file: ProcedureContext.ts
        location: "ProcedureContext.ts:20-49"
        snippet: |
          export interface IProcedureContext { gameData; buildingSystem; eventManager; ... }
          export const PROCEDURE_CONTEXT_KEY = '__procedure_context__';
    prevalence: common

  - category: architecture
    pattern: "EventKey 幻影类型事件定义"
    description: |
      使用 EventKey<T> 定义类型安全事件键，命名空间前缀 + 事件名。
      集中在独立 events/ 目录中定义，每个 Demo 一个事件文件。
    examples:
      - file: IdleEvents.ts
        location: "IdleEvents.ts:11"
        snippet: |
          export const GOLD_CHANGED = new EventKey<{ oldGold: number; newGold: number }>('idle:gold_changed');
    prevalence: common

  - category: architecture
    pattern: "FSM 黑板模式"
    description: |
      FSM 状态间通过 getData/setData 共享黑板数据，定义接口 + 数据键常量。
      Demo 1 的 BuildingFsm 用 IBuildingBlackboard 传递 buildingId/buildingSystem/gameData。
    examples:
      - file: BuildingFsmDefs.ts
        location: "BuildingFsmDefs.ts"
        snippet: |
          export interface IBuildingBlackboard { buildingId: number; buildingSystem: BuildingSystem; gameData: IdleGameData; }
          export const BuildingFsmDataKeys = { BLACKBOARD: 'blackboard', ... };
    prevalence: common

  - category: structure
    pattern: "Demo 目录结构"
    description: |
      每个 Demo 目录下包含：data/（数据定义）、events/（事件键）、fsm/（状态机定义和状态）、
      procedures/（Procedure 实现 + ProcedureContext）、systems/（游戏系统）、ui/（面板）、
      主入口类 + index.ts。
    examples:
      - file: demo1-idle/
        location: "assets/scripts/game/demo1-idle/"
        snippet: |
          data/: IdleGameData, BuildingConfigRow, UpgradeCurveRow, AchievementConfigRow
          events/: IdleEvents.ts
          fsm/: BuildingFsmDefs, BuildingFsmStates
          procedures/: 5 个 Procedure + ProcedureContext
          systems/: BuildingSystem, AchievementSystem, OfflineRewardSystem, SaveSystem
          ui/: IdleMainPanel, IdleSettingsPanel
          IdleClickerDemo.ts + index.ts
    prevalence: common

  - category: testing
    pattern: "集成测试模式"
    description: |
      @jest-environment jsdom。Logger 完整 mock（静态方法 + 实例化）。
      TestDemo 继承 DemoBase 作为测试子类。
      beforeEach: shutdownAll + new。afterEach: shutdown + DOM 清理。
      jest.useFakeTimers() 控制时间推进。
    examples:
      - file: demo0-infrastructure.test.ts
        location: "tests/integration/demo0-infrastructure.test.ts:1-100"
        snippet: |
          jest.mock('@framework/debug/Logger', () => { class MockLogger { ... } return { Logger: MockLogger }; });
          class TestDemo extends DemoBase { ... }
    prevalence: common

  - category: naming
    pattern: "事件命名空间前缀"
    description: "每个 Demo 的事件键使用 'demoName:event_name' 前缀，如 'idle:gold_changed'"
    examples:
      - file: IdleEvents.ts
        location: "IdleEvents.ts"
        snippet: "'idle:click_mine', 'idle:building_purchased'"
    prevalence: common

