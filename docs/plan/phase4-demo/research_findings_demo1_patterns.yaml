# ============================================================
# 11. 集成测试模式
# ============================================================
integration_test:
  note: "Demo 1 无独立集成测试文件，仅有 Demo 0 基础设施测试"

  demo0_test:
    file: tests/integration/demo0-infrastructure.test.ts
    jest_environment: jsdom
    mock_pattern: |
      jest.mock('@framework/debug/Logger', () => {
        class MockLogger {
          moduleName = 'Logger'; priority = 0;
          onInit = jest.fn(); onUpdate = jest.fn(); onShutdown = jest.fn();
          static debug = jest.fn(); static info = jest.fn();
          static warn = jest.fn(); static error = jest.fn();
        }
        return { Logger: MockLogger };
      });
    test_class_pattern: |
      class TestDemo extends DemoBase {
        setupProceduresCalled = false;
        setupDataTablesCalled = false;
        constructor() { super('集成测试 Demo'); }
        setupProcedures(): void { this.setupProceduresCalled = true; }
        setupDataTables(): void { this.setupDataTablesCalled = true; }
        getRenderer(): HtmlRenderer { return this.htmlRenderer; }
      }
    test_scenarios:
      - name: "全部模块初始化"
        tests:
          - "bootstrap 后 15 个模块均可检测到"
          - "各模块类型正确（instanceof 检查）"
          - "子类扩展点被调用"
      - name: "主循环模拟"
        setup: "jest.useFakeTimers()"
        tests:
          - "startMainLoop 后 GameModule.update 被周期性驱动"
          - "stopMainLoop 后不再驱动 update"
      - name: "Mock 策略注入验证"
        tests:
          - "ResourceManager loadAsset 不抛异常"
          - "AudioManager playMusic/playSound 不抛异常"
          - "DataTableManager createTableFromRawData 可解析"
      - name: "HtmlRenderer 集成"
        tests:
          - "DOM 中存在 HtmlRenderer 创建的元素"
          - "日志方法可正常调用并写入 DOM"
      - name: "shutdown 清理"
        tests:
          - "主循环停止"
          - "所有模块被清理"
          - "getModule 抛出异常"

# ============================================================
# 12. 子系统目录结构（快速参考）
# ============================================================
systems:
  directory: assets/scripts/game/demo1-idle/systems/
  files:
    - BuildingSystem.ts
    - AchievementSystem.ts
    - OfflineRewardSystem.ts
    - SaveSystem.ts
