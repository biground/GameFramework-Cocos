# ============================================================
# 13. 完整目录结构
# ============================================================
directory_structure:
  assets/scripts/game/demo1-idle/:
    - IdleClickerDemo.ts          # Demo 入口
    - data/:
      - IdleGameData.ts           # 运行时状态 + 序列化
      - BuildingConfigRow.ts      # DataTable 行 + 内联数据
      - UpgradeCurveRow.ts        # DataTable 行 + 生成函数
      - AchievementConfigRow.ts   # DataTable 行 + 内联数据
    - events/:
      - IdleEvents.ts             # 所有 EventKey 定义
    - fsm/:
      - BuildingFsmDefs.ts        # 状态名常量 + 黑板接口 + 数据键
      - BuildingFsmStates.ts      # 4 个状态类实现
    - procedures/:
      - ProcedureContext.ts       # 共享上下文接口 + 键常量
      - LaunchProcedure.ts        # 启动 → 预加载
      - PreloadProcedure.ts       # 加载配置 → 离线结算
      - OfflineSettleProcedure.ts # 存档恢复 → 主流程
      - MainProcedure.ts          # 游戏主循环（含定时器管理）
      - SettingsProcedure.ts      # 设置界面
    - systems/:
      - BuildingSystem.ts         # 建筑购买/升级/产出
      - AchievementSystem.ts      # 成就检测/解锁
      - OfflineRewardSystem.ts    # 离线收益计算
      - SaveSystem.ts             # 存档读写
    - ui/:
      - IdleMainPanel.ts          # 主界面面板
      - IdleSettingsPanel.ts      # 设置面板

  assets/scripts/game/shared/:
    - DemoBase.ts                 # 抽象基类
    - HtmlRenderer.ts             # HTML 渲染器
    - MockEntityFactory.ts        # 实体工厂 Mock
    - MockUIFormFactory.ts        # UI 工厂 Mock
    - MockResourceLoader.ts
    - MockAudioPlayer.ts
    - MockSceneLoader.ts
    - MockDataTableParser.ts
    - MockHotUpdateAdapter.ts
    - MockLocalizationLoader.ts
    - MockNetworkSocket.ts
    - MockVersionComparator.ts

