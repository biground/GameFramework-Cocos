plan_id: phase4-demo
objective: "审计 Demo0 共享基础设施所有文件的实现状态，对比 demo-design.md 规范，识别差距"
focus_area: demo0-shared-infrastructure-audit
created_at: "2026-04-21"
created_by: gem-researcher
status: completed

tldr: |
  - 12 个共享文件中：1 个完整实现（MockResourceLoader），2 个部分实现（DemoBase、MockNetworkSocket），2 个骨架（HtmlRenderer、MockVersionComparator — 有类/方法但逻辑未实现），7 个空文件
  - 6 个测试文件全部为空（0 行测试代码），1 个集成测试文件也为空
  - MockResourceLoader 是唯一可立即使用的 Mock，具备完整的异步加载、resolve/reject、autoSuccess、延迟模拟功能
  - DemoBase 与规范差距巨大：规范要求 bootstrap()、startMainLoop()、getModule()、setupProcedures()、setupDataTables()；当前只有 start()/stop()/isRunning
  - HtmlRenderer 规范要求 log()、separator()、createButtonGroup()、addButton()、createStatusPanel()、updateStatus()、createTable()；当前仅有 render()/renderWithStyle()（完全不匹配）
  - MockNetworkSocket 有基本的 connect/send/close/simulateMessage，但缺少规范中的 latency 模拟、autoResponse、丢包率、simulateDisconnect/Reconnect

