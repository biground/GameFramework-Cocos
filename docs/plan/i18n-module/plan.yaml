          - 原因：此方法用于初始化时批量加载翻译数据，外部调用者不应直接调用
          - 使用场景：onInit() 生命周期中调用 _loadAllTranslations()
          - ILocalizationManager 接口中不包含此方法

          实现步骤：
          1. 创建类骨架，继承 ModuleBase
          2. 实现 _flattenObject() 扁平化方法
          3. 实现 _interpolate() 插值方法（含边界处理）
          4. 实现 onInit/onShutdown 生命周期
          5. 实现 setLanguage/getCurrentLanguage（相同语言检查）
          6. 实现 t() 方法（扁平化查询 + 参数插值）
          7. 实现 hasKey/getAllLanguages
          8. 实现 loadTranslations() 方法加载翻译数据

          参考 DataTableManager.ts 和 AudioManager.ts 的实现模式。
