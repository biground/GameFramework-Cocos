    - id: task_003
      title: 实现 LocalizationManager 核心类
      description: |
          实现 LocalizationManager 核心逻辑，继承 ModuleBase，实现 ILocalizationManager。

          文件路径：assets/scripts/framework/i18n/LocalizationManager.ts

          核心实现要点：
          1. 继承 ModuleBase，priority=350（上层逻辑层）
          2. 内部存储：Map<string, Map<string, string>> (flatKey → lang → value)，使用扁平化 dot-notation key
          3. 嵌套 key 解析：初始化时将嵌套 JSON 扁平化为 dot-notation keys
          4. 参数插值：[name] → Player，支持转义 [[key]] → [key]，支持边界情况处理
          5. 语言切换事件广播（相同语言不广播）

          存储结构设计：
          - 输入：嵌套 JSON 对象 { item: { sword: { name: "剑" } } }
          - 存储：Map<flatKey, Map<lang, value>>，如 'item.sword.name' → { 'zh-CN': '剑', 'en-US': 'Sword' }
          - 原因：支持多语言存储，扁平化 key 查询 O(1)，避免运行时递归解析

          _flattenObject() 方法实现：
          ```typescript
          private _flattenObject(obj: Record<string, unknown>, prefix: string = ''): Map<string, string> {
              const result = new Map<string, string>();
              for (const [key, value] of Object.entries(obj)) {
                  const fullKey = prefix ? `${prefix}.${key}` : key;
                  if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                      // 递归扁平化嵌套对象
                      const nested = this._flattenObject(value as Record<string, unknown>, fullKey);
                      for (const [nestedKey, nestedValue] of nested) {
                          result.set(nestedKey, nestedValue);
                      }
                  } else {
                      // 叶子节点：转换为字符串存储
                      result.set(fullKey, String(value));
                  }
              }
              return result;
          }
          ```

          参数插值边界处理：
          ```typescript
          private _interpolate(template: string, params?: Record<string, string>): string {
              if (!params) return template;
              // 先处理转义：[[key]] → [key]
              let result = template.replace(/\[\[(\w+)\]\]/g, '[$1]');
              // 再处理参数插值
              return result.replace(/\[(\w+)\]/g, (match, key) => {
                  return params[key] ?? match;
              });
          }
          ```
          - 参数不存在：保留原始 [key] 标记（如 '[name]'）
          - 支持转义：使用 [[key]] 表示字面量 [key]
          - 嵌套括号：正则只匹配 [\w+]，忽略 [[...]] 转义

          setLanguage() 边界处理：
          ```typescript
          public setLanguage(lang: string): void {
              if (this._currentLanguage === lang) {
                  // 相同语言不广播事件，直接返回
                  return;
              }
              const previousLanguage = this._currentLanguage;
              this._currentLanguage = lang;
              // 广播语言切换事件
              EventManager.emit(LocalizationEvent.LANGUAGE_CHANGED, {
                  previousLanguage,
                  currentLanguage: lang
              });
          }
          ```

          getTranslations() 方法评估：
          - 决策：标记为 @internal，仅内部使用，不暴露到公共接口
          - 原因：外部调用者应使用 t() 和 hasKey()，不应直接访问底层数据
          - ILocalizationManager 接口中移除此方法

          loadTranslations() 方法评估：
