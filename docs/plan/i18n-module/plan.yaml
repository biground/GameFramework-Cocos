    - id: task_004
      title: 设计配置表格式和加载策略
      description: |
          设计 i18n 配置表格式，复用 DataTable 模块。

          配置表设计：
          1. 主表：languages.csv（定义支持的语言）
          2. 翻译表：i18n_{lang}.csv（每种语言一个文件）

          languages.csv 格式：
          id,code,name
          1,zh-CN,简体中文
          2,en-US,English
          3,ja-JP,日本語
          4,ko-KR,한국어

          i18n_{lang}.csv 格式：
          id,key,value
          1,game.title,游戏标题
          2,item.sword.name,长剑
          3,item.sword.desc,一把锋利的长剑
          4,greeting.welcome,欢迎 [name]！

          文件路径约定：
          - resources/i18n/languages.csv
          - resources/i18n/i18n_zh-CN.csv
          - resources/i18n/i18n_en-US.csv
          - resources/i18n/i18n_ja-JP.csv
          - resources/i18n/i18n_ko-KR.csv

          批量加载策略：
          ```typescript
          private async _loadAllTranslations(): Promise<void> {
              const dataTableMgr = GameEntry.getModule<DataTableManager>('DataTableManager');
              const languages = this.getAllLanguages();

              // 批量加载所有语言的翻译文件
              const loadPromises = languages.map(async (lang) => {
                  const tableName = `i18n_${lang}`;
                  try {
                      // 使用 ResourceManager 加载 CSV 文件
                      const csvData = await ResourceManager.loadAsset<string>(
                          `resources/i18n/i18n_${lang}.csv`,
                          AssetType.TEXT
                      );
                      // 移除 BOM 头，确保解析正确
                      const cleanData = this._stripBOM(csvData);
                      // 复用 DataTableManager 的 createTableFromRawData 方法
                      dataTableMgr.createTableFromRawData<ILocalizationRow>(tableName, cleanData);
                  } catch (error) {
                      Logger.warn(`[LocalizationManager] 加载语言包失败: ${lang}`, error);
                  }
              });

              await Promise.all(loadPromises);
          }
          ```

          CSV 解析策略：
          - 复用 DataTableManager 的 IDataTableParser 机制
          - 需要实现 CsvDataTableParser（或使用已有的实现）
          - CSV 文件第一行为表头：id,key,value

          UTF-8 BOM 处理：
          ```typescript
          private _stripBOM(content: string): string {
              // 移除 UTF-8 BOM 头（\uFEFF）
              if (content.charCodeAt(0) === 0xFEFF) {
                  return content.slice(1);
              }
              return content;
          }
          ```

          加载到内存流程：
          1. LocalizationManager.onInit() 时调用 _loadAllTranslations()
          2. 对每种语言，加载 i18n_{lang}.csv
          3. 使用 DataTableManager.createTableFromRawData() 解析 CSV
          4. 遍历解析结果，使用 _flattenObject() 扁平化 key
          5. 存储到内部 Map<flatKey, Map<lang, value>>

          大文件优化：
          - 当前决策：全量加载，后续可扩展懒加载
          - 估算：10000 条翻译约 500KB，加载时间 < 100ms

          创建文档说明配置表格式和使用方式。
