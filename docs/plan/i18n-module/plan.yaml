      title: 编写 LocalizationManager 单元测试
      description: |
          编写 LocalizationManager 的完整单元测试。

          文件路径：tests/framework/i18n/localization-manager.test.ts

          测试用例分类：
          1. 基础功能：初始化、默认语言、语言切换
          2. 翻译查询：t() 返回正确翻译、嵌套 key 解析、key 不存在回退
          3. 参数插值：[name] 替换、多个参数、参数不存在处理
          4. 事件广播：setLanguage 广播事件、事件数据正确
          5. 边界情况：空 key、空参数、重复设置相同语言

          边界情况测试用例：
          ```typescript
          // 参数不存在时保留原始 [key]
          test('参数不存在时保留原始标记', () => {
              manager.loadTranslations({ 'greeting': 'Hello [name]!' });
              expect(manager.t('greeting', {})).toBe('Hello [name]!');
          });

          // 转义括号 [[key]] → [key]
          test('转义括号输出字面量', () => {
              manager.loadTranslations({ 'format': 'Use [[brackets]] for params' });
              expect(manager.t('format')).toBe('Use [brackets] for params');
          });

          // 嵌套 key 中间节点不存在
          test('嵌套 key 中间节点不存在返回 key 本身', () => {
              manager.loadTranslations({ 'item.shield.name': 'Shield' });
              expect(manager.t('item.sword.name')).toBe('item.sword.name');
          });

          // 相同语言不广播事件
          test('设置相同语言不触发事件', () => {
              const spy = jest.fn();
              EventManager.on(LocalizationEvent.LANGUAGE_CHANGED, spy);
              manager.setLanguage('zh-CN'); // 默认已是 zh-CN
              expect(spy).not.toHaveBeenCalled();
          });
          ```

          参考 data-table-manager.test.ts 的测试模式。
