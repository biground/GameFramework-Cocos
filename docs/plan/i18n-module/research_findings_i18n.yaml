plan_id: i18n-module
objective: 研究 Forge Blaze Ignite 项目的 i18n（多语言）模块需求和架构设计
focus_area: i18n_localization
created_at: '2026-04-17T15:56:47+08:00'
created_by: gem-researcher
status: completed

tldr: |
    - 项目当前无任何 i18n 相关代码，需要从零设计
    - Framework 层采用分层架构，模块继承 ModuleBase，通过 GameEntry 统一管理
    - DataTable 模块已完成，支持双存储模式（Map/Array）和 IDataTableParser 策略注入
    - 建议采用基于 DataTable 的 i18n 方案，复用现有架构模式
    - LocalizationManager 依赖 ResourceManager 和 EventManager，priority 建议 350
    - 配置表推荐 CSV 格式（策划友好），运行时解析为 Map 结构

