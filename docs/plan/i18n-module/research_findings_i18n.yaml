open_questions:
    - question: 配置表格式选择 CSV 还是 JSON？
      context: 策划需要方便地编辑配置，CSV 在 Excel 中打开方便，JSON 程序解析方便
      type: decision_blocker
      affects: [i18n-config-parser]
    - question: 是否需要支持嵌套 key（如 "item.sword.name"）？
      context: 嵌套 key 可以提供更好的组织结构，但增加解析复杂度
      type: decision_blocker
      affects: [i18n-key-structure]
    - question: 是否需要支持参数插值（如 "Hello, {name}!"）？
      context: 翻译文本中经常需要动态插入变量
      type: decision_blocker
      affects: [i18n-api-design]
    - question: 是否需要支持复数形式（如 "1 apple" vs "2 apples"）？
      context: 不同语言的复数规则不同，需要考虑国际化
      type: research
      affects: [i18n-plural-support]
    - question: 是否需要与 Cocos Creator 内置 i18n 面板集成？
      context: Cocos 有 i18n 面板，但需要程序填写 key，策划不方便
      type: decision_blocker
      affects: [i18n-cocos-integration]

