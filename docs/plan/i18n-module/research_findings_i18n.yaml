related_conventions:
    naming_patterns_in_domain: |
        - 模块命名：XxxManager（如 LocalizationManager）
        - 接口命名：IXxxManager（如 ILocalizationManager）
        - 定义文件命名：XxxDefs.ts（如 LocalizationDefs.ts）
        - 方法命名：驼峰命名法（如 setLanguage, getCurrentLanguage）
    structure_of_domain: |
        framework/i18n/
        ├── ILocalizationManager.ts  # 接口定义
        ├── LocalizationManager.ts   # 实现类
        ├── LocalizationDefs.ts      # 枚举、接口、类型定义
        └── LocalizationKeys.ts      # 自动生成的 key 常量（可选）
    error_handling_in_domain: |
        - 参数校验：关键方法入口检查参数有效性
        - 错误信息：使用 [ModuleName] 前缀，如 '[LocalizationManager] 语言不存在: zh-CN'
        - 日志：使用 Logger.info/warn/error 记录关键操作
    testing_in_domain: |
        - 测试框架：Jest
        - 测试文件位置：tests/framework/i18n/
