patterns_found:
    - category: architecture
      pattern: 模块化注册模式
      description: 所有 Manager 继承 ModuleBase，通过 GameEntry.registerModule() 注册，按 priority 排序初始化
      examples:
          - file: DataTableManager.ts
            location: 'DataTableManager.ts:32-40'
            snippet: |
                export class DataTableManager extends ModuleBase {
                    public get moduleName(): string { return 'DataTableManager'; }
                    public get priority(): number { return 300; }
                }
          - file: AudioManager.ts
            location: 'AudioManager.ts:17-26'
            snippet: |
                export class AudioManager extends ModuleBase implements IAudioManager {
                    public get moduleName(): string { return 'AudioManager'; }
                    public get priority(): number { return 210; }
                }
      prevalence: common

    - category: architecture
      pattern: 策略注入模式
      description: 通过接口定义契约，Runtime 层注入具体实现，实现 Framework 层引擎无关
      examples:
          - file: DataTableManager.ts
            location: 'DataTableManager.ts:48-73'
            snippet: |
                private _parser: IDataTableParser | null = null;
                public setParser(parser: IDataTableParser): void {
                    this._parser = parser;
                }
          - file: AudioManager.ts
            location: 'AudioManager.ts:30-108'
            snippet: |
                private _audioPlayer: IAudioPlayer | null = null;
                public setAudioPlayer(player: IAudioPlayer): void {
                    this._audioPlayer = player;
                }
      prevalence: common

    - category: structure
      pattern: 接口隔离模式
      description: 每个模块定义独立接口文件（IXxxManager），业务层依赖接口而非实现
      examples:
          - file: IUIManager.ts
            location: 'IUIManager.ts'
            snippet: 'export interface IUIManager { ... }'
          - file: IResourceManager.ts
            location: 'IResourceManager.ts'
            snippet: 'export interface IResourceManager { ... }'
      prevalence: common

    - category: structure
      pattern: 双存储模式
      description: DataTable 支持 Map（随机查询）和 Array（顺序遍历）两种存储模式，通过枚举选择
      examples:
          - file: DataTableDefs.ts
            location: 'DataTableDefs.ts:8-13'
            snippet: |
                export enum DataTableStorageMode {
                    Map = 'map',
                    Array = 'array',
                }
          - file: DataTable.ts
            location: 'DataTable.ts:42-48'
            snippet: |
                if (storageMode === DataTableStorageMode.Map) {
                    this._dataMap = new Map();
                } else {
                    this._dataArray = [];
                    this._indexMap = new Map();
                }
      prevalence: common

    - category: error_handling
      pattern: 防御性编程
      description: 关键方法入口检查参数有效性，抛出明确错误信息
      examples:
          - file: UIManager.ts
            location: 'UIManager.ts:89-101'
            snippet: |
                public registerForm(formName: string, config: UIFormConfig): void {
                    if (!formName) { throw new Error('[UIManager] 表单名称不能为空'); }
                    if (!config.path) { throw new Error('[UIManager] 表单资源路径不能为空'); }
                    if (this._formConfigs.has(formName)) { throw new Error(`[UIManager] 表单 "${formName}" 已注册`); }
                }
      prevalence: common

related_architecture:
    components_relevant_to_domain:
        - component: DataTableManager
          responsibility: 管理游戏配置数据表的加载、解析、存储和查询
          location: assets/scripts/framework/datatable/DataTableManager.ts
          relationship_to_domain: 'i18n 可复用 DataTable 存储翻译数据'
        - component: ResourceManager
          responsibility: 资源加载/释放/引用计数
          location: assets/scripts/framework/resource/ResourceManager.ts
          relationship_to_domain: 'i18n 依赖 ResourceManager 加载配置文件'
        - component: EventManager
          responsibility: 强类型事件系统，模块间通信
          location: assets/scripts/framework/event/EventManager.ts
          relationship_to_domain: 'i18n 通过 EventManager 广播语言切换事件'
        - component: UIManager
          responsibility: UI 表单的注册、加载、打开、关闭与生命周期管理
          location: assets/scripts/framework/ui/UIManager.ts
          relationship_to_domain: 'UI 组件监听语言切换事件，自动更新文本'

    interfaces_used_by_domain:
        - interface: IResourceManager
          location: assets/scripts/framework/interfaces/IResourceManager.ts
          usage_pattern: 'LocalizationManager 调用 loadAsset 加载 i18n 配置文件'

    data_flow_involving_domain: |
        1. 游戏启动 → ResourceManager 加载 i18n 配置文件（CSV/JSON）
        2. LocalizationManager 解析配置 → 存储到内部 Map<key, Map<lang, value>>
        3. UI 组件调用 LocalizationManager.t(key) 获取翻译文本
        4. 用户切换语言 → LocalizationManager.setLanguage(lang)
        5. LocalizationManager 广播 LANGUAGE_CHANGED 事件
        6. 已打开的 UI 组件收到事件 → 重新调用 t() 更新文本

    key_relationships_to_domain:
        - from: LocalizationManager
          to: ResourceManager
          relationship: imports
        - from: LocalizationManager
          to: EventManager
          relationship: imports
        - from: UI 组件
          to: LocalizationManager
          relationship: calls

