patterns_found:
    - category: architecture
      pattern: 'esbuild IIFE bundle + 静态 HTML'
      description: 'Demo 1 已建立标准模式：esbuild 将 TS 入口打包为 IIFE → 输出到 dist/demoN/ → HTML 页面通过 <script> 加载'
      examples:
          - file: package.json
            location: 'package.json:13-14'
            snippet: |
                "demo1:build": "esbuild assets/scripts/game/demo1-idle/index.ts --bundle --outfile=dist/demo1/demo1.js --platform=browser --format=iife --tsconfig=tsconfig.json --alias:@framework=./assets/scripts/framework --alias:@game=./assets/scripts/game --alias:@utils=./assets/scripts/utils --alias:@runtime=./assets/scripts/runtime"
                "demo1:serve": "npm run demo1:build && npx serve dist/demo1 -p 3001"
      prevalence: common

    - category: architecture
      pattern: '纯 DOM API — 零框架依赖'
      description: 'HtmlRenderer 和 DemoBase 仅使用标准 DOM API（document.createElement、addEventListener、innerHTML），不依赖 React/Vue/任何 UI 框架'
      examples:
          - file: HtmlRenderer.ts
            location: 'HtmlRenderer.ts:82-98'
            snippet: |
                const root = document.createElement('div');
                root.style.cssText = '...';
                const header = document.createElement('div');
                header.textContent = title;
                root.appendChild(header);
      prevalence: common

    - category: architecture
      pattern: 'Mock 策略注入'
      description: 'DemoBase.bootstrap() 在模块注册后注入 Mock 策略实现（MockResourceLoader、MockAudioPlayer 等），所有 Mock 位于 game/shared/'
      examples:
          - file: DemoBase.ts
            location: 'DemoBase.ts:137-145'
            snippet: |
                resourceManager.setResourceLoader(new MockResourceLoader());
                audioManager.setAudioPlayer(new MockAudioPlayer());
                sceneManager.setSceneLoader(new MockSceneLoader());
      prevalence: common

    - category: structure
      pattern: 'Demo 入口约定'
      description: '每个 Demo 有独立入口 index.ts，创建 Demo 实例并调用 start()/bootstrap()。Demo 1 的 index.ts 是浏览器入口，Demo 2 的 index.ts 目前仅做 barrel export'
      examples:
          - file: index.ts (demo1)
            location: 'demo1-idle/index.ts:7-10'
            snippet: |
                const demo = new IdleClickerDemo();
                demo.start().catch((err: unknown) => { ... });
      prevalence: common

    - category: testing
      pattern: 'Jest 单元测试 + node 环境'
      description: '所有现有测试为 Jest 单元测试，testEnvironment=node，通过 moduleNameMapper 解析路径别名，mock cc 引擎'
      examples:
          - file: jest.config.js
            location: 'jest.config.js:1-15'
            snippet: |
                testEnvironment: 'node',
                moduleNameMapper: {
                  '^@framework/(.*)$': '<rootDir>/assets/scripts/framework/$1',
                }
      prevalence: common

