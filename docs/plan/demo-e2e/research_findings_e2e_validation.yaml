tldr: |
    - 项目已有 esbuild (^0.28.0) 作为打包器，Demo 1 已有完整的 build + serve 链路（esbuild bundle → npx serve）
    - HtmlRenderer/DemoBase 使用纯 DOM API（document.createElement），不依赖任何特殊运行时，标准浏览器即可运行
    - 目前零 E2E 设施：无 Playwright、Cypress、vite.config、webpack.config
    - 推荐方案：esbuild bundle（已有） + npx serve（已有） + @playwright/test（新增），最小侵入性
    - Demo 2 尚缺 build/serve 脚本和 HTML 入口，需补充

