# ─── 推荐方案 ──────────────────────────────────────────

recommendation:
    dev_server:
        choice: 'npx serve（已在用）或 esbuild --serve（零额外依赖）'
        rationale: |
            - npx serve 已在 demo1:serve 中验证可行，零配置
            - esbuild 0.17+ 内置 --serve 模式，支持 live reload 但项目版本 ^0.28 更优
            - 不需要 Vite — 项目无 React/Vue/HMR 需求，纯 DOM 操作
            - 推荐 Playwright 测试时用 esbuild 的 JS API 启动 serve（可控端口、可编程关闭）

    bundler:
        choice: 'esbuild（已安装 ^0.28.0，保持现状）'
        rationale: |
            - demo1:build 脚本已验证 esbuild + --alias 路径映射方案
            - IIFE 格式直接 <script> 引入，无需 module loader
            - 打包速度极快（毫秒级），适合 E2E 测试前 rebuild

    html_entry:
        choice: '每个 Demo 一个 dist/demoN/index.html（手写静态 HTML）'
        rationale: |
            - Demo 1 已有 dist/demo1/index.html 模板（19 行）
            - 仅需 <script src="demoN.js"></script> 加载 bundle
            - 可选：统一 HTML 模板由 esbuild 插件或 shell 脚本自动生成
        template: |
            <!DOCTYPE html>
            <html lang="zh-CN">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Demo N — XXX</title>
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    html, body { width: 100%; height: 100%; background: #1a1a2e; color: #eee; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; }
                    body { padding: 20px; }
                </style>
            </head>
            <body>
                <script src="demoN.js"></script>
            </body>
            </html>

    playwright_config:
        choice: '@playwright/test'
        suggested_config: |
            // playwright.config.ts
            import { defineConfig } from '@playwright/test';
            export default defineConfig({
              testDir: './tests/e2e',
              timeout: 30_000,
              retries: 1,
              use: {
                baseURL: 'http://localhost:3001',
                headless: true,
                screenshot: 'only-on-failure',
              },
              webServer: [
                {
                  command: 'npm run demo1:serve',
                  port: 3001,
                  reuseExistingServer: !process.env.CI,
                },
                // Demo 2 追加:
                // {
                //   command: 'npm run demo2:serve',
                //   port: 3002,
                //   reuseExistingServer: !process.env.CI,
                // },
              ],
              projects: [
                { name: 'chromium', use: { browserName: 'chromium' } },
              ],
            });
        key_points:
            - 'webServer 自动在测试前启动 serve、测试后关闭'
            - "baseURL 让测试用相对路径：page.goto('/') 即可"
            - 'headless: true 适合 CI，本地调试可 --headed'
            - 'Playwright 自带 expect(locator).toHaveText() 等 Web-first 断言'

    dependencies_to_install:
        new:
            - name: '@playwright/test'
              version: 'latest'
              type: devDependency
              purpose: 'E2E 测试框架'
        already_installed:
            - name: esbuild
              version: '^0.28.0'
              purpose: 'TS 打包'
            - name: jest-environment-jsdom
              version: '^30.3.0'
              purpose: '已装未用，E2E 不需要'

    scripts_to_add:
        - name: 'demo2:build'
          command: 'esbuild assets/scripts/game/demo2-rpg/main.ts --bundle --outfile=dist/demo2/demo2.js --platform=browser --format=iife --tsconfig=tsconfig.json --alias:@framework=./assets/scripts/framework --alias:@game=./assets/scripts/game --alias:@utils=./assets/scripts/utils --alias:@runtime=./assets/scripts/runtime'
          note: '需先创建 demo2-rpg/main.ts 作为浏览器入口（类似 demo1 的 index.ts）'
        - name: 'demo2:serve'
          command: 'npm run demo2:build && npx serve dist/demo2 -p 3002'
        - name: 'test:e2e'
          command: 'npx playwright test'
        - name: 'test:e2e:headed'
          command: 'npx playwright test --headed'

    demo2_missing_pieces:
        - '浏览器入口文件 assets/scripts/game/demo2-rpg/main.ts（new TurnBasedRpgDemo() → demo.start()）'
        - 'HTML 入口 dist/demo2/index.html'
        - 'package.json 中的 demo2:build 和 demo2:serve 脚本'

open_questions: []

gaps:
    - area: 'Demo 2 浏览器入口'
      description: 'demo2-rpg/index.ts 当前是 barrel export，非浏览器入口。需新建 main.ts 启动 TurnBasedRpgDemo'
      impact: research_blocker
      affects: ['demo2-e2e']
    - area: 'serve 进程管理'
      description: 'npx serve 不支持编程式关闭。若需要更精细控制（如 E2E 并行），可考虑用 esbuild JS API 的 ctx.serve() 替代'
      impact: nice_to_know
      affects: ['ci-integration']
