plan_id: wechat-websocket-research
objective: '调研 Framework Blaze Ignite 网络模块多通道架构 & 微信小游戏 WebSocket 限制，评估可行性'
focus_area: network-module-and-wechat-websocket
created_at: '2026-04-13'
created_by: gem-researcher
status: completed

tldr: |
    - 网络模块采用 Map<name, NetworkChannel> 多通道设计，每条通道独立拥有 Socket + 协议处理器 + 心跳 + 重连
    - 微信小游戏（基础库 ≥1.7.0）最多支持 5 条并发 WebSocket 连接，使用 SocketTask 管理
    - 多通道设计在微信小游戏上完全可行（5 条上限足够游戏服/聊天服/推送服场景），需注意 wss 域名预配置、INetworkSocket 适配 wx.connectSocket API
    - 关键适配点：Runtime 层实现 WxSocketAdapter（适配 SocketTask 回调模型），无需修改 Framework 层代码

research_metadata:
    methodology: 'read_file 读取全部网络模块源码 + fetch_webpage 抓取微信官方文档（小程序 & 小游戏两版）'
    scope: 'Framework 层 network/ 目录全部 4 个文件 + 接口定义 + 测试文件 + 微信官方 3 个页面'
    confidence: high
    coverage: 100 # network/ 相关文件全部读取
    decision_blockers: 0
    research_blockers: 0

