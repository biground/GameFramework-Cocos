tldr: |
  - 当前 EcsEntityId = number，ID 回收后存在 ABA 问题；query 每帧遍历 storage 无缓存；System update 中直接操作 entity 有遍历安全风险
  - 5 个优化依赖链：Generational ID（无依赖）→ Bitwise Mask（依赖 typeId 上限） → Query Cache（依赖 Mask）→ Command Buffer（独立但建议在 Cache 之后）→ System Phase（独立）
  - 推荐实现顺序：① Generational ID → ② Bitwise Mask → ③ Query Cache → ④ Command Buffer → ⑤ System Phase
  - 所有方案保持 IEcsWorldAccess 接口向后兼容，新增接口用 ICommandBuffer / SystemPhase 等扩展点

