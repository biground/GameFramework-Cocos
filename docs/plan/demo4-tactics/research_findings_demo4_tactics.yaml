plan_id: demo4-tactics
objective: 研究 Demo4 Tactics Grid 的设计规格、技术要求和实施复杂度
focus_area: assets/scripts/game/demo4-tactics
created_at: "2026-04-24"
created_by: gem-researcher
status: completed

tldr: |
  - Demo4 是 SRPG 战棋游戏，核心是 6×6 网格地图 + 地形系统 + 双层 FSM（TurnFsm 外层 + UnitActionFsm 内层）
  - 在 Demo2 RPG 基础上大幅进阶：新增网格寻路（BFS 范围计算）、地形效果、朝向伤害、三组 Entity（player/enemy/npc）
  - 深度使用 8 个模块（Event、ObjectPool、FSM、Procedure、Entity、DataTable + 轻度 UI/Audio/Timer），4 张 DataTable
  - 预估 30~38 个源文件 + 15~20 个测试文件，复杂度为 complex（高于 Demo3 的 28 文件）
  - 关键技术挑战：BFS 移动范围计算（含地形消耗）、双层 FSM 嵌套协调、朝向系统、战棋 AI 决策

