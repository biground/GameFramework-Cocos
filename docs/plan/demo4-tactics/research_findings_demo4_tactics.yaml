# ══════════════════════════════════════════════════════════════
# 5. 关键技术挑战
# ══════════════════════════════════════════════════════════════

technical_challenges:
  - challenge: "BFS 移动范围计算（含地形消耗）"
    difficulty: high
    description: |
      核心算法挑战。需要实现 BFS 从单位当前位置出发，
      考虑每种地形的移动力消耗（非均匀 cost），
      同时处理某些地形对特定职业不可通过的限制。
      输出为可达格子集合 + 各格子的剩余移动力。
    affects: ["GridSystem.ts", "MovementSystem.ts"]
    interview_value: "经典算法面试题变体（带权 BFS / Dijkstra）"

  - challenge: "双层 FSM 嵌套协调"
    difficulty: high
    description: |
      外层 TurnFsm 在 PlayerTurnState/EnemyTurnState 中需要创建并驱动内层 UnitActionFsm。
      关键问题：
      1. 内层 FSM 何时创建/销毁？（每个单位行动时 or 预创建复用？）
      2. 内层 FSM 完成后如何通知外层切换到下一个单位？
      3. 外层如何追踪"所有单位已行动完毕"？
      4. AI 回合如何通过同一 UnitActionFsm 自动执行？
    affects: ["所有 FSM 文件", "PlayerTurnState.ts", "EnemyTurnState.ts"]
    interview_value: "FSM 深度应用的绝佳案例"

  - challenge: "朝向系统实现"
    difficulty: medium
    description: |
      单位有朝向（上/下/左/右），攻击时根据攻击方向 vs 目标朝向计算伤害倍率。
      需要：1. 单位移动后自动更新朝向 2. 攻击时判断方位关系 3. 待机时可手动调整朝向。
    affects: ["CombatSystem.ts", "TacticsUnitEntity.ts"]

  - challenge: "ASCII 地图渲染"
    difficulty: medium
    description: |
      在 HtmlRenderer 中绘制 6×6 ASCII 网格地图，
      需要同时显示：地形类型标记、玩家/敌方/NPC 单位、当前选中高亮、可移动范围标记。
      地图需要随状态变化实时更新（不追加日志，原地更新）。
    affects: ["TacticsRenderer.ts"]

  - challenge: "战棋 AI 决策"
    difficulty: medium
    description: |
      敌方 AI 通过 UnitActionFsm 自动决策：
      1. 选择移动目标（寻路到最近/最弱的玩家单位附近）
      2. 选择攻击目标（优先低 HP 单位）
      3. 考虑地形优势（优先占据高防地形）
      比 Demo3 的 AI 更复杂：需要考虑地形、朝向、多单位协调。
    affects: ["TacticsAI.ts", "EnemyTurnState.ts"]

  - challenge: "关卡地图配置解析"
    difficulty: low
    description: |
      从 DataTable 的字符串格式（如 terrain 矩阵 "PPMPFF/PPWWPP/..."）
      解析出二维地形数组、出生点坐标、敌方单位配置。
      需要健壮的解析逻辑处理各种格式。
    affects: ["TacticsGameData.ts", "MapConfigRow.ts"]

  - challenge: "Entity 三组管理 + 生命周期"
    difficulty: low
    description: |
      EntityManager 已支持 EntityGroup，但 Demo4 需要三组（player/enemy/npc）。
      关键是 NPC 组的"被保护"逻辑：NPC 死亡触发失败条件。
    affects: ["TacticsBattleProcedure.ts", "TacticsUnitEntity.ts"]

