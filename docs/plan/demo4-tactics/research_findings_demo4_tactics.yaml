# ══════════════════════════════════════════════════════════════
# 1. Demo4 完整设计规格
# ══════════════════════════════════════════════════════════════

design_spec:
  name: "Tactics Grid"
  type: "战棋（SRPG 风格）"
  directory: "assets/scripts/game/demo4-tactics"
  
  core_gameplay: |
    玩家手动控制每个单位在 6×6 网格地图上移动和攻击，类似 Fire Emblem / 梦幻模拟战。
    核心循环：选关 → 部署单位 → 回合制战斗（移动+攻击） → 关卡结算
  
  key_distinction_from_autochess: |
    战棋 = 玩家手动控制每个单位的移动和攻击位置（强调战术决策）
    自走棋 = 玩家只管编队和布阵，战斗完全自动进行

  gameplay_details:
    grid_map:
      size: "6×6 文字网格"
      display: "ASCII 表格形式，含地形标记和单位标记"
    
    terrain_system:
      - type: Plain
        move_cost: 1
        def_bonus: "0%"
        special: "无"
      - type: Mountain
        move_cost: 2
        def_bonus: "+20%"
        special: "高防御"
      - type: Water
        move_cost: 3 (弓手) / 不可通过 (步兵)
        def_bonus: "0%"
        special: "职业限制通行"
      - type: Forest
        move_cost: 1.5
        def_bonus: "+10%"
        special: "远程攻击减伤"
    
    unit_types:
      - class: Warrior
        hp: 高
        def: 高
        move_range: 3
        atk_range: 1
        special: "近战肉盾"
      - class: Archer
        atk: 高
        move_range: 4
        atk_range: "2~3"
        special: "远程输出"
      - class: Knight
        move_range: 5
        atk_range: 1
        special: "高机动，可穿越部分地形"
      - class: Healer
        move_range: 3
        heal_range: 2
        special: "治疗队友"
    
    turn_mechanism:
      player_turn: "依次操作己方所有单位（移动→攻击/技能→待机）"
      enemy_turn: "AI 依次操作所有敌方单位"
    
    facing_system:
      back: "×1.5 伤害"
      side: "×1.2 伤害"
      front: "×1.0 伤害"
    
    stage_goals:
      - "击败所有敌人"
      - "保护 NPC"
      - "指定回合内通关"
    
    stages:
      - id: 1
        name: "平原遭遇"
      - id: 2
        name: "山地伏击"
      - id: 3
        name: "河谷之战"

  procedure_flow:
    - LaunchProcedure: "初始化框架"
    - PreloadProcedure: "加载单位表/地形表/技能表/地图表"
    - StageSelectProcedure: "选择关卡，查看关卡目标"
    - DeployProcedure: "在起始区域部署单位，查看地图地形"
    - TacticsBattleProcedure: "战棋战斗主循环，双层 FSM 驱动"
    - SettleProcedure: "关卡结算，评价/奖励"
    flow_graph: "Launch → Preload → StageSelect → Deploy → Battle → Settle → StageSelect"

  fsm_design:
    outer_turn_fsm:
      name: TurnFsm
      states:
        - TurnStartState: "判断当前是哪方回合，重置行动标记"
        - PlayerTurnState: "玩家依次操作每个单位，嵌套 UnitActionFsm"
        - EnemyTurnState: "AI 依次操作敌方单位，嵌套 UnitActionFsm"
        - TurnEndState: "回合结算，地形 DOT/BUFF 结算"
        - VictoryState: "达成关卡目标"
        - DefeatState: "失败条件触发"
    
    inner_unit_action_fsm:
      name: UnitActionFsm
      states:
        - SelectedState: "选中单位，高亮可移动范围"
        - MovingState: "选择移动目标格，执行移动"
        - ActionMenuState: "移动后菜单：攻击/技能/待机"
        - AttackingState: "选择攻击目标，计算伤害（含朝向）"
        - UsingSkillState: "选择技能目标，应用技能效果"
        - WaitingState: "单位待机，本回合结束行动"
    
    nesting_pattern: |
      外层 TurnFsm 控制回合大循环（玩家回合 ↔ 敌方回合）
      内层 UnitActionFsm 控制单个单位的行动流程
      玩家回合期间，每操作一个单位就创建/复用一个 UnitActionFsm
      敌方回合期间，AI 通过 UnitActionFsm 执行自动决策

  data_tables:
    - name: tactics_unit_config
      fields: [id, name, unitClass, hp, atk, def, moveRange, atkRange, skills, passable]
      description: "单位属性配置"
    - name: terrain_config
      fields: [id, type, moveCost, defBonus, atkPenalty, passable, desc]
      description: "地形效果配置"
    - name: tactics_skill_config
      fields: [id, name, type, range, power, cooldown, aoeRadius, desc]
      description: "技能配置"
    - name: tactics_map_config
      fields: [id, name, width, height, terrain, playerSpawns, enemyUnits, winCondition, winParam, maxTurns]
      description: "关卡地图配置（含地形矩阵、出生点、敌方单位配置）"

  html_ui:
    button_groups:
      stage_select: ["关卡1: 平原遭遇", "关卡2: 山地伏击", "关卡3: 河谷之战"]
      deploy: ["部署战士到(x,y)", "部署弓手到(x,y)", "查看地形", "开始战斗!"]
      player_turn: ["选择: 战士/弓手/骑士/治疗师", "移动到(x,y)", "攻击", "技能1", "待机", "结束回合"]
    map_display: "ASCII 表格形式，地形标记(P/M/W/F) + 单位标记(P:戦/E:弓) + 选中高亮(★)"
    status_panel: "回合数、当前阶段、各单位HP、地形信息"

  integration_test_points:
    - "移动范围计算：验证不同地形消耗移动力后的可达范围"
    - "地形效果：山地防御加成、水域不可通过、森林远程减伤"
    - "朝向伤害：正面/侧面/背面不同的伤害倍率"
    - "双层 FSM 嵌套：TurnFsm 正确驱动 UnitActionFsm，状态不错乱"
    - "AI 决策：敌方 AI 正确寻路到最近目标、优先攻击低 HP 单位"
    - "胜利/失败条件：全灭判定、NPC 保护判定、回合限制"
    - "Entity 三组管理：player / enemy / npc 三个 EntityGroup 独立管理"
    - "技能冷却：使用技能后冷却回合数正确倒计"

# ══════════════════════════════════════════════════════════════
# 2. 需要使用的框架模块清单
# ══════════════════════════════════════════════════════════════

module_usage:
  deep_usage:
    - module: EventManager
      depth: "◉ 深度"
      usage: "单位移动、攻击、受伤、死亡、回合切换、地形触发、关卡目标事件；是战棋事件流的核心枢纽"
    - module: ObjectPool
      depth: "◉ 深度"
      usage: "伤害飘字池、移动路径标记池、攻击范围指示池"
    - module: FSM
      depth: "◉ 深度"
      usage: "回合 FSM（TurnFsm）+ 单位行动 FSM（UnitActionFsm）双层嵌套，是 Demo4 的核心亮点"
    - module: ProcedureManager
      depth: "◉ 深度"
      usage: "6 步流程链：Launch → Preload → StageSelect → Deploy → TacticsBattle → Settle"
    - module: EntityManager
      depth: "◉ 深度"
      usage: "三组 Entity 管理：player 组 + enemy 组 + npc 组，每组独立生命周期"
    - module: DataTableManager
      depth: "◉ 深度"
      usage: "4 张配置表：单位表、地形表、技能表、关卡地图表"

  normal_usage:
    - module: Core
      depth: "○ 常规"
      usage: "GameEntry 初始化，模块注册"
    - module: DI/IoC
      depth: "○ 常规"
      usage: "Container 注入 Mock 策略"
    - module: UIManager
      depth: "○ 常规"
      usage: "单位信息面板、地形信息面板、行动选择面板"
    - module: AudioManager
      depth: "○ 常规"
      usage: "移动音效、攻击音效、技能音效、BGM"
    - module: SceneManager
      depth: "○ 常规"
      usage: "场景管理"
    - module: Logger
      depth: "○ 常规"
      usage: "标准日志"
    - module: DebugManager
      depth: "○ 常规"
      usage: "实时展示地图状态、Entity 数量、FSM 状态"
    - module: TimerManager
      depth: "○ 常规"
      usage: "AI 思考延迟（模拟 AI 决策时间），回合时间限制"
    - module: ResourceManager
      depth: "○ 常规"
      usage: "加载地图表、单位表、技能表"

  light_usage:
    - module: LocalizationManager
      depth: "· 轻度"
      usage: "单位名称、地形描述、技能名称多语言"
    - module: NetworkManager
      depth: "· 轻度"
      usage: "轻度使用"
    - module: HotUpdateManager
      depth: "· 轻度"
      usage: "轻度使用"

