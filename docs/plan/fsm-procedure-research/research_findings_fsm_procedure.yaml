# 5. 三个 Demo 的 Procedure 上下文样板
# ═══════════════════════════════════════════════════════════

demo_procedure_context_patterns:
  demo1_idle:
    context_file: assets/scripts/game/demo1-idle/procedures/ProcedureContext.ts
    interface_name: IProcedureContext
    context_key: "__procedure_context__"
    constant_name: PROCEDURE_CONTEXT_KEY
    procedure_count: 6
    procedures:
      - "LaunchProcedure (procedures/LaunchProcedure.ts:20)"
      - "PreloadProcedure (procedures/PreloadProcedure.ts:26)"
      - "OfflineSettleProcedure (procedures/OfflineSettleProcedure.ts:24)"
      - "MainProcedure (procedures/MainProcedure.ts:30)"
      - "SettingsProcedure (procedures/SettingsProcedure.ts:22)"
    access_pattern: |
      // 在 onEnter 中:
      onEnter(fsm: IFsm<unknown>): void {
          // demo1 最简模式 — LaunchProcedure 甚至不取 context
          this.changeProcedure(fsm, PreloadProcedure);
      }
      // 其他 Procedure 取上下文:
      const ctx = fsm.getData<IProcedureContext>(PROCEDURE_CONTEXT_KEY);
    context_fields:
      - "gameData: IdleGameData"
      - "buildingSystem: BuildingSystem"
      - "achievementSystem: AchievementSystem"
      - "offlineRewardSystem: OfflineRewardSystem"
      - "saveSystem: SaveSystem"
      - "eventManager: EventManager"
      - "timerManager: TimerManager"
      - "dataTableManager: DataTableManager"
      - "fsmManager: FsmManager"

  demo2_rpg:
    context_file: assets/scripts/game/demo2-rpg/procedures/RpgProcedureContext.ts
    interface_name: IRpgProcedureContext
    context_key: "__rpg_procedure_context__"
    constant_name: RPG_PROCEDURE_CONTEXT_KEY
    procedure_count: 7
    procedures:
      - "LaunchProcedure (procedures/LaunchProcedure.ts:24)"
      - "PreloadProcedure (procedures/PreloadProcedure.ts:59)"
      - "LobbyProcedure (procedures/LobbyProcedure.ts:30)"
      - "BattlePrepProcedure (procedures/BattlePrepProcedure.ts:42)"
      - "BattleProcedure (procedures/BattleProcedure.ts:38)"
      - "SettleProcedure (procedures/SettleProcedure.ts:27)"
    access_pattern: |
      onEnter(fsm: IFsm<unknown>): void {
          const ctx = fsm.getData<IRpgProcedureContext>(RPG_PROCEDURE_CONTEXT_KEY);
          if (!ctx) {
              Logger.error(TAG, 'RPG Procedure 上下文缺失');
              throw new Error(`[${TAG}] RPG Procedure 上下文缺失`);
          }
          // 使用 ctx...
      }
    context_fields:
      - "gameData: unknown"
      - "renderer: HtmlRenderer"
      - "battleSystem: unknown"
      - "buffSystem: unknown"
      - "damageCalculator: unknown"
      - "enemyAI: unknown"
      - "eventManager: EventManager"
      - "timerManager: TimerManager"
      - "fsmManager: FsmManager"
      - "entityManager: EntityManager"
      - "audioManager: AudioManager"
      - "uiManager: UIManager"
      - "dataTableManager: DataTableManager"
      - "referencePool: ReferencePool"

  demo3_autochess:
    context_file: assets/scripts/game/demo3-autochess/procedures/AutoChessProcedureContext.ts
    interface_name: IAutoChessProcedureContext
    context_key: "__auto_chess_context__"
    constant_name: AUTO_CHESS_CONTEXT_KEY
    procedure_count: 7
    procedures:
      - "LaunchProcedure (procedures/LaunchProcedure.ts:24)"
      - "PreloadProcedure (procedures/PreloadProcedure.ts:126)"
      - "PrepareProcedure (procedures/PrepareProcedure.ts:33)"
      - "BattleProcedure (procedures/BattleProcedure.ts:29)"
      - "SettleProcedure (procedures/SettleProcedure.ts:40)"
      - "GameOverProcedure (procedures/GameOverProcedure.ts:23)"
    access_pattern: |
      onEnter(fsm: IFsm<unknown>): void {
          const ctx = fsm.getData<IAutoChessProcedureContext>(AUTO_CHESS_CONTEXT_KEY);
          if (!ctx) {
              Logger.error(TAG, 'Auto-chess Procedure 上下文缺失');
              throw new Error(`[${TAG}] Auto-chess Procedure 上下文缺失`);
          }
          // 使用 ctx...
      }
    context_fields:
      - "gameData: AutoChessGameData"
      - "renderer: unknown"
      - "boardSystem: BoardSystem"
      - "shopSystem: ShopSystem"
      - "mergeSystem: MergeSystem"
      - "synergySystem: SynergySystem"
      - "battleSystem: BattleSystem"
      - "eventManager: EventManager"
      - "timerManager: TimerManager"
      - "fsmManager: FsmManager"
      - "entityManager: EntityManager"
      - "audioManager: AudioManager"
      - "dataTableManager: DataTableManager"

  cross_demo_observations:
    - "所有 Procedure 的 onEnter 参数类型是 IFsm<unknown>（因为 ProcedureBase extends FsmState<unknown>）"
    - "上下文获取模式完全一致: fsm.getData<IContext>(KEY_CONSTANT)"
    - "每个 Demo 都有独立的 context 接口 + key 常量"
    - "null 检查 + throw 是手写样板（4-5 行），demo2/demo3 都有，demo1 的 LaunchProcedure 省略了"
    - "ProcedureManager.setData() 在 Demo 主入口中写入上下文（在 startProcedure 之前）"

