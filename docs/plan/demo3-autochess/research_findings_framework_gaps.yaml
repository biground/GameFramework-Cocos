enhancements:

  - id: ENH-1
    title: "EntityManager 与业务逻辑数据断层"
    priority: medium
    description: |
      BattleProcedure 调用 entityManager.showEntity() 创建了实体，但战斗系统（BattleSystem）
      完全不使用这些 Entity 实例。战斗逻辑直接操作 ChessPieceRuntimeState 对象，
      EntityManager 沦为「创建了就扔掉」的装饰品。
    evidence:
      - file: assets/scripts/game/demo3-autochess/procedures/BattleProcedure.ts
        line: 104-131
        detail: |
          连续调用 entityManager.showEntity('enemy_chess', {...}) 和
          entityManager.showEntity('player_chess', {...})，但返回值完全未使用。
          BattleSystem.startBattle() 接收的是 ChessPieceRuntimeState[] 而非 EntityBase[]。
      - file: assets/scripts/game/demo3-autochess/systems/BattleSystem.ts
        line: 84-100
        detail: |
          startBattle 签名接收 playerPieces/enemyPieces: ChessPieceRuntimeState[]，
          完全不涉及 EntityBase 或 EntityManager。
    why_valuable: |
      当前 Entity 系统的 onShow(data?: unknown) 接口太弱：
      1. 传入的 data 是 unknown，无法从 Entity 反查回业务数据
      2. EntityManager 无法通过业务 ID 查找 Entity（只有 entityId）
      3. 导致 Demo 开发者绕过 EntityManager，直接管理纯数据对象
      补强后 Demo4/5 的实体管理会更自然，特别是战棋的 3 组实体 + 多人对战的实体。

  - id: ENH-2
    title: "ProcedureContext.renderer 类型为 unknown 导致 duck-type 检查"
    priority: low
    description: |
      IAutoChessProcedureContext 中 renderer 字段类型为 unknown，
      导致多个 Procedure 需要做 `typeof (renderer as Record<string, unknown>)['log'] === 'function'`
      这样的运行时 duck-type 检查。
    evidence:
      - file: assets/scripts/game/demo3-autochess/procedures/AutoChessProcedureContext.ts
        line: 33
        detail: "renderer: unknown;"
      - file: assets/scripts/game/demo3-autochess/procedures/BattleProcedure.ts
        line: 152
        detail: "if (renderer && typeof (renderer as Record<string, unknown>)['log'] === 'function')"
      - file: assets/scripts/game/demo3-autochess/procedures/SettleProcedure.ts
        line: 102
        detail: "(同样的 duck-type 检查)"
      - file: assets/scripts/game/demo3-autochess/procedures/GameOverProcedure.ts
        line: 52
        detail: "(同样的 duck-type 检查)"
    why_valuable: |
      定义一个 IDemoRenderer 接口（log/updateLog/updateStatus），
      ProcedureContext 使用该接口类型，消除所有 duck-type 检查。
      这是 Game 层自己可以解决的问题，不需要框架改动。

  - id: ENH-3
    title: "ObjectPool 在 Demo3 未实际发挥价值"
    priority: low
    description: |
      design doc 声称 Demo3 深度使用 ObjectPool，但实际代码中：
      - 棋子的运行时状态（ChessPieceRuntimeState）是通过 Map/Array 管理的纯数据对象
      - EntityManager 内部有等待池，但上面分析了 Entity 未实际参与战斗
      - 没有任何地方直接使用 ObjectPool.acquire/release
    evidence:
      - file: assets/scripts/game/demo3-autochess/data/AutoChessGameData.ts
        line: 161-184
        detail: "createPieceState() 用 new 创建纯对象并注册到 Map，无池化"
      - file: assets/scripts/game/demo3-autochess/factory/EnemyGenerator.ts
        line: 83-117
        detail: "generate() 用字面量对象创建敌方棋子，无池化"
    why_valuable: |
      如果 Entity 能真正参与战斗逻辑，EntityGroup 的内部池化就能发挥作用。
      或者为 ChessPieceRuntimeState 这类频繁创建销毁的数据对象提供轻量池。
      但当前不是阻塞问题——对象数量级（4-16 个棋子/回合）不构成 GC 压力。

