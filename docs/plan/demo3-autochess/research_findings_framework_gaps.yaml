# ═══════════════════════════════════════════════════════════════
# 真实缺口（有代码证据的痛点）
# ═══════════════════════════════════════════════════════════════

true_gaps:

  - id: GAP-1
    title: "FSM 黑板访问样板代码泛滥"
    severity: medium
    description: |
      每个 FSM 状态文件都要复制粘贴一个 getBlackboard() 辅助函数。
      Demo3 的 4 个 AI 状态文件（IdleState/MoveToState/AttackState/DeadState）每个都有
      完全相同的 8 行 getBlackboard 函数。Demo2 有 8 个状态文件同样重复。Demo1 也有。
      总计跨 3 个 Demo 有 16+ 处完全相同的样板代码。
    evidence:
      - file: assets/scripts/game/demo3-autochess/fsm/chess-ai/IdleState.ts
        line: 21-28
        snippet: |
          function getBlackboard(fsm: IFsm<string>): IChessAiBlackboard {
              const bb = fsm.getData<IChessAiBlackboard>(ChessAiDataKeys.BLACKBOARD);
              if (!bb) { throw new Error(`[${TAG}] 黑板数据缺失，FSM="${fsm.name}"`); }
              return bb;
          }
      - file: assets/scripts/game/demo3-autochess/fsm/chess-ai/MoveToState.ts
        line: 23-28
        snippet: "(完全相同的函数)"
      - file: assets/scripts/game/demo3-autochess/fsm/chess-ai/AttackState.ts
        line: 23-28
        snippet: "(完全相同的函数)"
      - file: assets/scripts/game/demo3-autochess/fsm/chess-ai/DeadState.ts
        line: 18-23
        snippet: "(完全相同的函数)"
      - file: assets/scripts/game/demo2-rpg/fsm/battle/VictoryState.ts
        line: 19
        snippet: "function getBlackboard(fsm: IFsm<IBattleBlackboard>): IBattleBlackboard {"
      - file: assets/scripts/game/demo2-rpg/fsm/battle/SelectActionState.ts
        line: 23
        snippet: "(同样的模式)"
      - file: assets/scripts/game/demo2-rpg/fsm/character/CharIdleState.ts
        line: 19
        snippet: "(同样的模式)"
    root_cause: |
      FsmState 基类没有提供类型安全的黑板访问机制。
      getData<T>(key) 返回 T | undefined，每个状态都需要手动取值+null检查+类型断言。
    impact: |
      - 维护成本：改黑板 key 名需要改 16+ 处
      - DRY 违反：明显的 copy-paste 代码
      - Demo4/5/6 会继续恶化（战棋双层 FSM、多人对战角色 FSM 更多状态）
    potential_fix: |
      方案 A：FsmState 基类增加泛型 blackboard 参数 FsmState<TOwner, TBlackboard>，
              onEnter/onUpdate 签名带 blackboard 参数
      方案 B：提供工具函数 createBlackboardAccessor<T>(key) 返回类型安全的 getter

  - id: GAP-2
    title: "Procedure 上下文获取样板代码重复"
    severity: low-medium
    description: |
      每个 Procedure 的 onEnter 都要执行 fsm.getData<Context>(KEY) + null check + throw。
      Demo3 的 6 个 Procedure 每个都有完全相同的 4 行上下文获取代码。
      Demo2 也有相同模式。
    evidence:
      - file: assets/scripts/game/demo3-autochess/procedures/LaunchProcedure.ts
        line: 27-31
        snippet: |
          const ctx = fsm.getData<IAutoChessProcedureContext>(AUTO_CHESS_CONTEXT_KEY);
          if (!ctx) {
              Logger.error(TAG, 'Auto-chess Procedure 上下文缺失');
              throw new Error(`[${TAG}] Auto-chess Procedure 上下文缺失`);
          }
      - file: assets/scripts/game/demo3-autochess/procedures/PreloadProcedure.ts
        line: 131-135
        snippet: "(完全相同的 4 行)"
      - file: assets/scripts/game/demo3-autochess/procedures/PrepareProcedure.ts
        line: 91-96
        snippet: "(完全相同的 4 行)"
      - file: assets/scripts/game/demo3-autochess/procedures/BattleProcedure.ts
        line: 41-46
        snippet: "(完全相同的 4 行)"
      - file: assets/scripts/game/demo3-autochess/procedures/SettleProcedure.ts
        line: 43-48
        snippet: "(完全相同的 4 行)"
      - file: assets/scripts/game/demo3-autochess/procedures/GameOverProcedure.ts
        line: 32-37
        snippet: "(完全相同的 4 行)"
    root_cause: |
      ProcedureBase 没有提供类型安全的上下文访问机制。
      所有 Procedure 共享同一个 FSM，但 getData 是无类型保证的字符串键。
    impact: |
      - 6 处完全相同的 null check + throw 样板
      - Demo4/5/6 将各新增 5-7 个 Procedure，继续累积
    potential_fix: |
      ProcedureBase 增加泛型 ProcedureBase<TContext>，
      提供 protected getContext(fsm): TContext 方法封装 getData + null check

