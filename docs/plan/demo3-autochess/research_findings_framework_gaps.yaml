works_well:

  - module: EventManager
    assessment: |
      AutoChessEvents 定义了 14 个事件键，全部使用幻影类型 EventKey<T>，
      事件 emit/on 调用处编译期类型安全。事件贯穿 Procedure/System/Renderer 三层，
      解耦效果良好。
    evidence:
      - "AutoChessDefs.ts 14 个 EventKey 定义清晰，payload 类型精确"
      - "AutoChessDemo._registerEventListeners() 事件监听编译期类型检查通过"

  - module: FSM（棋子 AI 状态机）
    assessment: |
      4 个 AI 状态（Idle/MoveTo/Attack/Dead）职责分明，状态转换逻辑正确。
      每个棋子独立 FSM 实例，BattleSystem 统一创建/销毁，生命周期管理清晰。
      FsmManager.createFsm/destroyFsm API 用起来直观。
    evidence:
      - "BattleSystem._createChessFsm() 创建流程简洁"
      - "BattleSystem.endBattle() 批量销毁 FSM 无泄漏"

  - module: ProcedureManager
    assessment: |
      6 个 Procedure（Launch→Preload→Prepare→Battle→Settle→GameOver）流程链清晰，
      Prepare↔Battle↔Settle 循环正确，GameOver 支持 restart 回到 Prepare。
      changeProcedure() API 简洁。
    evidence:
      - "完整的流程链在测试和 E2E 中验证通过"
      - "PrepareProcedure.onPrepareComplete() 的倒计时→切换流程正确"

  - module: DataTableManager
    assessment: |
      chess_piece_config（6 行）和 synergy_config（4 行）注册和查询正常。
      createTableFromRawData() + getAllRows<T>() 泛型查询用起来方便。
      ChessPieceConfigRow/SynergyConfigRow 的 parseRow 实现规范。
    evidence:
      - "PreloadProcedure 注册 2 张表正确"
      - "PrepareProcedure._recalculateSynergies() 查询羁绊配置无问题"

  - module: TimerManager
    assessment: |
      准备阶段 30s 倒计时（addTimer + removeTimer）工作正确，
      onLeave 清理 Timer 无泄漏。
    evidence:
      - "PrepareProcedure._timerId 在 onLeave 中正确清理"

  - module: DemoBase + HtmlRenderer 共享基础设施
    assessment: |
      AutoChessDemo 继承 DemoBase 只需实现 setupProcedures + setupDataTables，
      bootstrap 注册 17 个模块 + Mock 策略注入全自动。
      AutoChessRenderer 封装 HtmlRenderer 提供棋盘/商店/状态面板渲染，
      使用 updateLog 原地更新避免日志爆炸。
    evidence:
      - "AutoChessDemo.start() 仅 15 行完成启动"
      - "AutoChessRenderer 使用 createStatusPanel + updateLog 渲染"

  - module: FsmManager + EntityManager 协作
    assessment: |
      BattleSystem 创建 AI FSM 时引用 EntityManager 创建的实体分组，
      EntityManager.registerGroup() + showEntity() API 正常工作。
      EntityFactory 策略注入模式正确（AutoChessEntityFactory implements IEntityFactory）。

