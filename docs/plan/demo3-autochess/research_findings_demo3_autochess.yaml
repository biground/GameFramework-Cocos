# ═══════════════════════════════════════════════════════
# 10. 开放问题与缺口
# ═══════════════════════════════════════════════════════

open_questions:
  - question: "ChessPieceEntity 是否需要自定义 EntityFactory？"
    context: |
      MockEntityFactory 创建的 MockEntity 只有通用追踪属性，
      Demo 3 的棋子需要 hp/atk/race/star/position 等业务属性。
      两种方案：
      1. 创建 ChessPieceEntity(extends EntityBase) + Demo3EntityFactory(implements IEntityFactory)
      2. 在 DemoBase 注入的 MockEntityFactory 基础上，创建 ChessPieceEntity 并让 factory 按 groupName 返回不同类型
      Demo 2 中的实体使用了 MockEntity，业务属性通过 data 参数和外部对象管理。
    type: nice_to_know
    affects: []

  - question: "战斗加速（timeScale）是否影响准备阶段倒计时？"
    context: |
      TimerManager.timeScale 是全局的，战斗阶段设置 timeScale=2/4 会影响所有使用 useTimeScale 的定时器。
      准备阶段倒计时应不受战斗加速影响，需要设置 useTimeScale: false，
      或在战斗结束后重置 timeScale = 1。
    type: nice_to_know
    affects: []

