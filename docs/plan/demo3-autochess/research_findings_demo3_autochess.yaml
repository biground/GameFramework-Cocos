# ═══════════════════════════════════════════════════════
# 8. 潜在框架缺口分析
# ═══════════════════════════════════════════════════════

potential_framework_gaps:
  - id: GAP-ENTITY-CUSTOM-TYPE
    module: EntityManager
    description: |
      EntityManager.showEntity() 返回 EntityBase，业务层需要类型断言为 ChessPieceEntity。
      EntityGroup 使用 IEntityFactory.createEntity(groupName) 创建实体，
      工厂接口返回 EntityBase 而非泛型类型。
    current_workaround: "业务层每次 showEntity 后需手动 as ChessPieceEntity 类型断言"
    ideal_solution: "泛型 showEntity<T extends EntityBase>(groupName, data?): T，或 registerGroup 时绑定实体类型"
    severity: nice-to-have
    affected_demos: [demo2, demo3]

  - id: GAP-ENTITY-FIND-BY-DATA
    module: EntityManager
    description: |
      无法按业务数据查询实体（如"找到所有 race=warrior 的棋子"），
      只能 getEntitiesByGroup 后手动 filter。
    current_workaround: "业务层 getEntitiesByGroup + filter"
    ideal_solution: "EntityManager.findEntities(groupName, predicate) 或 EntityGroup.find(predicate)"
    severity: nice-to-have
    affected_demos: [demo3]

  - id: GAP-FSM-BATCH-DESTROY
    module: FsmManager
    description: |
      战斗结束需要销毁所有棋子的 AI FSM（可能 8~16 个），
      目前只能逐个 destroyFsm(name)，没有批量销毁或按前缀销毁的 API。
    current_workaround: "业务层维护 FSM 名称列表，循环 destroyFsm"
    ideal_solution: "FsmManager.destroyFsmsByPrefix(prefix) 或 destroyAll()"
    severity: nice-to-have
    affected_demos: [demo3]

  - id: GAP-NO-GRID-SYSTEM
    module: none
    description: |
      框架没有网格/棋盘系统。4×4 棋盘的位置管理、距离计算、最近敌人查找需要自行实现。
    current_workaround: "在 BoardSystem 中自行实现 4×4 网格管理和距离计算"
    ideal_solution: "未来可以开发 fbi-grid-system 插件（设计文档已提及）"
    severity: important
    affected_demos: [demo3, demo4]
    note: "这是预期的框架边界，不是缺陷。设计文档已标记 fbi-grid-system 为插件发现方向。"

