# ═══════════════════════════════════════════════════════
# 1. Demo 3 设计文档摘要
# ═══════════════════════════════════════════════════════

demo3_design_summary:
  core_gameplay: |
    简化版自走棋：
    - 准备阶段（买棋/布阵）→ 战斗阶段（自动对战）→ 结算 → 下一回合
    - 棋盘 4×4，玩家方 2 行 + 敌方 2 行
    - 商店每轮随机 3~5 棋子
    - 3 个同名 ★1 → 合成 ★2（属性翻倍）
    - 2~3 种羁绊效果（如战士×3 ATK+20%）
    - 棋子 AI 自动寻找最近敌人攻击
    - PvE：每轮随机生成 AI 对手
    - 玩家 100 HP，输了扣 HP，HP ≤ 0 则 Game Over

  covered_modules:
    deep_use:
      - EventManager（棋子购买/放置/合成/攻击/回合切换事件）
      - ObjectPool（棋子 Entity 回收复用）
      - FSM（棋子 AI FSM + 游戏阶段 FSM）
      - ProcedureManager（Launch→Preload→Prepare→Battle→Settle 循环）
      - EntityManager（大量棋子 Entity，Group: player_chess / enemy_chess）
      - TimerManager（准备阶段 30s 倒计时 + AI 行动间隔 + 战斗加速 timeScale）
      - DataTableManager（棋子配置表 + 羁绊配置表 + 商店池配置）
    standard_use:
      - Core, DI/IoC, ResourceManager, UIManager, NetworkManager
      - AudioManager, SceneManager, Logger, DebugManager
      - LocalizationManager, HotUpdateManager

  procedure_flow: "Launch → Preload → Prepare -(倒计时结束)→ Battle -(一方全灭)→ Settle -(HP>0)→ Prepare / -(HP≤0)→ GameOver -(重新开始)→ Prepare"

  fsm_design:
    game_phase_fsm:
      states: [PreparePhase, BattlePhase, SettlePhase]
      transitions:
        - from: PreparePhase
          to: BattlePhase
          trigger: "倒计时结束"
        - from: BattlePhase
          to: SettlePhase
          trigger: "一方全灭"
        - from: SettlePhase
          to: PreparePhase
          trigger: "继续"
    chess_ai_fsm:
      states: [IdleState, MoveToState, AttackState, DeadState]
      transitions:
        - { from: Idle, to: MoveTo, trigger: "发现目标" }
        - { from: Idle, to: Attack, trigger: "已在攻击范围" }
        - { from: MoveTo, to: Attack, trigger: "到达攻击范围" }
        - { from: Attack, to: Idle, trigger: "目标死亡" }
        - { from: "*", to: Dead, trigger: "自身HP<=0" }

  datatable_schemas:
    chess_piece_config:
      fields: [id, name, race, hp, atk, atkSpeed, range, cost, star2Mult]
    synergy_config:
      fields: [id, race, threshold, effect, value, desc]

  integration_test_points:
    - "棋子合成：购买 3 个同名 → 自动合成 ★2，属性翻倍"
    - "ObjectPool 复用：战斗结束后棋子回收，下轮复用"
    - "AI FSM 循环：Idle→MoveTo→Attack 正确循环，目标死亡后重新寻找"
    - "羁绊计算：达到阈值后正确激活效果"
    - "Entity 数量峰值：同时 8~16 个棋子 Entity 无泄漏"
    - "倒计时准确：30s 到时自动切换战斗阶段"

