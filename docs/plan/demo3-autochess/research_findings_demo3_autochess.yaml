# 4. 框架模块 API 就绪情况
# ═══════════════════════════════════════════════════════

entity_manager_api:
  status: "✅ 完善"
  file: "assets/scripts/framework/entity/EntityManager.ts"
  interface: "assets/scripts/framework/interfaces/IEntityManager.ts"
  key_apis:
    - name: "setEntityFactory(factory: IEntityFactory)"
      desc: "策略注入实体工厂（DemoBase 已自动注入 MockEntityFactory）"
    - name: "registerGroup(groupName: string)"
      desc: "注册实体分组（如 player_chess / enemy_chess）"
    - name: "showEntity(groupName, data?, callbacks?): EntityBase"
      desc: "从分组取出实体（优先复用等待池），返回 EntityBase 实例"
    - name: "hideEntity(entity: EntityBase)"
      desc: "回收实体到分组等待池"
    - name: "hideAllEntities(groupName?)"
      desc: "隐藏指定分组或全部分组的活跃实体"
    - name: "getEntitiesByGroup(groupName): readonly EntityBase[]"
      desc: "获取指定分组的所有活跃实体"
    - name: "hasEntity(entityId): boolean"
      desc: "查询实体是否活跃"
  entity_base_lifecycle: "onShow(data?) → onUpdate(dt) → onHide()"
  entity_group_internals:
    desc: "EntityGroup 内建对象池：activeList + waitingList，showEntity 优先从 waitingList pop 复用"
    pool_mechanism: "EntityGroup.showEntity() 先检查 _waitingList.length > 0 则 pop 复用，否则通过 factory.createEntity() 新建"
  grouping_support: "✅ 完全支持 player_chess / enemy_chess 分组"
  entity_id_auto_increment: "✅ EntityManager._nextEntityId 自增，全局唯一"

object_pool_api:
  status: "✅ 完善"
  files:
    - "assets/scripts/framework/objectpool/ObjectPool.ts (泛型单类型池)"
    - "assets/scripts/framework/objectpool/ReferencePool.ts (全局多类型池管理器)"
  key_apis:
    ObjectPool:
      - "acquire(): T — 从池中获取对象（无则 new）"
      - "release(obj: T) — 回收对象入池（防重复入池）"
      - "preload(count) — 预热指定数量的对象"
      - "clear() — 清空池中空闲对象"
      - "stats — 获取 freeCount/usedCount/totalCreated"
    ReferencePool:
      - "acquire<T>(ctor): T — 按类型自动路由到对应池"
      - "release<T>(obj: T) — 按类型回收"
  note_for_demo3: |
    EntityGroup 自身已内建等待池，棋子 Entity 的复用由 EntityManager.hideEntity → EntityGroup.hideEntity → _waitingList 自动管理。
    独立的 ObjectPool / ReferencePool 可用于非 Entity 类的池化对象（如伤害飘字、特效等），
    但棋子 Entity 的复用不需要额外使用 ObjectPool。

fsm_api:
  status: "✅ 完善"
  file: "assets/scripts/framework/fsm/FsmManager.ts"
  key_apis:
    - name: "createFsm<T>(name, owner, ...states): IFsm<T>"
      desc: "创建 FSM，传入名称 + 持有者 + 状态列表"
    - name: "destroyFsm(name): boolean"
      desc: "销毁 FSM"
    - name: "getFsm(name): IFsm<unknown> | undefined"
      desc: "获取 FSM 实例"
    - name: "hasFsm(name): boolean"
      desc: "检查 FSM 是否存在"
  fsm_instance_api:
    - "start<TState>(stateType) — 启动 FSM，进入初始状态"
    - "changeState<TState>(stateType) — 切换到指定状态"
    - "getData<V>(key) / setData<V>(key, value) — 共享数据存取"
  state_interface: |
    IFsmState<T>:
      onInit(fsm) — 状态机创建时
      onEnter(fsm) — 进入状态
      onUpdate(fsm, dt) — 每帧更新
      onLeave(fsm) — 离开状态
      onDestroy(fsm) — 状态销毁
  note_for_demo3: |
    需为每个棋子创建独立 AI FSM（名称如 chess_ai_1, chess_ai_2...），
    战斗结束时 destroyFsm 清理。
    游戏阶段 FSM 全局一个即可。

timer_api:
  status: "✅ 完善"
  file: "assets/scripts/framework/timer/TimerManager.ts"
  key_apis:
    - name: "addTimer(delay, callback, options?): number"
      desc: "添加定时器，返回 ID"
    - name: "removeTimer(id): boolean"
      desc: "移除定时器"
    - name: "removeTimersByTag(tag): number"
      desc: "按标签批量移除"
    - name: "removeAllTimers()"
      desc: "移除所有定时器"
    - name: "pauseTimer(id) / resumeTimer(id)"
      desc: "暂停/恢复定时器"
    - name: "timeScale (getter/setter)"
      desc: "全局时间缩放（战斗加速用）"
  options:
    - "repeat: 0(一次) | N(N次) | -1(无限)"
    - "initialDelay: 首次触发延迟"
    - "useTimeScale: 是否受缩放影响"
    - "tag: 标签（批量操作）"
  note_for_demo3: |
    准备阶段 30s 倒计时：addTimer(1, callback, { repeat: 29, tag: 'prepare' })
    AI 行动间隔：addTimer(0.5, aiTick, { repeat: -1, tag: 'battle' })
    战斗加速：timerManager.timeScale = 2 / 4

