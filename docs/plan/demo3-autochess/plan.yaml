# ═══════════════════════════════════════════════════════
# 任务列表
# ═══════════════════════════════════════════════════════

waves:
  # ─── Wave 1: Foundation Types ─────────────────────
  - wave: 1
    description: "基础定义层——事件键、常量、接口、配置行类型、运行时状态、构建配置。全部并行，无依赖。"
    tasks:
      - task_id: t01
        title: "事件键/常量/接口定义"
        agent: gem-implementer
        description: |
          创建 assets/scripts/game/demo3-autochess/AutoChessDefs.ts，定义 Demo 3 全部共享类型：

          1. **EventKey 定义**（使用 EventKey<T> 幻影类型，'ace:' 前缀）：
             - CHESS_BOUGHT: EventKey<{ pieceId: number; configId: number; cost: number }>
             - CHESS_PLACED: EventKey<{ pieceId: number; row: number; col: number }>
             - CHESS_MERGED: EventKey<{ resultPieceId: number; star: number; name: string }>
             - CHESS_ATTACK: EventKey<{ attackerId: number; defenderId: number; damage: number }>
             - CHESS_KILLED: EventKey<{ pieceId: number; killerPieceId: number }>
             - ROUND_START: EventKey<{ round: number }>
             - ROUND_END: EventKey<{ round: number; result: 'win' | 'lose' }>
             - PHASE_CHANGED: EventKey<{ from: string; to: string }>
             - SYNERGY_ACTIVATED: EventKey<{ race: string; threshold: number; effect: string }>
             - SHOP_REFRESHED: EventKey<{ slotCount: number }>
             - HP_CHANGED: EventKey<{ oldHp: number; newHp: number; damage: number }>
             - GOLD_CHANGED: EventKey<{ oldGold: number; newGold: number }>
             - GAME_OVER: EventKey<{ finalRound: number; result: string }>
             - BATTLE_START: EventKey<{ round: number }>
             - BATTLE_END: EventKey<{ round: number; winner: string }>

          2. **常量**：
             - BOARD_ROWS = 4, BOARD_COLS = 4
             - PLAYER_ROWS = [0, 1], ENEMY_ROWS = [2, 3]
             - INITIAL_HP = 100, INITIAL_GOLD = 10, BASE_INCOME = 5
             - REFRESH_COST = 2, PREPARE_TIME_SECONDS = 30
             - SHOP_SIZE = 5, MAX_BENCH_SIZE = 8

          3. **接口**：
             - IGridPosition { row: number; col: number }
             - IChessPieceShowData { configId: number; name: string; race: string; hp: number; atk: number; atkSpeed: number; range: number; star: number; position: IGridPosition }
             - IBoardCell { pieceId: number | null; row: number; col: number }

          4. **FSM 状态名常量**：
             - ChessAiStateNames = { IDLE: 'Idle', MOVE_TO: 'MoveTo', ATTACK: 'Attack', DEAD: 'Dead' } as const
             - GamePhaseStateNames = { PREPARE: 'Prepare', BATTLE: 'Battle', SETTLE: 'Settle' } as const
             - GAME_PHASE_FSM_NAME = 'AutoChess_GamePhase'
             - CHESS_AI_FSM_PREFIX = 'AutoChess_ChessAI_'

          框架 API 引用：EventKey<T> from '@framework/event/EventDefs'
        files:
          - "assets/scripts/game/demo3-autochess/AutoChessDefs.ts"
          - "tests/game/demo3-autochess/AutoChessDefs.test.ts"
        dependencies: []
        conflicts_with: []
        validation_matrix:
          - test_command: "npx jest --no-coverage --forceExit tests/game/demo3-autochess/AutoChessDefs.test.ts"
            expected: "所有测试通过：EventKey 实例化正确、常量值正确、接口类型可构造"
        tdd_steps:
          red: "测试 AutoChessEvents 各事件键 description 包含 'ace:' 前缀；测试常量值 BOARD_ROWS===4 等；测试 IChessPieceShowData 对象可赋值"
          green: "创建 AutoChessDefs.ts，导出所有 EventKey、常量、接口、FSM 名称"
          refactor: "按用途分区（事件/常量/接口/FSM）排列，添加 JSDoc"

      - task_id: t02
        title: "配置行类型定义"
        agent: gem-implementer
        description: |
          创建两个 DataTable 行类型文件（参考 demo2 的 CharacterConfigRow 模式）：

          1. **assets/scripts/game/demo3-autochess/data/ChessPieceConfigRow.ts**：
             实现 IDataRow 接口，字段：
             - id: number（主键）
             - name: string（棋子名称）
             - race: string（种族：warrior / mage / ranger / tank）
             - hp: number, atk: number, atkSpeed: number（攻击间隔秒）
             - range: number（攻击范围格数）
             - cost: number（商店购买价格）
             - star2Mult: number（★2 属性倍率，默认 2.0）
             - parseRow(data: Record<string, unknown>): void
             - 导出静态配置数据 CHESS_PIECE_DATA（6~8 个棋子配置）

          2. **assets/scripts/game/demo3-autochess/data/SynergyConfigRow.ts**：
             实现 IDataRow 接口，字段：
             - id: number, race: string, threshold: number
             - effect: string（atk_boost / hp_boost / spd_boost）
             - value: number（百分比加成值，如 20 表示 +20%）
             - desc: string（描述）
             - parseRow(data: Record<string, unknown>): void
             - 导出静态配置数据 SYNERGY_DATA（3 条羁绊：战士×3 ATK+20%，法师×2 HP+30%，游侠×3 SPD+25%）

          框架 API 引用：IDataRow from '@framework/datatable/DataTableDefs'
        files:
          - "assets/scripts/game/demo3-autochess/data/ChessPieceConfigRow.ts"
          - "assets/scripts/game/demo3-autochess/data/SynergyConfigRow.ts"
          - "tests/game/demo3-autochess/data/ConfigRows.test.ts"
        dependencies: []
        conflicts_with: []
        validation_matrix:
          - test_command: "npx jest --no-coverage --forceExit tests/game/demo3-autochess/data/ConfigRows.test.ts"
            expected: "所有测试通过：parseRow 正确填充字段、静态数据完整"
        tdd_steps:
          red: "测试 ChessPieceConfigRow.parseRow 能正确解析 {id:1, name:'战士', race:'warrior', ...}；测试 CHESS_PIECE_DATA 长度 ≥ 6；测试 SynergyConfigRow 同理"
          green: "实现两个 ConfigRow 类的 parseRow 方法和静态数据常量"
          refactor: "确保所有数值字段有合理默认值，添加中文 JSDoc"

      - task_id: t03
        title: "运行时游戏状态定义"
        agent: gem-implementer
        description: |
          创建 assets/scripts/game/demo3-autochess/data/AutoChessGameData.ts，定义全部运行时状态：

          1. **接口/类型**：
             - ChessPieceSide = 'player' | 'enemy'
             - ChessPieceRuntimeState：运行时棋子状态（id, configId, name, race, hp, maxHp, atk, atkSpeed, range, star, side, position, isAlive）
             - ShopSlot：{ config: ChessPieceConfigRow | null; sold: boolean }
             - ActiveSynergy：{ race: string; count: number; threshold: number; effect: string; value: number; isActive: boolean }
             - BattleResult = 'win' | 'lose'
             - MergeResult：{ mergedPiece: ChessPieceRuntimeState; consumedIds: number[] }

          2. **AutoChessGameData 类**：
             - gold: number（初始 INITIAL_GOLD）
             - hp: number（初始 INITIAL_HP）
             - round: number（从 1 开始）
             - boardPieces: Map<string, number>（'row,col' → pieceId 映射）
             - benchPieces: ChessPieceRuntimeState[]
             - shopSlots: ShopSlot[]
             - shopLocked: boolean
             - activeSynergies: ActiveSynergy[]
             - allPieces: Map<number, ChessPieceRuntimeState>（全局棋子注册表）
             - nextPieceId: number（自增 ID）
             - reset(): void（重置到初始状态）
             - createPieceState(config, star, side): ChessPieceRuntimeState
             - getPiece(id): ChessPieceRuntimeState | undefined
             - getPlayerPieces(): ChessPieceRuntimeState[]
             - getEnemyPieces(): ChessPieceRuntimeState[]
        files:
          - "assets/scripts/game/demo3-autochess/data/AutoChessGameData.ts"
          - "tests/game/demo3-autochess/data/AutoChessGameData.test.ts"
        dependencies: []
        conflicts_with: []
        validation_matrix:
          - test_command: "npx jest --no-coverage --forceExit tests/game/demo3-autochess/data/AutoChessGameData.test.ts"
            expected: "所有测试通过：reset 归位、createPieceState 生成正确、getPlayerPieces 过滤正确"
        tdd_steps:
          red: "测试 new AutoChessGameData() 初始 gold===10, hp===100, round===1；测试 createPieceState 返回正确结构；测试 reset() 清空所有状态"
          green: "实现 AutoChessGameData 类的所有属性和方法"
          refactor: "提取常量引用 AutoChessDefs（如 INITIAL_HP），确保类型安全"

      - task_id: t04
        title: "构建配置与入口文件"
        agent: gem-implementer
        description: |
          配置 Demo 3 的构建和运行环境：

          1. **修改 package.json**，在 scripts 中新增：
             - "demo3:build": "esbuild assets/scripts/game/demo3-autochess/main.ts --bundle --outfile=dist/demo3/demo3.js --platform=browser --format=iife --tsconfig=tsconfig.json --alias:@framework=./assets/scripts/framework --alias:@game=./assets/scripts/game --alias:@utils=./assets/scripts/utils --alias:@runtime=./assets/scripts/runtime"
             - "demo3:serve": "npm run demo3:build && npx serve dist/demo3 -p 3003"
             - "demo3:dev": "npm run demo3:build && npm run demo3:serve"

          2. **创建 dist/demo3/index.html**：
             HTML 页面，标题 "Auto-chess Lite Demo"，引用 demo3.js，
             body 样式 margin:0, overflow:hidden, background:#1e1e1e。
             参考 dist/demo2/index.html 格式。

          3. **创建 assets/scripts/game/demo3-autochess/main.ts**：
             浏览器入口，导入 AutoChessDemo → new → try { demo.start() } catch 错误处理。
             参考 demo2-rpg/main.ts 格式。

          4. **创建 assets/scripts/game/demo3-autochess/index.ts**：
             模块桶文件（barrel exports），后续 wave 逐步添加导出。
             初始仅导出 AutoChessDefs 的类型和常量。
        files:
          - "package.json"
          - "dist/demo3/index.html"
          - "assets/scripts/game/demo3-autochess/main.ts"
          - "assets/scripts/game/demo3-autochess/index.ts"
        dependencies: []
        conflicts_with: []
        validation_matrix:
          - test_command: "node -e \"const pkg = require('./package.json'); console.log(pkg.scripts['demo3:build'] ? 'OK' : 'MISSING')\""
            expected: "输出 OK，确认 demo3:build 脚本已添加"
        tdd_steps:
          red: "验证 package.json 中不存在 demo3 脚本"
          green: "添加 3 个脚本到 package.json，创建 index.html、main.ts、index.ts"
          refactor: "确保 esbuild 别名与 demo1/demo2 一致"

  # ─── Wave 2: Core Systems & Entity ─────────────────
  - wave: 2
    description: "核心系统与实体层——棋子实体/工厂 + 棋盘/商店/合成/羁绊 5 大独立系统。全部并行。"
    tasks:
      - task_id: t05
        title: "棋子实体与实体工厂"
        agent: gem-implementer
        description: |
          创建棋子实体类和自走棋专用实体工厂：

          1. **assets/scripts/game/demo3-autochess/entities/ChessPieceEntity.ts**：
             继承 EntityBase，实现棋子实体：
             - 属性：configId, name, race, hp, maxHp, atk, baseAtk, atkSpeed, range, star, side (player/enemy), position (IGridPosition), isAlive, atkCooldown
             - onShow(data?: unknown): 接收 IChessPieceShowData，初始化所有属性
             - onHide(): 重置所有属性为默认值（确保回池后干净复用）
             - onUpdate(dt): 更新攻击冷却计时器
             - takeDamage(damage: number): number — 扣血并返回实际伤害，hp<=0 时标记 isAlive=false
             - applyBuff(stat: string, value: number): void — 应用属性加成

          2. **assets/scripts/game/demo3-autochess/factory/AutoChessEntityFactory.ts**：
             实现 IEntityFactory 接口：
             - createEntity(groupName: string): EntityBase — 返回 new ChessPieceEntity()
             - destroyEntity(entity: EntityBase): void — 清理（调用 onHide）
             - 记录创建/销毁计数供调试

          框架 API：EntityBase, IEntityFactory, EntityId
        files:
          - "assets/scripts/game/demo3-autochess/entities/ChessPieceEntity.ts"
          - "assets/scripts/game/demo3-autochess/factory/AutoChessEntityFactory.ts"
          - "tests/game/demo3-autochess/ChessPieceEntity.test.ts"
        dependencies:
          - t01
          - t03
        conflicts_with: []
        validation_matrix:
          - test_command: "npx jest --no-coverage --forceExit tests/game/demo3-autochess/ChessPieceEntity.test.ts"
            expected: "所有测试通过：onShow 初始化正确、onHide 重置干净、takeDamage 扣血正确、工厂创建正确类型"
        tdd_steps:
