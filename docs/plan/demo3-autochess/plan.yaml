             - onUpdate: 检查攻击冷却，冷却完毕则对 target 造成伤害
             - 发射 CHESS_ATTACK 事件
             - 目标死亡 → 回到 Idle 重新寻找；自身 HP<=0 → Dead

          5. **fsm/chess-ai/DeadState.ts**：
             - onEnter: 发射 CHESS_KILLED 事件，标记 isAlive=false

          框架 API：FsmState<T>, IFsm<T> from '@framework/fsm/FsmDefs'
