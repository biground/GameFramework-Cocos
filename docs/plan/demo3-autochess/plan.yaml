plan_id: demo3-autochess
strategy: "综合策略：并行基础+垂直功能"
objective: "开发 Demo 3 — Auto-chess Lite（自走棋），深度验证 EntityManager、ObjectPool、FSM、Timer、Event、Procedure、DataTable 等框架模块在大量实体管理与 AI 自动对战场景下的协作能力"
created_at: "2026-04-23"
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  total_tasks: 18
  total_waves: 5
  wave_1_task_count: 4
  total_dependencies: 32
  risk_score: medium

tldr: |
  18 个任务分 5 波执行：
  - Wave 1（4 并行）：事件/常量/接口定义 + 配置行类型 + 运行时状态 + 构建配置
  - Wave 2（5 并行）：棋子实体/工厂 + 棋盘/商店/合成/羁绊 5 大系统
  - Wave 3（2 任务，t13 依赖 t11）：棋子 AI FSM + 战斗系统（阶段流转统一由 Procedure 管理）
  - Wave 4（5 任务）：渲染器 + 4 组 Procedure（流程上下文/启动/预加载、准备、战斗、结算/结束）
  - Wave 5（2 任务）：主入口类 + 集成测试

open_questions: []

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "EntityManager 与 MockEntityFactory 创建自定义 ChessPieceEntity 不兼容"
      likelihood: low
      impact: high
      mitigation: "AutoChessEntityFactory 实现 IEntityFactory 接口，在 setupProcedures 中覆盖默认 MockEntityFactory；Wave 2 t05 需先写测试验证 EntityGroup 能正确池化 ChessPieceEntity"
    - scenario: "FsmManager 为每个棋子创建独立 FSM，8~16 个 FSM 并发更新导致性能/状态混乱"
      likelihood: medium
      impact: medium
      mitigation: "BattleSystem 统一管理 FSM 生命周期，战斗结束后销毁所有棋子 FSM；集成测试验证 Entity 峰值 16 个无泄漏"
    - scenario: "准备阶段 30s 倒计时与商店/布阵交互竞态条件"
      likelihood: medium
      impact: medium
      mitigation: "PrepareProcedure 使用 TimerManager.addTimer 管理倒计时，倒计时结束后先禁用所有操作再切换 Procedure"
    - scenario: "棋子合成逻辑在 bench + board 两处棋子间的计数不一致"
      likelihood: medium
      impact: low
      mitigation: "MergeSystem 接收所有同名棋子的扁平列表（bench+board），TDD 覆盖边界 case"
  assumptions:
    - "EntityManager、FsmManager、TimerManager、ProcedureManager 等框架模块 API 已完善且测试通过"
    - "DemoBase.bootstrap() 注册全部 15 个模块并注入 Mock 策略，开箱可用"
    - "MockEntityFactory 可被自定义 AutoChessEntityFactory 覆盖，EntityGroup 的对象池机制与自定义实体类型兼容"
    - "jest.config.js 的路径别名 @framework、@game 等已正确配置"
    - "HtmlRenderer 的 updateLog/updateStatus 原地更新能力可用于棋盘显示"

implementation_specification:
  code_structure: |
    遵循 demo2-rpg 的模块化结构：
    - data/ 层：配置行类型 + 运行时状态类
    - events/ 层：EventKey 定义（幻影类型安全）
    - entities/ 层：ChessPieceEntity (extends EntityBase)
    - factory/ 层：AutoChessEntityFactory (implements IEntityFactory)
    - systems/ 层：BoardSystem、ShopSystem、MergeSystem、SynergySystem、BattleSystem
    - fsm/ 层：ChessAI FSM (4 states) + GamePhase FSM (3 states)
    - procedures/ 层：6 个 Procedure + ProcedureContext
    - ui/ 层：AutoChessRenderer (extends/wraps HtmlRenderer)
    - 主入口：AutoChessDemo (extends DemoBase)
  affected_areas:
    - "assets/scripts/game/demo3-autochess/ — 新建整个 Demo 目录"
    - "tests/game/demo3-autochess/ — 新建全部单元测试"
    - "tests/integration/demo3-autochess.integration.test.ts — 集成测试"
    - "package.json — 新增 demo3:build 和 demo3:serve 脚本"
    - "dist/demo3/index.html — 浏览器入口页面"
  component_details:
    - component: AutoChessDefs
      responsibility: "定义全部 EventKey、游戏常量、接口类型、FSM 状态名常量"
      interfaces:
        - "EventKey<T> 幻影类型事件键（ace: 前缀）"
        - "IGridPosition { row: number; col: number }"
        - "IChessPieceShowData — 传递给 ChessPieceEntity.onShow() 的数据"
        - "FSM 状态名常量对象"
    - component: ChessPieceEntity
      responsibility: "棋子实体，继承 EntityBase，在 onShow 中初始化属性，onHide 中重置状态"
      interfaces:
        - "onShow(data: IChessPieceShowData): void"
        - "onHide(): void"
        - "hp / atk / star / race / position 等属性"
    - component: BoardSystem
      responsibility: "4×4 网格管理，棋子放置/移动/查询"
      interfaces:
        - "placePiece(pieceId, row, col): boolean"
        - "removePiece(row, col): number | null"
        - "movePiece(fromRow, fromCol, toRow, toCol): boolean"
        - "findNearestEnemy(pos, isPlayerSide): IGridPosition | null"
        - "getDistance(a, b): number（曼哈顿距离）"
    - component: ShopSystem
      responsibility: "商店刷新、购买、锁定"
      interfaces:
        - "refreshShop(configs, slotCount?): void"
        - "buyPiece(slotIndex): ChessPieceConfigRow | null"
        - "lockShop() / unlockShop() / isLocked"
    - component: MergeSystem
      responsibility: "检测 3 个同名 ★1 自动合成 ★2"
      interfaces:
        - "checkAndMerge(pieces): MergeResult | null"
    - component: SynergySystem
      responsibility: "根据场上棋子种族计算羁绊加成"
      interfaces:
        - "calculateSynergies(pieces, configs): ActiveSynergy[]"
        - "applySynergyBuffs(pieces, synergies): void"
    - component: BattleSystem
      responsibility: "驱动自动战斗，为每个棋子创建 AI FSM，每 tick 推进"
      interfaces:
        - "startBattle(playerPieces, enemyPieces, board): void"
        - "updateBattle(deltaTime): void"
        - "isBattleOver(): boolean"
        - "getBattleResult(): BattleResult"
        - "endBattle(): void"
    - component: AutoChessDemo
      responsibility: "主入口类，继承 DemoBase，串联所有系统和流程"
      interfaces:
        - "setupProcedures(): void"
        - "setupDataTables(): void"
  dependencies:
    - component: BattleSystem
      relationship: "组合 FsmManager（创建/销毁棋子 AI FSM）、BoardSystem（位置查询）、EventManager（战斗事件广播）"
    - component: PrepareProcedure
      relationship: "调用 ShopSystem、BoardSystem、MergeSystem、SynergySystem；使用 TimerManager 管理倒计时"
    - component: BattleProcedure
      relationship: "调用 BattleSystem.startBattle/updateBattle/endBattle；监听战斗结束事件"
    - component: AutoChessDemo
      relationship: "继承 DemoBase（bootstrap 注册 15 模块）；覆盖 EntityFactory；注册 6 个 Procedure"
  integration_points:
    - "DemoBase.bootstrap() → 注册 15 个模块 → 注入 Mock 策略"
    - "setupProcedures() 中覆盖 EntityFactory、注册分组、初始化 ProcedureContext"
    - "setupDataTables() 中注册 chess_piece_config 和 synergy_config 两张表"
    - "package.json 新增 demo3:build/serve 脚本"

