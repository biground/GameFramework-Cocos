            为每个存活棋子创建 AI FSM（使用 fsmManager.createFsm），
            FSM 名称：CHESS_AI_FSM_PREFIX + pieceId，
            状态列表：[IdleState, MoveToState, AttackState, DeadState]，
            写入黑板数据，启动 FSM（初始状态 Idle）。

