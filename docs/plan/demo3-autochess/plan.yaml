          1. **assets/scripts/game/demo3-autochess/fsm/ChessAiFsmDefs.ts**：
             - IChessAiBlackboard 接口：
               { entity: ChessPieceEntity; boardSystem: BoardSystem; allEnemies: () => ChessPieceRuntimeState[]; target: ChessPieceRuntimeState | null; eventManager: IEventManager }
