             继承 FsmState<string>：
             - onEnter: 通过 boardSystem.findNearestEnemy 寻找目标
             - 找到目标且在攻击范围内 → 切换到 Attack
             - 找到目标但不在范围内 → 切换到 MoveTo
             - 无目标 → 保持 Idle（战斗胜利）

          3. **fsm/chess-ai/MoveToState.ts**：
             - onEnter: 计算朝目标移动一步的方向
             - onUpdate: 每次 update 移动 1 格（boardSystem.movePiece）
