open_questions:
  - question: "MockLocalizationLoader 的职责边界是什么？LocalizationManager 没有 ILocalizationLoader 接口"
    context: |
      LocalizationManager 不使用策略注入模式。翻译数据通过 loadTranslations(data) 直接注入。
      MockLocalizationLoader 应该是一个数据提供者（生成测试用翻译数据），
      而不是像其他 Mock 一样实现某个策略接口。
    type: nice_to_know
    affects: ["MockLocalizationLoader"]

  - question: "DemoBase 应继承 ModuleBase 还是独立存在？"
    context: |
      demo-design.md 中 DemoBase 不是模块（不通过 GameModule.register 注册），
      而是模块的组装者和主循环驱动者。当前骨架也没有继承 ModuleBase。
      这是正确的设计——DemoBase 是框架使用者，不是框架的一部分。
    type: nice_to_know
    affects: ["DemoBase"]

