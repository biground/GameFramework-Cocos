patterns_found:
  - category: architecture
    pattern: "策略模式统一注入点"
    description: |
      所有 Manager 都遵循 setXxxStrategy(strategy) 模式：
      ResourceManager.setResourceLoader(loader)、AudioManager.setAudioPlayer(player)、
      SceneManager.setSceneLoader(loader)、UIManager.setUIFormFactory(factory)、
      EntityManager.setEntityFactory(factory)、DataTableManager.setParser(parser)、
      HotUpdateManager.setAdapter(adapter) + setComparator(comparator)。
      LocalizationManager 是唯一不使用策略注入的——直接通过 loadTranslations() 注入数据。
    examples:
      - file: ResourceManager.ts
        location: "IResourceManager.setResourceLoader()"
        snippet: "setResourceLoader(loader: IResourceLoader): void"
      - file: AudioManager.ts
        location: "IAudioManager.setAudioPlayer()"
        snippet: "setAudioPlayer(player: IAudioPlayer): void"
      - file: HotUpdateManager.ts
        location: "IHotUpdateManager.setAdapter() + setComparator()"
        snippet: "setAdapter(adapter: IHotUpdateAdapter): void / setComparator(comparator: IVersionComparator): void"
    prevalence: common

  - category: architecture
    pattern: "Mock 文件骨架已创建但多数为空"
    description: |
      game/shared/ 目录下 12 个文件已创建。实现状态：
      ✅ 已实现：MockResourceLoader（完整）、MockNetworkSocket（基础）、DemoBase（骨架）、HtmlRenderer（骨架）
      ❌ 空文件：MockAudioPlayer、MockSceneLoader、MockUIFormFactory、MockEntityFactory、
                MockDataTableParser、MockHotUpdateAdapter、MockLocalizationLoader、MockVersionComparator
    examples:
      - file: MockAudioPlayer.ts
        location: "game/shared/MockAudioPlayer.ts"
        snippet: "(empty file)"
      - file: MockSceneLoader.ts
        location: "game/shared/MockSceneLoader.ts"
        snippet: "(empty file)"
    prevalence: common

  - category: naming
    pattern: "接口命名双轨制"
    description: |
      策略接口分布在两处：
      1. framework/interfaces/ — Manager 接口（IResourceManager、IAudioManager 等），位于独立目录
      2. framework/{module}/Defs.ts — 策略接口（IResourceLoader、IAudioPlayer 等），内嵌在 Defs 文件中
      Mock 需要实现的是第 2 类（策略接口），不是第 1 类（Manager 接口）。
      例外：IAudioManager 同时存在于 framework/audio/IAudioManager.ts（独立文件）和 framework/interfaces/ 没有它。
    examples:
      - file: ResourceDefs.ts
        location: "framework/resource/ResourceDefs.ts"
        snippet: "export interface IResourceLoader { ... }"
      - file: IResourceManager.ts
        location: "framework/interfaces/IResourceManager.ts"
        snippet: "export interface IResourceManager { ... }"
    prevalence: common

  - category: testing
    pattern: "集成测试文件已创建但为空"
    description: |
      tests/integration/demo0-infrastructure.test.ts 已存在但内容为空。
      tests/__mocks__/ 仅包含 cc.ts（Cocos Creator 引擎 mock）。
    examples:
      - file: demo0-infrastructure.test.ts
        location: "tests/integration/demo0-infrastructure.test.ts"
        snippet: "(empty file)"
    prevalence: rare

