tldr: |
  - 所有 12 个 Mock 文件已在 game/shared/ 目录创建，但仅 MockResourceLoader 和 MockNetworkSocket 有实质实现，其余 10 个为空文件
  - 全部 10 个策略接口（IResourceLoader、IAudioPlayer、ISceneLoader、INetworkSocket、IUIFormFactory、IEntityFactory、IDataTableParser、IHotUpdateAdapter、IVersionComparator + ILocalizationManager.loadTranslations）均已定义完毕，方法签名明确
