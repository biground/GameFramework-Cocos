  data_flow_involving_domain: |
    DemoBase.bootstrap() 创建所有 Manager 模块实例 → 创建所有 Mock 策略实例 →
    通过 Manager.setXxxStrategy(mock) 注入 Mock → GameEntry.registerModule(manager) 注册全部模块 →
    startMainLoop() 启动 setInterval 模拟帧循环 → 每帧调用 GameEntry.update(dt)

