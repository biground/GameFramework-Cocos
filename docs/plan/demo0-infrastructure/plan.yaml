      3. loadAsset 时检查预设资源：存在则立即回调 onSuccess，不存在则存储 callbacks 等待手动控制
      4. releaseAsset 记录到 releaseRequests 数组
      5. 提供 resolve(path, asset?) / reject(path, error?) / progress(path, value) 手动控制方法
