plan_id: demo0-infrastructure
objective: 实现 Demo 0（共享基础设施层），为 6 个游戏 Demo 提供 Mock 策略实现、HtmlRenderer 渲染器和 DemoBase 基类
created_at: '2026-04-21T00:00:00+08:00'
created_by: gem-planner
status: pending_approval
research_confidence: high

plan_metrics:
  wave_1_task_count: 6
  total_dependencies: 24
  risk_score: low

tldr: |
  Demo 0 是所有 6 个游戏 Demo 的共享依赖层。
  
  核心交付物：
  - 11 个 Mock 策略实现（ResourceLoader, AudioPlayer, SceneLoader, NetworkSocket, UIFormFactory, EntityFactory, DataTableParser, HotUpdateAdapter, VersionComparator, LocalizationLoader）
  - HtmlRenderer：彩色日志 + 按钮 + 状态面板 + 表格的纯 HTML 渲染器
  - DemoBase：所有 Demo 的抽象基类，提供 bootstrap() 统一注册 16 个模块
  - 集成测试：验证 GameEntry + 全部 Mock 策略的端到端初始化
  - README 文档
  
  设计要点：
  - Mock 类必须可控（手动 resolve/reject），而非仅自动成功
  - MockNetworkSocket 需模拟延迟(50-200ms)、丢包、断线/重连
  - HtmlRenderer 按设计文档的颜色规范输出日志
  - 所有代码 TypeScript strict mode，无 any，无 console.*，中文 JSDoc
open_questions:
  - HtmlRenderer 是否需要支持 Markdown 子集（粗体/斜体/链接）？当前设计仅支持纯文本 + 颜色
  - MockEntityFactory 创建的 MockEntity 是否需要支持 FSM 绑定？当前设计暂不包含
  - DemoBase.bootstrap() 是否应该支持可选模块（如 HotUpdateManager 在某些 Demo 中不需要）？

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: MockNetworkSocket 的延迟模拟使用 setTimeout 导致测试不可控
      likelihood: medium
      impact: high
      mitigation: 延迟模拟采用可注入的时钟接口，测试中可替换为同步执行
    - scenario: HtmlRenderer 在 Node.js 环境下测试时缺少 DOM API
      likelihood: high
      impact: medium
      mitigation: 使用 jsdom 或 mock DOM 环境，测试文件顶部配置 @jest-environment jsdom
    - scenario: DemoBase.bootstrap() 注册 16 个模块时 priority 冲突导致初始化顺序错误
      likelihood: low
      impact: critical
      mitigation: 严格遵循 module-registry.md 的 priority 分配规范，集成测试验证初始化顺序
    - scenario: Mock 策略与框架模块接口不完全匹配导致类型错误
      likelihood: medium
      impact: medium
      mitigation: TDD 先行，测试中严格检查接口实现（implements 关键字 + 类型断言）
  assumptions:
    - 所有框架模块接口已稳定，不会在 Demo 开发期间大幅变更
    - Jest 测试环境已配置 jsdom 支持
    - GameEntry 的 registerModule 和 getModule API 保持不变
    - Logger 模块已可用且 API 稳定

implementation_specification:
  code_structure: |
    assets/scripts/game/shared/
    ├── DemoBase.ts                  # 抽象基类
    ├── HtmlRenderer.ts              # HTML 渲染器
    ├── MockResourceLoader.ts        # 资源加载 Mock
    ├── MockAudioPlayer.ts           # 音频播放 Mock
    ├── MockSceneLoader.ts           # 场景加载 Mock
    ├── MockNetworkSocket.ts         # 网络 Socket Mock
    ├── MockUIFormFactory.ts         # UI 工厂 Mock
    ├── MockEntityFactory.ts         # 实体工厂 Mock
    ├── MockDataTableParser.ts       # 数据表解析 Mock
    ├── MockHotUpdateAdapter.ts      # 热更新适配器 Mock
    ├── MockVersionComparator.ts     # 版本比较 Mock
    ├── MockLocalizationLoader.ts    # 本地化加载 Mock
    └── README.md                    # 模块文档
    
    tests/integration/
    └── demo0-infrastructure.test.ts # 集成测试
  affected_areas:
    - assets/scripts/game/shared/ (新建目录)
    - tests/integration/ (新建目录)
    - assets/scripts/framework/interfaces/ (读取接口定义)
    - assets/scripts/framework/resource/ResourceDefs.ts (读取 IResourceLoader)
    - assets/scripts/framework/audio/AudioDefs.ts (读取 IAudioPlayer)
    - assets/scripts/framework/network/NetworkDefs.ts (读取 INetworkSocket)
    - assets/scripts/framework/ui/UIDefs.ts (读取 IUIFormFactory)
    - assets/scripts/framework/hotupdate/HotUpdateDefs.ts (读取 IHotUpdateAdapter, IVersionComparator)
  component_details:
    - component: DemoBase
      responsibility: 所有 Demo 的抽象基类，提供统一的框架初始化流程
      interfaces:
        - "bootstrap(): Promise<void> — 注册 17 个模块并注入 Mock 策略"
        - "setupProcedures(): void — 抽象方法，子类实现"
        - "setupDataTables(): void — 抽象方法，子类实现"
        - "startMainLoop(fps?: number): void — 启动 setInterval 主循环"
        - "stopMainLoop(): void — 停止主循环"
        - "getModule<T>(name: string): T — 类型安全获取模块"
    - component: HtmlRenderer
      responsibility: 纯 HTML 日志输出和交互控件渲染
      interfaces:
        - "log(message: string, color?: string): void"
        - "separator(title?: string): void"
        - "createButtonGroup(name: string): HTMLElement"
        - "addButton(group, label, onClick, disabled?): HTMLButtonElement"
        - "clearLog(): void"
        - "createStatusPanel(id, title): StatusPanel"
        - "updateStatus(panelId, key, value): void"
        - "createTable(headers, rows): HTMLElement"
    - component: MockResourceLoader
      responsibility: 模拟资源加载/释放，支持手动控制和自动成功模式
      interfaces:
        - "registerAsset(path, asset): void"
        - "loadAsset(path, callbacks): void"
        - "releaseAsset(path): void"
        - "resolve(path, asset?): void — 手动触发成功"
        - "reject(path, error?): void — 手动触发失败"
        - "progress(path, value): void — 手动触发进度"
    - component: MockNetworkSocket
      responsibility: 模拟 WebSocket 通信，含延迟、丢包、断线/重连
      interfaces:
        - "connect(url): void / send(data): void / close(): void"
        - "registerAutoResponse(requestId, handler): void"
        - "setPacketLossRate(rate): void — 0~1 丢包率"
        - "simulateDisconnect(): void / simulateReconnect(): void"
        - "onOpen / onClose / onMessage / onError 回调属性"
    - component: MockAudioPlayer
      responsibility: 模拟音频播放，记录播放历史
      interfaces:
        - "play(audioClip, config): IAudioInstance — IAudioPlayer 接口方法"
        - "stopAll(): void — IAudioPlayer 接口方法"
        - "playHistory: readonly array — 只读历史记录（MockAudioPlayer 额外属性）"
        - "注意：createInstance/destroyInstance 不是 IAudioPlayer 接口要求，是 MockAudioPlayer 内部辅助方法"
    - component: MockSceneLoader
      responsibility: 模拟场景加载，记录场景切换历史
      interfaces:
        - "loadScene(name, callbacks): void"
        - "unloadScene(name): void"
        - "resolve(name): void / reject(name, error?): void"
        - "progress(name, value): void"
    - component: MockUIFormFactory
      responsibility: 创建轻量级 Mock UI 表单实例
      interfaces:
        - "createForm(name, config, asset): UIFormBase"
        - "destroyForm(form): void"
        - "createdForms: readonly array"
    - component: MockEntityFactory
      responsibility: 创建 Mock 实体实例
      interfaces:
        - "createEntity(groupName): EntityBase"
        - "destroyEntity(entity): void"
        - "createdEntities: readonly array"
    - component: MockDataTableParser
      responsibility: 直接接收 JSON 数组，无需文件解析
      interfaces:
        - "parse<T extends IDataRow>(rawData: unknown): T[] — 注意：泛型约束 T extends IDataRow，参数类型为 unknown"
    - component: MockHotUpdateAdapter
      responsibility: 模拟热更新流程（版本检查、清单对比、下载）
      interfaces:
        - "getLocalManifest(): Promise<ManifestInfo | null>"
        - "fetchRemoteVersion(url: string): Promise<string> — 注意：需要传入 url 参数"
        - "fetchRemoteManifest(url: string): Promise<ManifestInfo> — 注意：需要传入 url 参数"
        - "downloadAsset(url: string, savePath: string): Promise<boolean> — 注意：双参数，返回 boolean"
        - "verifyFile(filePath: string, expectedMd5: string): Promise<boolean> — 注意：双参数，返回 boolean"
        - "applyUpdate(): Promise<boolean>"
        - "rollback(): Promise<boolean>"
    - component: MockVersionComparator
      responsibility: 可编程的版本比较结果
      interfaces:
        - "compare(local, remote): VersionCompareResult"
        - "setNextResult(result): void — 预设下次比较结果"
    - component: MockLocalizationLoader
      responsibility: 内存中多语言数据加载
      interfaces:
        - "loadLanguage(lang): Promise<Record<string, string>>"
        - "registerLanguage(lang, data): void"
  dependencies:
    - component: DemoBase
      relationship: 依赖所有 Mock 策略，通过 setter 注入到框架模块
    - component: HtmlRenderer
      relationship: 独立组件，被 DemoBase 组合使用
    - component: Mock 策略类
      relationship: 独立实现，通过接口注入到对应框架模块
  integration_points:
    - DemoBase.bootstrap() 调用 GameEntry.registerModule() 注册 17 个模块
    - DemoBase.bootstrap() 调用各模块的 setXxx() 方法注入 Mock 策略
    - HtmlRenderer 通过 document.createElement 创建 DOM 元素
    - Mock 策略通过框架模块的 setter 方法注入

