    title: 实现 MockNetworkSocket（含延迟和丢包模拟）
    description: |
      创建 MockNetworkSocket 类，实现 INetworkSocket 接口。
      
      实现要点：
      1. connect(url) 记录 URL，不立即触发 onOpen
      2. send(data) 记录数据，检查丢包率决定是否触发 onMessage
      3. close() 记录调用次数，触发 onClose
      4. 提供 simulateOpen() / simulateClose(code, reason) / simulateMessage(data) / simulateError(error) 手动触发方法
      5. setPacketLossRate(rate: number) 设置丢包率 0~1，send 时 Math.random() < rate 则丢弃
      6. simulateDisconnect() 触发 onClose(4000, 'disconnected')
      7. simulateReconnect() 触发 onOpen
      8. registerAutoResponse(requestId, handler) 注册自动回复：收到指定 id 消息后自动调用 handler 并 send 响应
      9. 延迟模拟：setLatencyRange(min, max)，send 后 setTimeout 延迟触发 onMessage（测试时可设为 0）
      10. setClock(clock: { setTimeout: Function, clearTimeout: Function }) 注入自定义时钟，用于确定性测试
      
      注意：延迟模拟默认使用全局 setTimeout，集成测试中通过 setClock 注入同步时钟或设置 latencyRange 为 [0, 0]。
      
      文件路径：assets/scripts/game/shared/MockNetworkSocket.ts
