tasks:
  # ─── Wave 1: 独立 Mock 策略 + HtmlRenderer（无依赖，可并行） ───

  - id: task-html-renderer
    title: 实现 HtmlRenderer（彩色日志 + 按钮 + 状态面板 + 表格）
    description: |
      创建 HtmlRenderer 类，提供纯 HTML 渲染能力。
      
      实现要点：
      1. 构造函数接收 container: HTMLElement 参数（日志输出容器）
      2. log(message, color?) 创建 <div> 元素，style.color 设为指定颜色，添加到 container
      3. 颜色常量：SUCCESS='#4CAF50', INFO='#2196F3', WARNING='#FF9800', ERROR='#F44336', NETWORK='#9C27B0', DEBUG='#9E9E9E', BATTLE='#FF5722', TIMER='#00BCD4'
      4. separator(title?) 创建 <hr> + 可选标题 <span>
      5. createButtonGroup(name) 创建 <div class="button-group"> 容器
      6. addButton(group, label, onClick, disabled?) 创建 <button> 添加到 group，绑定 click 事件
      7. clearLog() 清空 container 所有子元素
      8. createStatusPanel(panelId, title) 创建 <div class="status-panel"> 包含标题和键值对区域，返回 StatusPanel 对象
      9. StatusPanel 提供 update(key, value) 方法更新显示值
      10. updateStatus(panelId, key, value) 通过 panelId 查找面板并更新
      11. createTable(headers, rows) 创建 <table> 元素，包含 <thead> 和 <tbody>
      12. 自动滚动：每次 log 后 container.scrollTop = container.scrollHeight
      
      注意：所有 DOM 操作使用 document.createElement，不引入任何 UI 框架。
      测试环境需要 jsdom 支持，测试文件顶部添加 /** @jest-environment jsdom */。
      
      前置条件：验证 jest.config.js 已配置 jsdom 环境。
      
      文件路径：assets/scripts/game/shared/HtmlRenderer.ts
