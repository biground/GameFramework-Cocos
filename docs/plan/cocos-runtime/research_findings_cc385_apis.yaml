ui_api:
  instantiate:
    entry: instantiate
    signature: "(prefab: Prefab) => Node  |  <T>(original: T) => T"
    file: cocos/serialization/instantiate.ts:62
  prefab_type:
    path: cocos/scene-graph/prefab/prefab.ts (class Prefab extends Asset)
    export: 从 'cc' 导入
  canvas_pattern: |
    const canvasNode = director.getScene()?.getChildByName('Canvas');
    canvasNode?.addChild(uiNode);
    // Canvas 组件挂在该节点上；Canvas 节点通常只有 1 个
  layer_management: |
    Cocos Creator 3.x 没有 Unity 风格的 UILayer 枚举。
    UI 栈 / 覆盖顺序依赖两种机制：
    (1) Canvas 下每个顶层 UI 节点用 node.setSiblingIndex(n) 控制前后；
    (2) 或在 Canvas 下建多个容器节点（Background/Normal/Popup/Toast），业务层把不同层 UI 放到对应容器。
    注意：Node.layer（Layers.Enum）是 BitMask，用于射线/物理遮罩，不能当 UI 栈用；UI 节点 layer 一般是 Layers.Enum.UI_2D。

resource_api:
  load:
    entry: resources.load / bundle.load / assetManager.loadAny
    signature: |
      // resources.load (= Bundle.load) 推荐入口
      (paths: string | string[], type?: Constructor<Asset> | null,
       onProgress?: (finished: number, total: number, item: RequestItem) => void,
       onComplete?: (err: Error | null, data: Asset | Asset[]) => void) => void
    source_file: cocos/asset/asset-manager/bundle.ts:225-249
    notes: "resources 是默认 Bundle（BuiltinBundleName.RESOURCES='resources'），对应 assets/resources 目录；其他 bundle 需先 assetManager.loadBundle"
  preload:
    entry: resources.preload / resources.preloadDir
    signature: "同 load，但 onComplete 拿到的是 RequestItem[]，不是 Asset"
  remote:
    entry: assetManager.loadRemote
    signature: "<T extends Asset>(url: string, options?: { ext?: string }, onComplete?: (err, data: T) => void) => void"
    source_file: cocos/asset/asset-manager/asset-manager.ts:633-635
  load_bundle:
    entry: assetManager.loadBundle
    signature: "(nameOrUrl: string, options?: { version?: string }, onComplete?: (err, bundle: Bundle) => void) => void"
  release:
    entry: assetManager.releaseAsset(asset) / releaseUnusedAssets() / releaseAll()
    signature: "(asset: Asset) => void"
    source_file: cocos/asset/asset-manager/asset-manager.ts:738-766
    reference_counting: |
      YES — 双层机制：
      1) Asset 自身持有 _ref：业务层 addRef() / decRef(autoRelease=true)；decRef 归零时 releaseManager.tryRelease(this)
      2) assetManager 的 releaseManager 还会跟踪资源的依赖关系；releaseAsset(asset) 强制释放并清理依赖；
         releaseUnusedAssets() 只释放 refCount=0 的。
      框架 ResourceManager 的 owner/refCount 应与 Asset.addRef/decRef 配合，避免双层计数错乱：
      建议 Runtime 策略只在 "owner 第一次 load" 时 addRef，"owner 最后一次 release" 时 decRef。
  types:
    Asset: cocos/asset/assets/asset.ts
    SpriteFrame: cocos/asset/assets/（由 2d 扩展，'cc' 导出）
    Prefab: cocos/scene-graph/prefab/prefab.ts
    SceneAsset: cocos/asset/assets/scene-asset.ts
    JsonAsset / TextAsset / AudioClip / Texture2D: cocos/asset/assets/*.ts

pitfalls:
  - area: reference_counting_double_bookkeeping
    description: |
      框架 ResourceManager 已经维护 refCount+owners，Cocos Asset 也维护 _ref。
      若两边都 addRef/decRef 会双重计数。方案：Runtime 策略只转发第一次/最后一次，不每 load 一次都 addRef。
    impact: decision_blocker
  - area: callback_only
    description: cc 资源 API 全部是 callback，框架 ResourceManager 的 Promise 包装需要在策略层显式封装
    impact: nice_to_know
  - area: release_side_effects
    description: "releaseAsset 会释放依赖（例如释放 Prefab 会释放其引用的 Texture2D / SpriteFrame），若场景仍在用会出现黑块 + GL 报错；生产环境优先用 decRef + releaseUnusedAssets"
    impact: decision_blocker
  - area: editor_vs_runtime
    description: EDITOR 环境下 `assets` 用 WeakCache、`references` 有值（调试用）；运行时 `references` 为 null。编写 Runtime 策略时不要依赖 references
    impact: nice_to_know
  - area: scene_loading_concurrency
    description: director.loadScene 正在加载时再次调用会返回 false 并 warnID(1208)，需要框架 SceneManager 做互斥
    impact: decision_blocker
  - area: no_ui_layer_enum
    description: 不存在 Unity 风格的 UILayer 枚举。框架 UIManager 的 Background/Normal/Popup/Toast 分层必须在 runtime 层自己搭建容器节点或用 siblingIndex 实现
    impact: decision_blocker
  - area: canvas_node_discovery
    description: "getChildByName('Canvas') 硬编码节点名；若设计场景时 Canvas 改名会失败。建议运行时通过 `director.getScene().getComponentInChildren(Canvas)?.node` 查找更稳"
    impact: nice_to_know

cc_api_summary_for_runtime:
  resource_loader_recipe: |
    // packages/fbi-cc-385/src/CocosResourceLoader.ts
    import { resources, assetManager, Asset, Constructor } from 'cc';
    class CocosResourceLoader implements IResourceLoader {
      loadAsset(path, callbacks) {
        resources.load(path, null,
          (f, t) => callbacks.onProgress?.(f / t),
          (err, asset) => {
            if (err) return callbacks.onError(err);
            asset.addRef();                  // 仅首次引用
            callbacks.onLoad(asset);
          });
      }
      releaseAsset(asset) { asset.decRef(true); }
    }

  scene_loader_recipe: |
    // packages/fbi-cc-385/src/CocosSceneLoader.ts
    import { director, Director } from 'cc';
    class CocosSceneLoader implements ISceneLoader {
      load(name, onDone) {
        const ok = director.loadScene(name, (err) => onDone(err ?? null));
        if (!ok) onDone(new Error('scene is already loading'));
      }
      onBeforeLaunch(cb) { director.on(Director.EVENT_BEFORE_SCENE_LAUNCH, cb); }
      onAfterLaunch(cb)  { director.on(Director.EVENT_AFTER_SCENE_LAUNCH, cb); }
    }

  ui_renderer_recipe: |
    // packages/fbi-cc-385/src/CocosUIRenderer.ts
    import { director, instantiate, Prefab, Node, Layers } from 'cc';
    class CocosUIRenderer implements IUIRenderer {
      private layerContainers = new Map<UILayer, Node>(); // Background/Normal/Popup/Toast 容器节点
      mount(prefab: Prefab, layer: UILayer): Node {
        const canvas = director.getScene()!.getChildByName('Canvas')!;
        const container = this.getOrCreateLayerContainer(canvas, layer); // 按 siblingIndex 排序
        const node = instantiate(prefab);
        node.layer = Layers.Enum.UI_2D;
        container.addChild(node);
        return node;
      }
      unmount(node: Node) { node.destroy(); }
    }

open_questions:
  - question: Runtime 策略与框架 ResourceManager 的引用计数是否需要完全对齐（1:1），还是 Runtime 只转发第一次/最后一次？
    context: 框架已有 owners/refCount；Cocos Asset 也有 _ref。双层计数容易错位。
    type: decision_blocker
    affects: [cocos-resource-loader-impl]
  - question: 场景加载失败 / 取消的回滚策略（回到前一场景？）要不要在 SceneManager 接口里统一
    context: director.loadScene 并发返回 false 没有 error payload
    type: decision_blocker
    affects: [cocos-scene-loader-impl]
  - question: UI 分层容器节点是"运行时动态建"还是"预制场景里固定搭好"？
    context: 前者 Runtime 独立完成，后者依赖美术配合
    type: decision_blocker
    affects: [cocos-ui-renderer-impl]

