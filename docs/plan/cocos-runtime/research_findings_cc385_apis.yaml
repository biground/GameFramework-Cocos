plan_id: cocos-runtime
objective: 调研 Cocos Creator 3.8.5 引擎侧资源 / 场景 / UI 关键 API，为 packages/fbi-cc-385 runtime 策略实现做准备
focus_area: cc385_api_surface
created_at: 2026-04-24
created_by: gem-researcher
status: completed

tldr: |
  - 资源加载统一入口是 `assetManager.loadAny` / `bundle.load`，`resources` 是 `Bundle` 的默认实例（对应 assets/resources/），签名支持 path + 类型构造器 + onProgress + onComplete。
  - 3.x 资源生命周期走 **引用计数**：`Asset.addRef()` / `decRef(autoRelease=true)`；业务层应持有资源期间 addRef，释放时 decRef，框架 ResourceManager 的 refCount 应与此对齐。
  - 场景切换用 `director.loadScene(sceneName, onLaunched?)`（自动查 bundle），事件 `Director.EVENT_BEFORE_SCENE_LOADING` / `EVENT_BEFORE_SCENE_LAUNCH` / `EVENT_AFTER_SCENE_LAUNCH`。
  - UI 实例化使用 `instantiate(prefab: Prefab): Node`（来自 cocos/serialization/instantiate.ts），根节点获取用 `director.getScene().getChildByName('Canvas')`，Cocos 3.x 没有 UI 层级枚举，层级靠 siblingIndex；`Layers` 是射线/掩码用途，不是 UI 栈。
  - 所有关键符号从 `'cc'` 一个入口导入。

