patterns_found:
  - category: api_shape
    pattern: callback-first-with-overloads
    description: 所有加载类 API 全部是 callback 风格（不是 Promise），支持 (path, type?, onProgress?, onComplete?) 重载组合
    examples:
      - file: bundle.ts
        location: "225-249"
        snippet: "public load<T extends Asset>(paths, type?, onProgress?, onComplete?): void"
    prevalence: common

  - category: lifecycle
    pattern: reference-counting
    description: "资源通过 Asset.addRef / decRef 管理生命周期；autoRelease=true 时 decRef 归零触发 releaseManager.tryRelease"
    examples:
      - file: asset.ts
        location: "315-340"
        snippet: "addRef(): Asset { this._ref++; return this; }  decRef(autoRelease=true)"
    prevalence: common

  - category: event
    pattern: director-scene-events
    description: 场景切换通过 Director 的 emit 事件通知（BEFORE_SCENE_LOADING / BEFORE_SCENE_LAUNCH / AFTER_SCENE_LAUNCH），可供 SceneManager 监听
    examples:
      - file: director.ts
        location: "83-97, 353, 375"
        snippet: "this.emit(Director.EVENT_BEFORE_SCENE_LAUNCH, scene); ... this.emit(Director.EVENT_AFTER_SCENE_LAUNCH, scene);"
    prevalence: common

