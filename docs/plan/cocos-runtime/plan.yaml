tldr: |
    为 CC 3.8.5 实现 Resource/Scene/UI 三策略适配器，落地在 assets/scripts/runtime/cc-385/。
    先扩展 cc mock + 框架层改造（IUIFormFactory 回调化、SceneManager guard 统一 throw），
    再并行实现三个 loader/factory（TDD Red/Green），组装 install.ts + UIFormBase 桥接（组合模式），
    最后在独立 worktree 内用 CC 3.8.5 项目做人工验证，输出截图与日志。

open_questions: []

adrs:
  - id: ADR-001
    title: 适配代码位置选择 runtime/cc-385/ 而非 packages/
    decision: 放在 assets/scripts/runtime/cc-385/，与现有 i18n runtime 同层，避免 npm workspaces 配置
    rationale: 当前仓库无 workspaces，packages/ 下插件靠 @framework/* 别名解析；runtime/ 路径与 i18n 现例一致
  - id: ADR-002
    title: UI 分层使用 Map<number, Node> + registerLayer 懒建
    decision: Canvas 下动态创建层节点，首次访问或 registerLayer 时创建；无"默认层 vs 自定义层"特判
    rationale: 简化分层实现，支持任意 zIndex 扩展
  - id: ADR-003
    title: 引用计数仅转发 owner 首次/末次
    decision: Runtime 侧在 owner 首次 load 调 asset.addRef，末次 release 调 asset.decRef(true)
    rationale: 框架层已按 owner 维护 refCount，Runtime 仅桥接到 cc Asset；IResourceLoader JSDoc 追加契约说明
  - id: ADR-004
    title: installCocosRuntime(gameEntry) 统一入口 + isInited 校验
    decision: 导出 installCocosRuntime，内部校验 gameEntry.isInited，拿 3 个 Manager 并注入 3 个策略实现
    rationale: 入口集中便于调用方；未来可升级为 DI 装饰器自动注册
  - id: ADR-005
    title: SceneManager guard 统一到 throw
    decision: 将 SceneManager.setSceneLoader 的 null warn 改为 throw，与 Resource/UI 风格一致
    rationale: 统一 fail-fast；precondition 是 grep worktree 分支确认无影响
  - id: ADR-006
    title: Canvas 跨场景失效采用双策略查找 + 事件订阅
    decision: CocosUIFormFactory 不缓存 Canvas；订阅 EVENT_BEFORE_SCENE_LOADING 清 layerNodes、EVENT_AFTER_SCENE_LAUNCH 置 _canvas=null；查找时 Component 定位优先 + 名字兜底
    rationale: CC 切场景会销毁旧 Canvas；懒查 + 事件双保险防止持有失效引用
  - id: ADR-007
    title: IUIFormFactory.createForm 回调签名 + Factory 内部持有 IResourceManager
    decision: createForm 改为 (formName, config, callbacks) 回调签名；CocosUIFormFactory 构造期注入 IResourceManager，内部按 config.path 加载 Prefab（owner=ui:${formName}）
    rationale: UIManager.openForm 传 null asset 的缺陷需在框架层修；Factory 持有资源管理器使 UI 加载路径收敛，UIFormBase 改为组合模式（extends cc.Component，持有 _uiForm）

risks:
  - id: RISK-001
    title: TDD 节奏失控
    likelihood: medium
    impact: medium
    mitigation: 每个 loader/factory 拆 red/green 两个子任务，red 先跑红再进入 green
  - id: RISK-002
    title: 引用计数双重记账
    likelihood: medium
    impact: high
    mitigation: Red 测试包含 "load→release→load→release 后 Asset._ref 回 0" 用例
  - id: RISK-003
    title: 场景并发加载
    likelihood: low
    impact: medium
    mitigation: SceneLoader 单 flight + listener 闭包校验 sceneName
  - id: RISK-004
    title: UIFormBase 组合模式学习成本
    likelihood: medium
    impact: low
    mitigation: README 写清组合模式用法 + 提供示例
  - id: RISK-005
    title: CC 编辑器环境集成成本
    likelihood: high
    impact: high
    mitigation: w4-t0 输出 CC_PRECONDITION.md（Dashboard 安装、3.8.5 版本、外置 SSD 规避、paths 别名 spike）
  - id: RISK-006
    title: Canvas 跨场景失效
    likelihood: medium
    impact: high
    mitigation: 订阅 Director EVENT_BEFORE_SCENE_LOADING / EVENT_AFTER_SCENE_LAUNCH 清理缓存

implementation_specification:
  code_structure: |
    assets/scripts/runtime/cc-385/
      ├── CocosResourceLoader.ts
      ├── CocosSceneLoader.ts
      ├── CocosUIFormFactory.ts
      ├── CocosUIFormBase.ts
      ├── install.ts
      ├── index.ts
      └── README.md
    tests/runtime/cc-385/
      ├── cocos-resource-loader.test.ts
      ├── cocos-scene-loader.test.ts
      ├── cocos-ui-form-factory.test.ts
      ├── cocos-ui-form-base.test.ts
      └── install.test.ts
  affected_areas:
    - assets/scripts/runtime/cc-385/（新）
    - tests/runtime/cc-385/（新）
    - tests/__mocks__/cc.ts（扩展）
    - assets/scripts/framework/interfaces/IUIManager.ts
    - assets/scripts/framework/ui/UIDefs.ts
    - assets/scripts/framework/ui/UIManager.ts
    - assets/scripts/framework/interfaces/ISceneManager.ts
    - assets/scripts/framework/scene/SceneManager.ts
    - tests/ui/ui-manager.test.ts
    - tests/scene/scene-manager.test.ts
    - docs/module-registry.md
    - docs/architecture.md
    - docs/plan/cocos-runtime/CC_PRECONDITION.md（新）
    - docs/plan/cocos-runtime/VALIDATION.md（新）
  component_details:
    - component: CocosResourceLoader
      responsibility: 实现 IResourceLoader；按 path 调 resources.load 并 addRef，releaseAsset 调 decRef(true)
      interfaces:
        - loadAsset(path, callbacks): void
        - releaseAsset(path): void
    - component: CocosSceneLoader
      responsibility: 实现 ISceneLoader；单 flight 加载 + loadScene 完成回调 + 失败兜底
      interfaces:
        - loadScene(sceneName, callbacks): void
    - component: CocosUIFormFactory
      responsibility: 实现 IUIFormFactory；构造期注入 IResourceManager；createForm 异步回调化；管理 layer 节点；订阅场景事件做 Canvas 失效处理
      interfaces:
        - createForm(formName, config, callbacks): void
        - destroyForm(form): void
        - registerLayer(zIndex, name?): void
    - component: CocosUIFormBase
      responsibility: cc.Component 桥接；静态 __IS_UI_FORM__=true；持有 _uiForm: UIFormBase；暴露 getUIForm()
      interfaces:
        - getUIForm(): UIFormBase
    - component: installCocosRuntime
      responsibility: 校验 gameEntry.isInited；获取 Resource/Scene/UI Manager 并注入三策略
      interfaces:
        - installCocosRuntime(gameEntry): void
  dependencies:
    - component: CocosUIFormFactory
      relationship: 构造期依赖 IResourceManager（加载 Prefab）
    - component: installCocosRuntime
      relationship: 依赖 GameEntry 和三个 Manager 接口
  integration_points:
    - UIManager.openForm 改异步；调用 factory.createForm(name, config, callbacks)
    - SceneManager.setSceneLoader guard 统一 throw（与 Resource/UI 对齐）
    - tests/__mocks__/cc.ts 扩展（resources/director/instantiate/Prefab/Asset/Canvas/UITransform/Node.components/makeCanvasMock）

