plan_id: cocos-runtime
objective: 摸底 Resource/Scene/UI 三个模块在框架侧的策略注入现状，为 packages/fbi-cc-385 适配插件提供基线
focus_area: framework_status
created_at: 2026-04-24
created_by: gem-researcher
status: completed

tldr: |
    - Resource/Scene/UI 三个模块的策略注入接口**全部已存在**且命名规范统一（IResourceLoader / ISceneLoader / IUIFormFactory），注入入口分别为 setResourceLoader / setSceneLoader / setUIFormFactory。
    - @fbi/core 目前**仅作源码存在**（根 package.json 里不存在此名字），插件通过 peerDependency `"@fbi/core": ">=0.1.0"` 声明意图，实际解析依赖根 tsconfig + jest moduleNameMapper 的 `@framework/*` 别名；**没有 npm workspaces / pnpm / lerna**。
    - 现有 runtime 层样例仅 i18n（LocalizedLabel / LocalizedSprite）——属于"cc 组件 + 静态 GameEntry.getModule 访问"风格，**没有 IResourceLoader 等策略实现的参考样例**，fbi-cc-385 需要从零实现。
    - tests/__mocks__/cc.ts 非常简陋（约 40 行，仅 _decorator/Component/Node/Label/Sprite/SpriteFrame/resources.load 空桩），不够 fbi-cc-385 单测使用——需要显著扩展或插件包内自备 mock。
    - 关键决策点：fbi-cc-385 是作为 packages/ 下的源码插件（与 fbi-ecs 同构，peerDep @fbi/core），还是放在 assets/scripts/runtime/ 下（与现有 i18n runtime 同路径）——两套布局目前在项目中共存，需在 brainstorm/plan 阶段裁决。

research_metadata:
    methodology: 直接 read_file 三模块的 Defs/interfaces 文件 + grep_search 注入入口 + 参考 fbi-ecs/i18n runtime 样例 + 根 package.json / tsconfig / jest.config 结构验证
    scope: assets/scripts/framework/{resource,scene,ui} + framework/interfaces + assets/scripts/runtime + packages/fbi-ecs + 根 tsconfig/jest/package.json + tests/__mocks__/cc.ts
    confidence: high
    coverage: 90
    decision_blockers: 2
    research_blockers: 0

