        - "error / warn 信号"
    recommendation: |
        fbi-cc-385 建议在 packages/fbi-cc-385/__mocks__/cc.ts 内**自备更完整的 mock**（本地优先于根 mock），并考虑把通用能力提回根 mock；不要污染根 mock 以免影响其他模块单测。

testing_patterns:
    framework: jest + ts-jest
    coverage_areas:
        - 策略注入 setter 的 guard 行为（null 检查、重复注入）
        - loader/factory 回调→framework 事件的转译
    test_organization: "packages/fbi-cc-385/tests/{resource,scene,ui}-loader.test.ts"
    mock_patterns:
        - "通过 jest.fn() 模拟 cc.resources.load 的 error/progress/asset 三态"
        - "同步回调可在 jest.fn() 的 mockImplementation 内立即触发"

open_questions:
    - question: fbi-cc-385 最终应放在 packages/ 下还是 assets/scripts/runtime/ 下？
      context: "项目现存两种 runtime：(a) packages/fbi-*/ 插件模式（fbi-ecs/fbi-timer-*）(b) assets/scripts/runtime/i18n/ 引擎组件模式。两者目前各司其职：前者是纯 TS 可替换模块，后者是继承 cc.Component 的业务组件。IResourceLoader 等属于前者性质，但与 cc 强绑定又更像后者位置。"
      type: decision_blocker
      affects: [T-plan-structure, T-impl-scaffold]
    - question: 是否需要把 fbi-cc-385 自动在 GameEntry 启动时注入？
      context: "现有默认模块通过 GameModule.register 自动注册，但 IResourceLoader 等策略实例需要业务代码手动 setXxxLoader。fbi-cc-385 可以提供一个便利函数 `installCocosRuntime(gameEntry)`，或者进一步暴露一个 IPlugin 适配器"
      type: research
      affects: [T-api-design]
    - question: UIFormBase 与 cc.Component 的桥接策略
      context: "UIFormBase 是纯 TS 抽象类；业务 UI 表单通常既是 cc.Component（为了挂节点）又要实现 UIFormBase 钩子。常见方案：(1) 让业务类同时继承 cc.Component 和 UIFormBase（TS 不支持多继承，需要 mixin）(2) 让业务类继承 cc.Component，通过组合持有一个 UIFormBase 适配器 (3) fbi-cc-385 提供 CocosUIFormBase = cc.Component 子类并在内部代理到 UIFormBase 钩子。"
      type: decision_blocker
      affects: [T-ui-factory-impl]
    - question: SceneManager 的 warn-vs-throw 不一致是否需要先在框架侧统一？
      context: "Resource/UI 在 loader 未注入时 throw，Scene 仅 warn。做 fbi-cc-385 时若先注入再调用没问题，但容易掩盖配置错误"
      type: nice_to_know
      affects: [T-pre-cleanup]

gaps:
    - area: 策略实现样例
      description: 框架内无任何 IResourceLoader/ISceneLoader/IUIFormFactory 的 cc 参考实现；fbi-cc-385 是首个实现者
      impact: nice_to_know
      affects: [T-impl-scaffold]
    - area: cc mock 覆盖率
      description: tests/__mocks__/cc.ts 非常薄，无法支持 fbi-cc-385 的 loader 单测
      impact: research_blocker
      affects: [T-test-setup]
    - area: 插件包对 "@fbi/core" 的真实解析路径
      description: 当前 peerDep 纯意图声明，插件源码不 import "@fbi/core"；fbi-cc-385 需要 import 框架接口时建议用相对路径 `../../../assets/scripts/framework/resource/ResourceDefs` 或在根 tsconfig.paths 增加 `@fbi/core` alias 指向 framework/（后者更干净）
      impact: decision_blocker
      affects: [T-plan-structure]
    - area: fbi-cc-385 是否需要构建产物（dist）
      description: 现有 fbi-* 都无 dist，main 指向 src/*.ts；但 Cocos 项目加载插件时能否直接吃 .ts 取决于 Cocos 的 TS 编译配置。需要 brainstorm 阶段确认发布形态
      impact: nice_to_know
      affects: [T-build-strategy]
