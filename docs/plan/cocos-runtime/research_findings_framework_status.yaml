patterns_found:
    - category: architecture
      pattern: 策略注入（Strategy Injection via setter）
      description: 三个模块均通过 `set{模块}Loader/Factory` setter 接收引擎适配策略；loader/factory null 时 Resource/UI throw、Scene 仅 warn
      examples:
          - file: ResourceManager.ts
            location: "67, 93-94"
            snippet: public setResourceLoader(loader: IResourceLoader) { if (!loader) { Logger.error + throw } }
          - file: UIManager.ts
            location: "78, 125-126"
            snippet: public setUIFormFactory(factory: IUIFormFactory) { ... }
          - file: SceneManager.ts
            location: "79, 97"
            snippet: public setSceneLoader(loader: ISceneLoader) { ... if (!this._loader) Logger.warn (**未 throw**) }
      prevalence: common
    - category: architecture
      pattern: 回调驱动（Callback-based async）
      description: 三个模块的策略接口**全部回调风格**（非 Promise/async），fbi-cc-385 实现时需把 cc 的 Promise/callback API 适配为此回调协议
      examples:
          - file: ResourceDefs.ts
            location: ~74
            snippet: "loadAsset(path: string, callbacks: LoadAssetCallbacks): void"
          - file: SceneDefs.ts
            location: ~37
            snippet: "loadScene(sceneName: string, callbacks: LoadSceneCallbacks): void"
      prevalence: common
    - category: naming
      pattern: 接口命名不统一
      description: Resource/Scene 用 "Loader" 后缀，UI 用 "Factory"（因为 UI 需要 createForm 既含资源加载又含实例化）
      examples:
          - file: ResourceDefs.ts
            location: ~74
            snippet: IResourceLoader
          - file: UIDefs.ts
            location: ~66
            snippet: IUIFormFactory
      prevalence: occasional
    - category: structure
      pattern: 插件包的极简布局（fbi-ecs 参考）
      description: 无 tsconfig、无 dist、main 直指 src/index.ts；依靠根 tsconfig 的 include 统一编译
      examples:
          - file: packages/fbi-ecs/package.json
            location: ":1"
            snippet: '{ "name": "@fbi/ecs", "main": "src/index.ts", "peerDependencies": { "@fbi/core": ">=0.1.0" } }'
      prevalence: common

related_architecture:
    components_relevant_to_domain:
        - component: ResourceManager (default impl)
          responsibility: 缓存/引用计数/owner 归属；调用注入的 IResourceLoader 做真实加载
          location: assets/scripts/framework/resource/ResourceManager.ts
          relationship_to_domain: fbi-cc-385 需实现 IResourceLoader 并在启动期调用 `resourceManager.setResourceLoader(new CocosResourceLoader())`
        - component: SceneManager (default impl)
          responsibility: 切场景去重 + 事件广播
          location: assets/scripts/framework/scene/SceneManager.ts
          relationship_to_domain: fbi-cc-385 需实现 ISceneLoader（封装 cc.director.loadScene + 进度监听）
        - component: UIManager (default impl)
          responsibility: 分层栈 + cover/reveal 通知；资源由 factory 侧负责
          location: assets/scripts/framework/ui/UIManager.ts
          relationship_to_domain: fbi-cc-385 需实现 IUIFormFactory；**资源加载职责在 factory 内部**（ResourceDefs 注释暗示 factory 自行调 cc.resources）
        - component: UIFormBase (abstract class, 非 cc.Component)
          responsibility: 定义 onOpen/onClose/onCover/onReveal/onUpdate 钩子
          location: assets/scripts/framework/ui/UIFormBase.ts
          relationship_to_domain: **关键桥接点**——业务层继承 UIFormBase，但实际实例又需要挂在 cc.Node 上；fbi-cc-385 Factory 需解决"cc.Prefab → UIFormBase 实例"的双向绑定策略（常见：业务类同时继承 UIFormBase + 持有 cc.Node 引用）
    interfaces_used_by_domain:
        - interface: IResourceLoader
          location: ResourceDefs.ts
          usage_pattern: setter 注入，单例生命周期
        - interface: ISceneLoader
          location: SceneDefs.ts
          usage_pattern: setter 注入
        - interface: IUIFormFactory
          location: UIDefs.ts
          usage_pattern: setter 注入；factory 内部可能还需要持有 IResourceManager 引用以加载 prefab（框架未强制，由 factory 决定）
    data_flow_involving_domain: |
        业务层 → XxxManager（默认实现） → 注入的 ILoader/IFactory → cc 引擎 API
                        ↑ 引用计数/栈/缓存在 Manager 层  ↑ fbi-cc-385 责任边界
    key_relationships_to_domain:
        - from: ResourceManager
          to: IResourceLoader
          relationship: composes (通过 setter 注入的单例)
        - from: SceneManager
          to: ISceneLoader
          relationship: composes
        - from: UIManager
          to: IUIFormFactory
          relationship: composes
        - from: IUIFormFactory.createForm
          to: IResourceManager (potentially)
          relationship: "factory 通常需要调用 ResourceManager 加载 prefab——这是 fbi-cc-385 内部的协作点"

