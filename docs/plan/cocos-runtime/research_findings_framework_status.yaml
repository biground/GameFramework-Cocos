related_conventions:
    naming_patterns_in_domain: |
        - 接口：I{模块名}Loader / I{模块名}Factory（Resource/Scene 用 Loader，UI 用 Factory）
        - 实现：{Engine}{模块名}Loader（推测；如 CocosResourceLoader）
        - 注入方法：set{模块名}{Loader|Factory}
    structure_of_domain: |
        framework/{module}/
          ├── {Module}Manager.ts      # 默认实现（纯 TS）
          ├── {Module}Defs.ts         # 类型 + 策略接口
          └── README.md
        framework/interfaces/I{Module}Manager.ts  # 对外契约
    error_handling_in_domain: |
        - Resource/UI：loader 未注入时 Logger.error + throw `[模块名] ...` 中文错误
        - Scene：loader 未注入时仅 Logger.warn（**不一致，可能需统一**）
    testing_in_domain: |
        - framework 层测试在 tests/{module}/，不涉及 cc mock
        - 插件测试可放 packages/xxx/tests/（jest roots 已包含）
    documentation_in_domain: |
        - 每模块必有 README.md
        - IResourceLoader / IUIFormFactory 的 JSDoc 内已给出 cc 实现示例代码（非常有利于 fbi-cc-385 开发）

