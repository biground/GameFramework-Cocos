        - _decorator.property
        - Component (含 node, getComponent)
        - Node
        - Label (string)
        - Sprite (spriteFrame, isValid)
        - SpriteFrame
        - resources.load (jest.fn())
    needs_extension_for:
        - "resources.release"
        - "resources.preload"
        - "director.loadScene"
        - "director.preloadScene"
