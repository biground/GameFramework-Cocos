        - name: "@fbi/core"
          purpose_for_domain: 以 peerDependency 形式声明；**但项目中根 package.json 并未发布 @fbi/core，而是通过根 tsconfig include + jest moduleNameMapper 让源码互相可见**

fbi_core_distribution:
    form: source_only
    how_to_depend: |
        现有 fbi-ecs / fbi-timer-* 的实践：
        1. package.json 声明 `"peerDependencies": { "@fbi/core": ">=0.1.0" }` — **纯意图声明，实际没解析路径**
        2. 插件内部 import 框架符号时**不写 `from '@fbi/core'`**，而写相对路径或 `@framework/*` 别名
        3. 根 tsconfig `include: ["packages/**/*.ts"]` 让插件源码参与主工程编译
        4. 根 jest.config `roots: ["<rootDir>/packages"]` 让插件测试参与主工程测试
        结论：fbi-cc-385 只需按 fbi-ecs 模板建目录、声明同样的 peerDep，**暂时不需要配置 @fbi/core 的 path alias**；import 写 `@framework/resource/ResourceDefs` 即可

        若将来真要 npm publish 独立安装：需增加 npm workspaces（根 package.json 加 `"workspaces": ["packages/*"]`）并让 `@fbi/core` 成为主包真名，工作量不小，当前阶段不紧迫。
    monorepo_setup: "no — 无 npm/pnpm/yarn workspaces，无 lerna/turbo；单仓但非严格 monorepo，依赖根 tsconfig/jest 的 path+roots 做伪 monorepo"

package_reference:
    example_package: fbi-ecs
    package_json_shape: |
        {
          "name": "@fbi/{plugin}",
          "version": "0.1.0",
          "description": "...",
          "main": "src/index.ts",           // 注意：直接指向 .ts 源文件，无 types 字段
          "peerDependencies": { "@fbi/core": ">=0.1.0" },
          "keywords": [...]
        }
        省略字段：types、files、exports、scripts、devDependencies、dependencies
    tsconfig_shape: "不存在——依赖根 tsconfig 的 include"
    jest_shape: "不存在独立 jest.config——依赖根 jest.config 的 roots: ['packages'] 和 testMatch"
    build_output: "无 dist 构建产物；main 直指 src/index.ts；运行时（Cocos）会由其自身构建流程编译"
    export_pattern: |
        src/index.ts 使用 barrel re-export：
        export { A, B, C } from './XxxDefs';
        export { XxxManager } from './XxxManager';

existing_runtime_example:
    file: assets/scripts/runtime/i18n/LocalizedLabel.ts + LocalizedSprite.ts
    pattern_summary: |
        **场景类型**：cc 组件消费框架模块（不是策略实现）。
        - `import { _decorator, Component, Label } from 'cc'`（唯一允许依赖 cc 的层）
        - @ccclass 装饰，继承 cc.Component
        - 通过 `GameEntry.getModule<XxxManager>('XxxName')` 静态访问
        - 订阅 EventManager 事件响应语言切换
        - **注意 LocalizedSprite 直接 `cc.resources.load`，未 dogfood ResourceManager**——说明历史上策略注入尚未强制贯通
        **缺失**：IResourceLoader / ISceneLoader / IUIFormFactory 的 cc 实现样例项目中**暂无**；必须由 fbi-cc-385 从 ResourceDefs/UIDefs JSDoc 提供的示例片段开始实现。

