pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Timer 多间隔精度累积误差导致产出数值偏差
      likelihood: medium
      impact: medium
      mitigation: 测试中使用手动 update(dt) 而非真实计时，精确控制 deltaTime；产出计算使用 Math.floor 截断
    - scenario: FSM 状态切换与 Timer 生命周期不同步（如升级中取消 Timer 泄漏）
      likelihood: medium
      impact: high
      mitigation: 每个 FSM 状态的 onLeave 必须清理该状态创建的 Timer；测试验证状态切换后 Timer 数量
    - scenario: 离线收益计算精度——长时间离线后浮点累积误差
      likelihood: low
      impact: medium
      mitigation: 离线收益使用整数数学（totalOutput = outputPerSecond * seconds），不做帧级模拟
    - scenario: SaveSystem 序列化/反序列化丢失字段或类型错误
      likelihood: medium
      impact: high
      mitigation: SaveSystem 测试覆盖完整存档→读档往返验证；使用明确的 ISaveData 接口约束
    - scenario: 循环依赖——BuildingSystem 与 AchievementSystem 互相触发事件导致无限循环
      likelihood: low
      impact: high
      mitigation: 系统间仅通过 EventManager 单向通信；AchievementSystem 只监听事件不 emit 触发事件
  assumptions:
    - DemoBase、HtmlRenderer 及所有 Mock 策略已在 demo1 worktree 中可用且测试通过
    - 框架 15 个模块 API 稳定，不需要修改框架层代码
    - Jest + 路径别名配置在 worktree 中已正确设置
    - DOM API 在测试环境中通过 jsdom 可用（HtmlRenderer 相关测试需要）

implementation_specification:
  code_structure: |
    所有源码在 assets/scripts/game/demo1-idle/ 下，按职责分为 6 个子目录：
    - data/: 数据类型定义（DataTable 行类型、游戏状态接口）
    - events/: EventKey 定义
    - systems/: 核心游戏系统（BuildingSystem、AchievementSystem、OfflineRewardSystem、SaveSystem）
    - fsm/: 建筑 FSM 状态定义
    - procedures/: 5 个 Procedure（Launch、Preload、OfflineSettle、Main、Settings）
    - ui/: UI 面板（MainPanel、SettingsPanel）
    测试文件在 tests/game/demo1-idle/ 下，与源码结构对应。
  affected_areas:
    - assets/scripts/game/demo1-idle/ (新建整个目录树)
    - tests/game/demo1-idle/ (新建整个测试目录树)
  component_details:
    - component: IdleEvents
      responsibility: 定义所有游戏事件的 EventKey（金币变化、建筑升级、成就解锁、离线收益等）
      interfaces:
        - "GOLD_CHANGED: EventKey<{ current: number; delta: number }>"
        - "BUILDING_PURCHASED: EventKey<{ buildingId: number }>"
        - "BUILDING_UPGRADED: EventKey<{ buildingId: number; newLevel: number }>"
        - "BUILDING_PRODUCED: EventKey<{ buildingId: number; amount: number }>"
        - "ACHIEVEMENT_UNLOCKED: EventKey<{ achievementId: number; reward: number }>"
        - "OFFLINE_REWARD: EventKey<{ seconds: number; gold: number }>"
        - "GAME_SAVED: EventKey<void>"
        - "GAME_LOADED: EventKey<void>"
    - component: BuildingConfigRow / UpgradeCurveRow / AchievementConfigRow
      responsibility: DataTable 行类型定义，实现 IDataRow 接口
      interfaces:
        - "BuildingConfigRow extends IDataRow: id, name, baseCost, baseOutput, outputInterval, costMultiplier, outputPerLevel, maxLevel, unlockCondition"
        - "UpgradeCurveRow extends IDataRow: id, buildingId, level, cost, output, upgradeTime"
        - "AchievementConfigRow extends IDataRow: id, name, desc, type, target, reward"
    - component: IdleGameData
      responsibility: 游戏运行时状态数据结构（金币、建筑状态、成就、存档时间戳）
      interfaces:
        - "IBuildingState: { buildingId, level, owned, producing }"
        - "IIdleGameData: { gold, totalGoldEarned, buildings, unlockedAchievements, lastSaveTime, clickPower }"
        - "ISaveData: 序列化友好的存档格式"
    - component: BuildingSystem
      responsibility: 建筑管理——购买、升级、产出计算、解锁判定
      interfaces:
        - "init(eventManager, timerManager, dataTableManager): void"
        - "purchaseBuilding(buildingId, gameData): boolean"
        - "upgradeBuilding(buildingId, gameData): boolean"
        - "startProduction(buildingId, gameData): void"
        - "stopAllProduction(): void"
        - "getTotalOutputPerSecond(gameData): number"
        - "getUpgradeCost(buildingId, currentLevel): number"
        - "canUnlockBuilding(buildingId, totalGold): boolean"
    - component: AchievementSystem
      responsibility: 成就条件检测、解锁和奖励发放
      interfaces:
        - "init(eventManager, dataTableManager): void"
        - "checkAchievements(gameData): void"
        - "getUnlockedAchievements(): number[]"
        - "getAllAchievements(): AchievementConfigRow[]"
    - component: OfflineRewardSystem
      responsibility: 离线收益计算——基于时间差和当前产出速率
      interfaces:
        - "calculateReward(gameData, offlineSeconds): number"
        - "getOfflineSeconds(lastSaveTime): number"
    - component: SaveSystem
      responsibility: 自动存档和读档（localStorage 序列化）
      interfaces:
        - "save(gameData): void"
        - "load(): IIdleGameData | null"
        - "hasSaveData(): boolean"
        - "clearSaveData(): void"
    - component: BuildingFsmStates
      responsibility: 建筑 FSM 四个状态（Idle、Producing、Upgrading、MaxLevel）
      interfaces:
        - "BuildingIdleState extends FsmState"
        - "BuildingProducingState extends FsmState"
        - "BuildingUpgradingState extends FsmState"
        - "BuildingMaxLevelState extends FsmState"
    - component: Procedures (5个)
      responsibility: 游戏流程驱动
      interfaces:
        - "LaunchProcedure: 初始化框架 → 切换到 Preload"
        - "PreloadProcedure: 加载 DataTable → 切换到 OfflineSettle"
        - "OfflineSettleProcedure: 计算离线收益 → 切换到 Main"
        - "MainProcedure: 游戏主循环（UI 交互、Timer 驱动）"
        - "SettingsProcedure: 设置面板（音量、存档管理）"
    - component: IdleClickerDemo
      responsibility: Demo 主入口类，继承 DemoBase，串联所有系统
      interfaces:
        - "setupProcedures(): 注册 5 个 Procedure 并启动 LaunchProcedure"
        - "setupDataTables(): 注册 3 张配置表数据"
    - component: IdleMainPanel / IdleSettingsPanel
      responsibility: HTML UI 面板（通过 HtmlRenderer 渲染按钮和状态面板）
      interfaces:
        - "IdleMainPanel: 建筑列表、金币显示、点击按钮、升级按钮"
        - "IdleSettingsPanel: 音量设置、存档管理"
  dependencies:
    - component: BuildingSystem
      relationship: 依赖 EventManager(emit/on)、TimerManager(addTimer)、DataTableManager(getRow) 通过构造注入
    - component: AchievementSystem
      relationship: 监听 EventManager 事件（GOLD_CHANGED、BUILDING_UPGRADED），读取 DataTableManager 成就配置
    - component: OfflineRewardSystem
      relationship: 读取 BuildingSystem 的 getTotalOutputPerSecond 计算收益
    - component: SaveSystem
      relationship: 序列化 IIdleGameData，通过 EventManager emit GAME_SAVED/GAME_LOADED
    - component: BuildingFsmStates
      relationship: 状态内通过 blackboard 获取 BuildingSystem 和 TimerManager 引用
    - component: Procedures
      relationship: MainProcedure 持有 BuildingSystem、AchievementSystem、SaveSystem 引用，驱动 UI 更新
    - component: IdleClickerDemo
      relationship: 组合所有系统，继承 DemoBase 获取框架模块访问
  integration_points:
    - DemoBase.bootstrap() 初始化全部框架模块并注入 Mock 策略
    - DataTableManager.createTable() 注册 building_config、upgrade_curve、achievement_config
    - ProcedureManager.initialize() + startProcedure() 启动流程链
    - FsmManager.createFsm() 为每个已购建筑创建独立 FSM
    - TimerManager.addTimer() 为每个建筑创建独立产出 Timer（tag 分组）
    - EventManager 连接所有系统的事件通信

