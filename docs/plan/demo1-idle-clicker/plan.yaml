      ```typescript
      /** 单个建筑的运行时状态 */
      export interface IBuildingState {
          /** 建筑配置 ID */
          buildingId: number;
          /** 当前等级（0 = 未购买） */
          level: number;
          /** 是否已拥有（已购买） */
          owned: boolean;
          /** 是否正在产出中 */
          producing: boolean;
          /** 产出 Timer 的 ID（-1 表示无 Timer） */
          timerId: number;
      }

      /** 游戏运行时完整状态 */
      export interface IIdleGameData {
          /** 当前金币 */
          gold: number;
          /** 历史累计获得金币总量 */
          totalGoldEarned: number;
          /** 各建筑状态，key 为 buildingId */
          buildings: Map<number, IBuildingState>;
          /** 已解锁的成就 ID 集合 */
          unlockedAchievements: Set<number>;
          /** 上次存档时间戳（毫秒） */
          lastSaveTime: number;
          /** 手动点击单次金币收益 */
          clickPower: number;
      }

      /** 序列化友好的存档格式（JSON 安全） */
      export interface ISaveData {
          gold: number;
          totalGoldEarned: number;
          buildings: Array<{ buildingId: number; level: number; owned: boolean }>;
          unlockedAchievements: number[];
          lastSaveTime: number;
          clickPower: number;
      }

      /** 创建默认游戏状态 */
      export function createDefaultGameData(): IIdleGameData;

      /** IIdleGameData → ISaveData 序列化 */
      export function serializeGameData(data: IIdleGameData): ISaveData;

      /** ISaveData → IIdleGameData 反序列化 */
      export function deserializeGameData(save: ISaveData): IIdleGameData;
      ```

      Map/Set 不能直接 JSON 序列化，因此需要 serialize/deserialize 辅助函数。
