  - id: T09
    title: "实现 5 个 Procedure（Launch、Preload、OfflineSettle、Main、Settings）"
    description: |
      创建 5 个 Procedure 文件，全部继承 ProcedureBase。

      **LaunchProcedure** (`procedures/LaunchProcedure.ts`):
      - onEnter: 日志输出"框架初始化完成" → changeProcedure(PreloadProcedure)

      **PreloadProcedure** (`procedures/PreloadProcedure.ts`):
      - onEnter: 从 blackboard 获取 DataTableManager → 验证 3 张表已加载 → 日志 → changeProcedure(OfflineSettleProcedure)

      **OfflineSettleProcedure** (`procedures/OfflineSettleProcedure.ts`):
      - onEnter: 从 blackboard 获取 SaveSystem → load 存档 → 如有存档：计算离线收益(OfflineRewardSystem) → emit OFFLINE_REWARD → 应用收益 → 日志 → changeProcedure(MainProcedure)
      - 无存档：创建默认 gameData → changeProcedure(MainProcedure)

      **MainProcedure** (`procedures/MainProcedure.ts`):
      - onEnter: 从 blackboard 获取各系统 → 为已拥有建筑恢复 FSM 和产出 → 设置自动存档 Timer（30秒，tag='autosave'）→ 设置 UI 按钮事件 → 日志
      - onUpdate: 刷新 UI 状态面板（金币、产出、建筑等级等）
      - onLeave: 停止所有建筑产出 Timer → 停止自动存档 Timer → 保存一次

      **SettingsProcedure** (`procedures/SettingsProcedure.ts`):
      - onEnter: 显示设置 UI → 暂停所有建筑 Timer
      - onLeave: 关闭设置 UI → 恢复 Timer

      所有 Procedure 通过 fsm.getData<T>(key) 获取系统引用（blackboard 模式）。
