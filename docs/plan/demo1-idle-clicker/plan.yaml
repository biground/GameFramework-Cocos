plan_id: demo1-idle-clicker
objective: |
  实现完整的 Idle Clicker 挂机放置 Demo，验证 Timer、DataTable、FSM、Procedure、Event 等核心模块在真实游戏场景下的协作能力。
  核心循环：点击获取金币 → 购买/升级建筑 → 建筑自动产金 → 解锁新建筑 → 离线收益结算。
