  - id: T04
    title: "实现 BuildingSystem（建筑管理系统）"
    description: |
      创建 `assets/scripts/game/demo1-idle/systems/BuildingSystem.ts`。

      核心职责：
      1. **purchaseBuilding(buildingId, gameData)**: 检查金币够不够 + 建筑是否解锁 → 扣费 → 设置 owned=true + level=1 → emit BUILDING_PURCHASED → 启动产出
      2. **upgradeBuilding(buildingId, gameData)**: 检查金币和等级上限 → 扣费 → level++ → 更新产出 Timer 间隔 → emit BUILDING_UPGRADED
      3. **startProduction(buildingId, gameData)**: 用 TimerManager.addTimer 创建重复 Timer（repeat=-1），tag='building_{id}'，间隔从 DataTable 读取，回调中增加金币并 emit BUILDING_PRODUCED
      4. **stopAllProduction()**: 用 TimerManager.removeTimersByTag 批量清除
      5. **getTotalOutputPerSecond(gameData)**: 遍历所有已拥有建筑，计算总每秒产出
      6. **getUpgradeCost(buildingId, currentLevel)**: baseCost * costMultiplier^level（从 DataTable 或直接计算）
      7. **canUnlockBuilding(buildingId, totalGold)**: 检查 totalGoldEarned >= unlockCondition
      8. **manualClick(gameData)**: gold += clickPower, totalGoldEarned += clickPower, emit CLICK_GOLD + GOLD_CHANGED

      构造函数接收 EventManager、TimerManager、DataTableManager 引用。
      所有金币操作后必须 emit GOLD_CHANGED 事件。
      产出计算用 baseOutput + outputPerLevel * (level - 1)。
    wave: 2
