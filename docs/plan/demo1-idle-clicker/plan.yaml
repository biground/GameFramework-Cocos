tldr: |
  7 波次、22 个任务的 DAG 执行计划：
  - W1: 数据类型层（EventKey 定义、DataTable 行类型、游戏状态数据结构）
  - W2: 核心系统层（BuildingSystem、AchievementSystem、OfflineRewardSystem、SaveSystem）
  - W3: FSM 状态 + Procedure 流程
  - W4: UI 面板 + 主 Demo 类
  - W5: 系统单元测试（BuildingSystem、AchievementSystem、OfflineReward、SaveSystem）
  - W6: FSM + Procedure 单元测试
  - W7: 集成测试
  所有实现在 worktree `/Volumes/Extreme SSD/WorkSpace/GameFramework-Cocos/.worktrees/demo1` 中进行。

